id: amd-cdna4-mfma-16x16x32-fp4
vendor: amd
arch_family: cdna4
class: tensor-mma
name: MFMA 16x16x32 FP4 (CDNA4)

description: |
  CDNA4-introduced (MI355X+) MFMA variant supporting FP4 native. Smaller
  tile (16x16) but with FP4 dtype + per-block scaling. Aligns with NVIDIA
  Blackwell's FP4 tensor path. Standard fp16/bf16/fp8 ops remain on the
  CDNA3-style 32x32x16 MFMA (CDNA4 is superset of CDNA3 ops).

shapes_supported:
  - { M: 16, N: 16, K: 32, dtype_a: fp4, dtype_b: fp4, dtype_c: fp32, notes: "Per-32-block scaling (MX-FP4 compatible)" }
  - { M: 16, N: 16, K: 32, dtype_a: fp8-e4m3, dtype_b: fp8-e4m3, dtype_c: fp32 }
  - { M: 16, N: 16, K: 16, dtype_a: bf16, dtype_b: bf16, dtype_c: fp32 }

memory_model:
  operand_a_source: registers
  operand_b_source: registers
  result_destination: registers
  async: false
  notes: 'Same memory model as CDNA3 MFMA. No async TMA equivalent.'

calling_convention:
  asm_intrinsic: 'v_mfma_f32_16x16x32_fp4'
  cpp_intrinsic_header: '<rocwmma/rocwmma.hpp>'
  template_tag: 'ck::DeviceGemm with FP4 epilogue'
  recommended_compiler: 'amdclang++ --offload-arch=gfx950'

cross_vendor_equivalents:
  - vendor: nvidia
    arch_family: blackwell
    primitive_id: nvidia-blackwell-tcgen05
    mapping_ratio: 'For FP4: 16× MFMA 16x16x32 ≈ 1 TCGEN05 m128n128k64'
    notes: 'Closest direct equivalent — both vendors added FP4 native for the same generation. Scaling factor layout differs (MXFP4 vs NVFP4); software stack must handle conversion.'
  - vendor: amd
    arch_family: cdna3
    primitive_id: amd-cdna3-mfma-32x32x16
    mapping_ratio: 'CDNA3 has no FP4; this is the new path on CDNA4'
    notes: 'For non-FP4 workloads, CDNA4 still uses 32x32x16 MFMA (inherited from CDNA3).'

used_by_kernels:
  - fused-quantized-attention

notes: 'MI355X exclusive (and MI400 generation). MXFP4 (per-32-block) standard; NVFP4 (per-16) requires conversion in software.'
