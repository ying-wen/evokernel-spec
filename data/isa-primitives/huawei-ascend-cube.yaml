id: huawei-ascend-cube
vendor: huawei
arch_family: ascend-910
class: tensor-mma
name: Cube Unit (Ascend AI Core)

description: |
  Huawei Ascend's tensor compute unit. Each AI Core has a Cube unit + Vector
  unit + Scalar unit operating in pipeline (the "OE/OQ" pipeline pattern).
  Block size 16x16x16. Programming model is fundamentally different from
  CUDA — explicit DMA between GM (global memory) ↔ UB (unified buffer) ↔ L1
  cache ↔ L0 (closest to compute) is required.

shapes_supported:
  - { M: 16, N: 16, K: 16, dtype_a: fp16, dtype_b: fp16, dtype_c: fp16, notes: "Most common; 910B/910C/910D" }
  - { M: 16, N: 16, K: 16, dtype_a: bf16, dtype_b: bf16, dtype_c: fp32 }
  - { M: 16, N: 16, K: 32, dtype_a: int8, dtype_b: int8, dtype_c: int32 }
  - { M: 16, N: 16, K: 32, dtype_a: fp8-e4m3, dtype_b: fp8-e4m3, dtype_c: fp32, notes: "Limited support on 910C; broader on 910D" }

memory_model:
  operand_a_source: l1-cache    # Operands live in L1 (closer than UB)
  operand_b_source: l1-cache
  result_destination: registers
  async: true
  requires_descriptor: 'OE/OQ pipeline directive (Ascend-C)'
  notes: 'Memory hierarchy is EXPLICIT — kernels must DMA in 3 stages (GM → UB → L1 → L0). Cube reads from L1 directly. The async pipeline is via OE (output-enable) / OQ (output-queue) instead of CUDA streams.'

calling_convention:
  asm_intrinsic: 'mmad (Cube instruction; not user-emittable, generated by compiler from Ascend-C)'
  cpp_intrinsic_header: '<acl/acl.h>, <kernel_operator.h>'
  template_tag: 'AscendC::Matmul template'
  recommended_compiler: 'bisheng (Ascend-C compiler)'

cross_vendor_equivalents:
  - vendor: nvidia
    arch_family: hopper
    primitive_id: nvidia-hopper-wgmma
    mapping_ratio: '4× Cube 16x16x16 fp16 ≈ 1 WGMMA m64n64k16 fp16'
    notes: 'WGMMA tile size larger; 4 cube ops to match. Programming models radically different — Cube needs explicit GM/UB/L1/L0 DMA staging via Ascend-C; WGMMA needs TMA descriptor + warp-group code. Async pipeline pattern: WGMMA uses sm_90 cuda::barrier; Cube uses OE/OQ directive.'
  - vendor: nvidia
    arch_family: blackwell
    primitive_id: nvidia-blackwell-tcgen05
    mapping_ratio: 'For fp16: 16× Cube 16x16x16 ≈ 1 TCGEN05 m128n128k16. For FP4: Ascend has no native equivalent on 910C/910D — fallback to fp8 path.'
    notes: 'Ascend lacks FP4 native; FP4 workloads must dequantize to fp8/bf16 first.'
  - vendor: amd
    arch_family: cdna3
    primitive_id: amd-cdna3-mfma-32x32x16
    mapping_ratio: '4× Cube 16x16x16 fp16 ≈ 1 MFMA 32x32x16 fp16'
    notes: 'Both block at 16x16x16 base unit but MFMA aggregates into 32x32 wave-level. Cube + Vector + Scalar pipeline is unique to Ascend.'
  - vendor: cambricon
    arch_family: cambricon-mlu
    primitive_id: cambricon-mlu-mma
    mapping_ratio: '~1:1 (both 16x16x16 base unit)'
    notes: 'Both Chinese-domestic NPUs; similar block shape. Ecosystem differs — Ascend uses CANN/Ascend-C; Cambricon uses Neuware/BANG-C.'

used_by_kernels:
  - flash-attention-v2  # MindIE FA2
  - paged-attention-decode  # vllm-ascend port

docs_url: https://www.hiascend.com/document/detail/zh/ascend-c-api/

notes: |
  Critical to understand: Ascend's AI Core is NOT a unified compute unit
  like CUDA SM. It's a Cube + Vector + Scalar pipeline where each unit
  operates on its own data and communicates via explicit memory levels.
  This means a CUDA kernel doing "load → mma → epilogue" maps to Ascend
  as "DMA(GM→UB) → DMA(UB→L1) → Cube_MMA → DMA(L0→UB) → Vector(epilogue) →
  DMA(UB→GM)" — all explicitly orchestrated.
