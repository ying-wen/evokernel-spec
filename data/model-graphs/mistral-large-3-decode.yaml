id: mistral-large-3-decode
model_id: mistral-large-3
phase: decode
layer_count: 88

placeholder_definitions:
  B: 'batch_size'
  S: 'seq_len (1 for decode)'
  D: 'd_model (12288)'
  H: 'num_attention_heads (96)'
  H_kv: 'num_kv_heads (8 — GQA factor 12)'
  D_h: 'head_dim (128)'
  D_ff: 'ffn_intermediate (28672)'
  V: 'vocab_size (32768)'

default_dimensions: { B: 1, S: 1, D: 12288, H: 96, H_kv: 8, D_h: 128, D_ff: 28672, V: 32768 }

pre_layer_ops:
  - { order: 0, op_id: embedding-lookup, label: 'Token embedding', layer_scope: embedding-only,
      shape_template: { input: '[B, S]', weight: '[V, D]', output: '[B, S, D]' } }

per_layer_ops:
  - { order: 1, op_id: rmsnorm, label: 'RMSNorm pre-attn', shape_template: { input: '[B, S, D]', output: '[B, S, D]' } }
  - { order: 2, op_id: matmul, label: 'Q proj', shape_template: { input: '[B, S, D]', weight: '[D, H*D_h]', output: '[B, S, H, D_h]' } }
  - { order: 3, op_id: matmul, label: 'K proj (GQA H_kv=8 of 96)', shape_template: { input: '[B, S, D]', weight: '[D, H_kv*D_h]', output: '[B, S, H_kv, D_h]' } }
  - { order: 4, op_id: matmul, label: 'V proj (GQA)', shape_template: { input: '[B, S, D]', weight: '[D, H_kv*D_h]', output: '[B, S, H_kv, D_h]' } }
  - { order: 5, op_id: rope, label: 'RoPE', shape_template: { input: '[B, S, H, D_h]', output: '[B, S, H, D_h]' } }
  - { order: 6, op_id: scaled-dot-product-attention, label: 'GQA flash attention (12× broadcast)',
      shape_template: { Q: '[B, S, H, D_h]', K: '[B, ctx_len, H_kv, D_h]', V: '[B, ctx_len, H_kv, D_h]', output: '[B, S, H, D_h]' },
      notes: 'GQA H/H_kv = 12 — one of the highest broadcast factors among frontier dense LLMs. Saves 12× KV cache mem.' }
  - { order: 7, op_id: matmul, label: 'Attn output proj', shape_template: { input: '[B, S, H*D_h]', weight: '[H*D_h, D]', output: '[B, S, D]' } }
  - { order: 8, op_id: rmsnorm, label: 'RMSNorm pre-FFN', shape_template: { input: '[B, S, D]', output: '[B, S, D]' } }
  - { order: 9, op_id: matmul, label: 'FFN gate proj', shape_template: { input: '[B, S, D]', weight: '[D, D_ff]', output: '[B, S, D_ff]' } }
  - { order: 10, op_id: matmul, label: 'FFN up proj', shape_template: { input: '[B, S, D]', weight: '[D, D_ff]', output: '[B, S, D_ff]' } }
  - { order: 11, op_id: swiglu, label: 'SwiGLU', fused_with: [matmul], shape_template: { gate: '[B, S, D_ff]', up: '[B, S, D_ff]', output: '[B, S, D_ff]' } }
  - { order: 12, op_id: matmul, label: 'FFN down proj', shape_template: { input: '[B, S, D_ff]', weight: '[D_ff, D]', output: '[B, S, D]' } }
  - { order: 13, op_id: allreduce, label: 'TP allreduce', shape_template: { input: '[B, S, D]', output: '[B, S, D]' } }

post_layer_ops:
  - { order: 100, op_id: rmsnorm, label: 'Final RMSNorm', layer_scope: lm-head-only, shape_template: { input: '[B, S, D]', output: '[B, S, D]' } }
  - { order: 101, op_id: matmul, label: 'LM head', layer_scope: lm-head-only, shape_template: { input: '[B, S, D]', weight: '[D, V]', output: '[B, S, V]' } }
  - { order: 102, op_id: top-k-sampling, label: 'Sampling', layer_scope: lm-head-only, shape_template: { input: '[B, S, V]', output_token: '[B, S]' } }

notes: |
  Mistral Large 3 123B — dense GQA (H/H_kv=12, biggest broadcast factor in
  this class). Wide hidden_size (12288) + dense FFN (28672) → high compute
  per layer but smaller KV cache than equivalent MHA.

  Per-token decode FLOPs ≈ 246 GFLOP. Bytes ≈ 246 GB BF16 read.
  → Memory-bound at decode unless quantized to FP8 / FP4.

  Same op set as Llama 3.3 70B (no MoE) but larger dimensions throughout.
  Engine + kernel coverage: 100% on Hopper / Blackwell / CDNA3.

reference_url: https://huggingface.co/mistralai/Mistral-Large-Instruct-2407
