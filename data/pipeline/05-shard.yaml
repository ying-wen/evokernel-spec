id: shard
name_zh: 分片与并行
name_en: Sharding & parallelism
order: 5
summary_zh: '把模型/计算/请求在多卡上拆分: TP (张量并行) / PP (流水) / EP (专家并行) / SP (序列并行) / DP (数据)。决策直接影响吞吐与互联带宽利用。'
summary_en: 'Split model / compute / requests across cards: TP (tensor) / PP (pipeline) / EP (expert) / SP (sequence) / DP (data). Choices directly affect throughput and interconnect utilization.'

description_md: |
  ## 五种基本切法

  - **TP (Tensor Parallel)**: 在 hidden dim 切, 每层 forward 都要 all-reduce. 受 scale-up 带宽 (NVLink/HCCS) 限制.
  - **PP (Pipeline Parallel)**: 按层切, micro-batching 流水. 通信少但 latency 增加, 适合超大模型.
  - **EP (Expert Parallel)**: MoE 的 experts 分片, all-to-all 通信. 大批量才划算.
  - **SP (Sequence Parallel)**: long-context 时序列维度切, 减少 attention 显存.
  - **DP (Data Parallel)**: 整模型多副本, 不同请求分到不同副本. 跨节点首选.

  ## 经验法则

  ```
  if model_active_params > single_card_memory:
      need TP, choose TP_size = ceil(active_params * 2 / card_memory_GB)
      e.g. DeepSeek-V4 active 37B, BF16 = 74 GB → TP=2 on 80GB cards, TP=1 on 192GB
  if total_params > TP_size * card_memory:
      need PP or EP
  if MoE and batch_size large:
      EP can pay off; small batch keep EP=1
  if context > 32K:
      consider SP for attention, especially with FP8 activation
  ```

  ## 互联敏感度

  - **TP**: scale-up bandwidth (NVLink 900-1800 GB/s, HCCS 784 GB/s, IF 896-1075 GB/s) 必须够
  - **EP**: all-to-all 是带宽瓶颈, NVSwitch 上 collective 成熟, 国产卡需 CANN/MUSA 持续优化
  - **PP**: 节点间 IB / RoCE 100-800 GB/s 一般够 (PP 通信量小)
  - **DP**: 任何带宽都行, 仅同步 weights

decisions:
  - question: 起手 TP 多少?
    options: ['TP=1 (单卡fit)', 'TP=2', 'TP=4', 'TP=8 (满 NVL8)', 'TP=16+ (NVL72/HCCS-rack)']
    common_default: 'TP=8 (NVLink 8卡机内充分利用)'
    guidance: '先用 calculator 看 ridge point, 然后选最小满足显存的 TP'
  - question: MoE 模型是否启用 EP?
    options: ['EP=1 (TP-only)', 'EP=2', 'EP=4', 'EP=8 (大 cluster)']
    common_default: 'EP=1 起步, batch 大时再加'
    guidance: '小 batch (decode) 关掉 EP, 大 batch (prefill 或高 throughput) 才打开'
  - question: 跨节点是 PP 还是 DP?
    options: ['PP (大模型一份)', 'DP (吞吐导向, 多副本)']
    common_default: 'DP (吞吐) 或 PP (单大模型)'
    guidance: 'fits-on-one-node 的 model 跨节点 always DP; >node 模型必须 PP'
  - question: 是否启用 SP?
    options: ['SP=off', 'SP=1 (TP 内部 Megatron 风格 SP)', 'SP=full (CP / context-parallel)']
    common_default: '32K context 起开, 64K+ 必开'
    guidance: 'SP 主要省显存, 不省算力; 短 context 不用'

tools:
  - name: vLLM `--tensor-parallel-size`
    engine_id: vllm
    role: 'TP 配置参数'
    url: https://docs.vllm.ai
  - name: SGLang `--tp-size --dp-size --ep-size`
    engine_id: sglang
    role: 'TP/DP/EP 联合配置'
    url: https://docs.sglang.ai
  - name: TRT-LLM `tp_size, pp_size`
    engine_id: tensorrt-llm
    role: 'build 时即决定 (静态)'
    url: https://nvidia.github.io/TensorRT-LLM/architecture/checkpoint.html
  - name: MindIE `world_size, parallel_strategy`
    engine_id: mindie
    role: '昇腾 TP/EP 配置'
    url: https://www.hiascend.com/document
  - name: torch.distributed
    role: 'PyTorch 底层通信原语, all-reduce/all-gather/all-to-all'

failure_modes:
  - symptom: 'TP=8 时 decode 反而比 TP=4 慢'
    cause: 'all-reduce 通信开销超过算力收益; ridge point 算错'
    fix: '降低 TP, 用 calculator 重新 size; 或检查 NVSwitch 是否拓扑全连接'
  - symptom: 'EP=4 长 prompt 出现负载倾斜'
    cause: 'expert 路由分布不均, 部分 expert 满载'
    fix: '关闭 EP (EP=1, 用 TP 替代), 或启用 expert capacity rebalancing'
  - symptom: 'PP 阶段 bubble 占 30%+'
    cause: 'micro-batch 数 < PP_size, 流水填不满'
    fix: '增大 micro-batch 数 (1F1B / interleaved scheduling)'

related_patterns: [moe-expert-routing-on-domestic, disaggregated-prefill-decode]
related_operators: [allreduce, all2all, matmul]
primary_engines: [vllm, sglang, tensorrt-llm, mindie]
invalidates_downstream: [serve]
