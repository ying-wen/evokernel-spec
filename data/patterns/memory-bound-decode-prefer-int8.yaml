id: memory-bound-decode-prefer-int8
name: Memory-bound decode 阶段优先使用 INT8/INT4 量化
category: quantization
description_md: |
  ## 何时适用

  当 decode 阶段算术强度低于硬件 ridge point (peak compute / peak memory bandwidth) 时,
  decode 吞吐受内存带宽限制。此时 weight-only INT8 或 INT4 量化通过减少每 token
  的字节读取量, 可以显著提升 decode tok/s, 通常 1.5-2.5x。

  ## 适用条件
  - decode 阶段 batch size 较小 (≤ 16)
  - 模型 active params 较大
  - 硬件支持 INT8/INT4 weight + FP16 activation 的反量化路径

  ## 副作用
  - 模型质量略降 (通常 < 0.5 perplexity)
  - 需校准 (AWQ / GPTQ)
applies_when:
  - decode-throughput-target
  - large-active-params
related_operators: [matmul, attention]
supporting_cases_min: 0
engines_supporting: [vllm, sglang, lmdeploy, tensorrt-llm, mindie]
hardware_requires:
  - int8-weight-decompression-fast-path
model_archetypes: [dense-llm, moe-llm, long-context, reasoning]
speedup:
  - metric: decode-throughput
    multiplier_min: 1.5
    multiplier_max: 2.5
    notes: '小 batch (≤16) 时增益最大; 大 batch 转为算力受限, 量化收益减小'
  - metric: memory-footprint
    multiplier_min: 0.4
    multiplier_max: 0.55
    notes: 'INT4 约缩减到 BF16 的 1/4'
trade_offs:
  - '质量回退: AWQ 通常 <0.3 PPL, INT4-GPTQ 偶尔 0.5-1.0 PPL'
  - '需要离线校准数据, 推理前的一次性成本'
  - 'prefill 阶段 (compute-bound) 量化几乎无加速'
references:
  - title: 'AWQ: Activation-aware Weight Quantization for LLM Compression and Acceleration'
    url: https://arxiv.org/abs/2306.00978
    source_type: paper
  - title: 'GPTQ: Accurate Post-Training Quantization for Generative Pre-trained Transformers'
    url: https://arxiv.org/abs/2210.17323
    source_type: paper
  - title: 'vLLM AWQ guide'
    url: https://docs.vllm.ai/en/latest/quantization/auto_awq.html
    source_type: docs
