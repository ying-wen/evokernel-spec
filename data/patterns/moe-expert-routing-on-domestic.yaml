id: moe-expert-routing-on-domestic
name: 国产硬件 MoE expert 路由优化
category: parallel
description_md: |
  ## 问题

  MoE 模型在国产硬件 (昇腾 / 寒武纪等) 上, expert parallelism 的 all-to-all 通信
  开销显著, 因为 HCCS / MLU-Link 等私有协议的 all-to-all 实现尚不如 NVSwitch 成熟。

  ## 缓解

  - 优先选 EP=1, 用 TP 替代 expert 分布
  - 大 batch 才打开 EP, 小 batch 关闭
  - 或拆 prefill / decode, prefill EP=1 减少 long-prompt 倾斜

  ## 实战观察 (2026-04)
  - 昇腾 910B + DeepSeek-V3: EP=2 时长 prompt 出现负载倾斜, EP=1 更稳定
applies_when:
  - moe-on-domestic-hw
  - small-batch-decode
related_operators: [moe-gate, all2all]
supporting_cases_min: 0
engines_supporting: [mindie, vllm]
hardware_requires:
  - private-scaleup-protocol
  - moe-router-on-host-or-device
model_archetypes: [moe-llm]
speedup:
  - metric: decode-throughput
    multiplier_min: 1.1
    multiplier_max: 1.4
    notes: '相对于盲目套用 NVIDIA EP 配置; 主要来源于消除 all-to-all 倾斜'
trade_offs:
  - 'EP=1 + TP 大时显存占用更高 (每张卡需保有所有 expert 权重)'
  - '随 CANN/MUSA 的 all-to-all 优化迭代, 此 pattern 重要性逐年下降'
references:
  - title: 'CANN Communication Library (HCCL) docs'
    url: https://www.hiascend.com/document
    source_type: docs
  - title: 'MoE Routing on Heterogeneous Clusters (Moonshot blog)'
    url: https://github.com/kvcache-ai/Mooncake
    source_type: blog
