id: tp-allreduce-overlap
name: TP All-Reduce 通信与计算重叠
category: communication
description_md: |
  ## 简介

  Tensor Parallelism (TP) 把每个 GEMM 沿 hidden 维度切到 N 张 GPU,
  每个 GPU 算 partial 输出, 最后 **all-reduce** 同步 — 通信几乎是 GEMM 的 1.5-2x 时间,
  如果串行执行, GPU 在通信期间完全空闲。

  **TP All-Reduce overlap** 把 all-reduce 拆成 **reduce-scatter (RS)** + **all-gather (AG)** 两步,
  让 RS/AG 与下一个 GEMM 在 stream-level 并行。理想情况通信 100% 隐藏在计算里, TP 时间 ≈ pure compute。

  与 `fused-tp-allreduce-residual` (fused kernel) 的区别: 这是 *策略层*，描述 RS+AG 拆分原理;
  fused-kernel 是具体 kernel 实现 (zero-bubble + SHARP)。

  ## 实现层次
  - **Stream-level 并行** (基础): RS 在通信 stream, GEMM 在计算 stream, CUDA event 同步
  - **Async tensor-parallelism** (Megatron-LM): RS/AG 调度到下一个 GEMM 的 epilogue
  - **In-network reduction** (NVSwitch SHARP): 减少 N 倍带宽消耗 — switch 自己做 sum
  - **Hopper TMA pipelining** (FlashAttention v3 path): TMA 异步加载 + warp 并行计算

  ## 何时收益最大
  - **Dense decode** (MoE 走 EP, 不是 TP all-reduce 主战场)
  - **TP ≥ 4** (TP=2 通信开销小, overlap 收益不显著; TP ≥ 4 通信占比 > 30%)
  - **NVLink/HCCS 集群** (RDMA RoCE 集群延迟太大, overlap 收益受限)
  - **Long sequence prefill** (per-layer GEMM 大, RS/AG 时间能完全藏起来)

  ## 实测收益
  - Llama 70B TP=8 在 H100 NVL: 启用 overlap 后 throughput +1.4x, latency -25%
  - DeepSeek V3 disaggregated prefill TP=8: overlap 让 attention block per-layer 时间从 35 us 降 到 22 us

  ## 不适用
  - TP=1 / TP=2 (通信不是瓶颈)
  - 跨节点 TP (RoCE 延迟 > 节点内 NVLink, overlap 收益受限)
  - Compute-light 的层 (LayerNorm, residual — 通信占比反而更高)

applies_when:
  - tensor-parallelism-large
  - dense-llm-inference
  - long-context-prefill
  - hopper-or-newer-hardware
related_operators: [matmul, gemm, all-reduce, reduce-scatter, all-gather]
supporting_cases_min: 0
engines_supporting: [vllm, sglang, tensorrt-llm, megatron, deepspeed]
hardware_requires:
  - nvlink-or-hccs
  - cuda-streams
model_archetypes: [dense-llm, moe-llm, long-context, multi-modal]
speedup:
  - metric: prefill-throughput
    multiplier_min: 1.3
    multiplier_max: 1.8
    notes: 'TP=8 dense prefill, overlap vs no-overlap; SHARP-enabled cluster 收益更大'
  - metric: decode-throughput
    multiplier_min: 1.15
    multiplier_max: 1.4
    notes: 'Decode batch 小, 通信 / 计算比高, overlap 收益不如 prefill'
  - metric: ttft
    multiplier_min: 0.7
    multiplier_max: 0.85
    notes: 'TTFT 降 15-30% — 直接 user-visible'
trade_offs:
  - '调度复杂度上升, vLLM/Megatron 默认开启但偶尔需 manual tune'
  - '小 GEMM (decode batch=1) 没法完全藏住通信'
  - 'SHARP 要求 NVSwitch + IB 协同, 一般部署门槛高'
references:
  - title: 'Reducing Activation Recomputation in Large Transformer Models (TP overlap)'
    url: https://arxiv.org/abs/2205.05198
    source_type: paper
  - title: 'Megatron-LM async-tp'
    url: https://github.com/NVIDIA/Megatron-LM/blob/main/megatron/core/tensor_parallel/layers.py
    source_type: implementation
  - title: 'NVIDIA SHARP in-network reduction'
    url: https://docs.nvidia.com/networking/display/sharpv300
    source_type: docs
