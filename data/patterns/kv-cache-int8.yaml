id: kv-cache-int8
name: KV Cache 量化到 INT8/FP8
category: kv-cache
description_md: |
  ## 动机

  长 context 场景 (32K+) KV cache 占用显存超过权重本身。例如 70B 模型在
  128K context 下 KV cache 可达 80GB+。把 KV 从 BF16 量化到 INT8/FP8 直接把
  显存压缩 50%, 更多卡内显存可用于更长 batch / 更长 context。

  ## 量化方式
  - **Per-token static quant**: 简单, 质量损失最小
  - **Per-channel dynamic quant**: 实现复杂, 质量更好
  - **FP8 path** (Hopper+): 硬件 native, 几乎无开销

  ## 与权重量化的区别
  - 权重量化用 AWQ/GPTQ, 一次性校准
  - KV 量化每生成 token 都需要在线 quant + dequant; 必须高效

  ## 引擎支持
  - vLLM: --kv-cache-dtype fp8 (Hopper+) / int8 (older)
  - SGLang: kv_cache_dtype
  - TensorRT-LLM: kv_cache_quant_algo
applies_when:
  - long-context
  - high-memory-pressure
  - kv-dominant-workload
related_operators: [attention]
supporting_cases_min: 0
engines_supporting: [vllm, sglang, tensorrt-llm, lmdeploy]
hardware_requires:
  - native-fp8-or-int8-attention-kernel
model_archetypes: [long-context, dense-llm, moe-llm]
speedup:
  - metric: memory-footprint
    multiplier_min: 0.5
    multiplier_max: 0.55
    notes: 'BF16 → FP8/INT8: KV 占用降到一半'
  - metric: decode-throughput
    multiplier_min: 1.1
    multiplier_max: 1.3
    notes: '间接收益: 同卡内显存释放, 可以扩大 batch'
trade_offs:
  - '质量回退: 长 context 场景下偶尔出现 EAGLE-style 注意力错位 (rare)'
  - 'INT8 路径在非 Hopper 卡上 dequant 开销可能 5-10% 反向损失'
  - '与 prefix caching 的兼容性需要 engine-side 实现'
references:
  - title: 'KIVI: A Tuning-Free Asymmetric 2bit Quantization for KV Cache'
    url: https://arxiv.org/abs/2402.02750
    source_type: paper
  - title: 'vLLM FP8 KV cache docs'
    url: https://docs.vllm.ai/en/latest/quantization/fp8.html
    source_type: docs
