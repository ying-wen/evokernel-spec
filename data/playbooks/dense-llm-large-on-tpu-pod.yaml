id: dense-llm-large-on-tpu-pod
name: Dense 大模型在 TPU Pod 部署 (Gemini class / Gemma 3 / PaLM-style on TPU v5p / Trillium)
model_archetype: dense-llm-large
hardware_class: tpu-pod
workload_profile: [high-throughput-batch, low-latency-chat, cost-optimized]

summary_md: |
  ## 何时用此 playbook

  **适合**: 100B+ dense LLM (Gemini class / Gemma 3 27B / PaLM-derivative) 部署到
  Google Cloud TPU v5p / Trillium pod (32-1024 chip 规模). TPU 与 GPU 是完全不同的
  编程模型 — XLA 编译, ICI fabric, MaxText/JAX 优先.

  **不适合**: PyTorch-only stack (TPU PyTorch/XLA 走得通但效率低 30-40%)、cost
  optimization < $0.5/M tokens (TPU $/token 不如 H100/H200 优势, 优势在规模 + 总功耗).

  ## 核心配方与 GPU stack 的差异

  1. **TP=N=chips, no separate EP/PP**: TPU pod 上 ICI 全连接, 直接 mesh sharding,
     不分 TP/PP/EP — JAX/MaxText 用 GSPMD 自动切.
  2. **BF16 优先, INT8 次选**: TPU FP8 / FP4 还没 native; BF16 是首选, INT8 在 v5e/Trillium 启用.
  3. **MaxText / JAX 主栈, vLLM 次选**: 真生产 TPU 部署都走 JAX (Google 内部 + Anthropic Claude),
     vLLM 在 TPU 上是兼容层, 性能跌 20-30%.
  4. **Pallas custom kernel**: TPU 没有 CUDA — 自定义 kernel 走 Pallas (JAX) 或 XLA HLO,
     FlashAttention 等价物已内置 MaxText.
  5. **ICI 拓扑感知**: TPU pod 是 3D-torus, sharding 必须配合 mesh axis 才能高吞吐.

recipe:
  parallelism:
    tp: 'N (chip count, sharded via JAX mesh — 不分 TP/EP/PP)'
    ep: '0 (dense)'
    pp: '0'
    sp: '0'
    notes: 'TPU 用 GSPMD/Mesh sharding 而非 NVIDIA-style TP/EP/PP. JAX/MaxText 自动切, 用户标 axis names.'
    disaggregated: false
  quantization: bf16
  engine_primary: maxtext
  engine_alternates: [vllm, jax-llm-server]
  kernels:
    - flash-attention-v3
    - fused-mlp-silu
    - fused-rmsnorm-residual
  patterns:
    - flashattention-v3
    - prefix-caching
    - continuous-batching
  expected_perf:
    decode_tok_s_per_gpu_min: 1800
    decode_tok_s_per_gpu_max: 4000
    prefill_throughput_min: 22000
    prefill_throughput_max: 50000
    ttft_ms_p50_min: 100
    ttft_ms_p50_max: 250
    cost_per_million_tokens_usd_min: 0.20
    cost_per_million_tokens_usd_max: 0.55
    notes: 'TPU v5p chip ≈ H100 BF16 80%; Trillium 上探至 90%. $/token 优势在大规模 (1024+ chips), 中小规模 GPU 更便宜.'

decision_points:
  - scale: 'TPU v5e (16-256 chips, 推理优化)'
    guidance: '16-64 chip 跑 13B-30B dense; 256 chip 跑 100B+. INT8 在 v5e 启用 (decode 1.6x).'
  - scale: 'TPU v5p (16-1024 chips, train+infer)'
    guidance: 'v5p 单 chip BF16 459 TFLOPS, 大模型推理优于 v5e. JAX/MaxText 默认.'
  - scale: 'Trillium (v6e, 16-256 chips)'
    guidance: 'Trillium 4.7x v5e 性能, 预算优势最大. 但生态比 v5p 略新, 调优坑多.'

not_for:
  - 'PyTorch-only 团队 (TPU PyTorch/XLA 性能跌 30%; 走 hopper-cluster)'
  - 'MoE 部署 (TPU MoE 支持比 GPU 弱, 走 hopper-cluster + EP)'
  - 'Multi-modal vision-heavy (TPU vision encoder 优化弱, 走 hopper-single-node)'
  - '小模型 (< 10B 单 TPU chip 浪费)'

related_cases: []

affects_stages: [acquire, convert, compile, shard, serve]
status: stable

evidence:
  - id: ev-pb-tpu-001
    tier: estimated
    source_type: vendor-product-page
    url: https://cloud.google.com/tpu/docs
    accessed: '2026-04-30'
    citation: 'Synthesized from Google Cloud TPU v5p/v5e/Trillium docs + MaxText benchmarks + Anthropic Claude TPU disclosure (Trillium scale).'

disclaimers:
  - 'TPU 编程模型 vs GPU 完全不同 — 团队 ramp-up 时间 1-3 个月. 不要轻易把 PyTorch 模型直接迁过来.'
  - '$/token 优势体现在 1024+ chip 集群; 中小规模 (< 256 chips) 仍需对比 GPU 替代方案'
  - 'JAX 生态外的开源模型 (Llama / Qwen 等) 通常需要 conversion + 验证, 不是 plug-and-play'
