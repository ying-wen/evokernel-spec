id: moe-llm-medium-on-hopper-single-node
name: MoE 中等模型在 Hopper 单节点部署 (Mixtral 8x7B / 8x22B / Qwen 3 30B-A3B / GLM-4 MoE)
model_archetype: moe-llm-medium
hardware_class: hopper-single-node
workload_profile: [low-latency-chat, high-throughput-batch, cost-optimized]

summary_md: |
  ## 何时用此 playbook

  **适合**: 50B-200B 中等 MoE 模型 (Mixtral 8x7B 47B-A13B, Mixtral 8x22B 141B-A39B,
  Qwen 3 30B-A3B, GLM-4 MoE 100B class) 部署到 8 张 H100/H200 单节点. 这是企业 MoE
  服务最常见的 cost-effective 起点 — 比超大 MoE 简单 (单节点 EP), 比 dense 70B 便宜.

  **不适合**: 超大 MoE (> 200B, 走 moe-llm-large 多节点)、单卡端侧 (active params 13-40B
  仍需多卡)、reasoning long output (走 reasoning playbook).

  ## 核心配方与超大 MoE 的差异

  1. **EP=8 (intra-node only)**: 中等 MoE 的 expert 总数 (8-256) + active 比例足够小,
     单节点 8 卡 EP 即可装下全部 expert. **不需要跨节点 EP** (这是关键 cost 节省).
  2. **TP=8 共享 backbone**: 与 dense-llm-medium 类似, 共享层走 TP=8.
  3. **FP8 / BF16 都可**: H100 80 GB 装 Mixtral 8x22B BF16 紧 (141 GB > 80 GB × 8); H200 141 GB 余量大.
  4. **DeepEP 不强需**: 单节点 EP 走 NVLink-4, 通信代价小; DeepEP 主要解决跨节点 EP 痛点.
  5. **Pattern stack**: 与 dense 差不多, 加 moe-expert-routing.

recipe:
  parallelism:
    tp: '8 (intra-node NVLink-4)'
    ep: '8 (intra-node, no cross-node)'
    pp: '1'
    sp: '0'
    notes: 'EP=8 是中等 MoE 的甜点 — 全 expert 装单节点, 不需要 DeepEP cross-node 路径'
    disaggregated: false
  quantization: fp8-e4m3
  engine_primary: vllm
  engine_alternates: [sglang, tensorrt-llm, lmdeploy]
  kernels:
    - flash-attention-v3
    - fused-mlp-silu
    - fused-moe-dispatch-deepep
    - fused-rmsnorm-residual
    - fused-rope-qkv
  patterns:
    - flashattention-v3
    - prefix-radix-cache
    - paged-attention
    - continuous-batching
    - kv-cache-int8
    - moe-expert-routing-on-domestic
  expected_perf:
    decode_tok_s_per_gpu_min: 5500
    decode_tok_s_per_gpu_max: 11000
    prefill_throughput_min: 32000
    prefill_throughput_max: 70000
    ttft_ms_p50_min: 65
    ttft_ms_p50_max: 180
    cost_per_million_tokens_usd_min: 0.10
    cost_per_million_tokens_usd_max: 0.32
    notes: 'Mixtral 8x7B FP8 on H100x8 实测 ~7000 tok/s/GPU; Qwen 3 30B-A3B on H200x8 ~9000. 比 dense 70B 单卡吞吐高 30-50% (active params 仅 1/3-1/5).'

decision_points:
  - scale: '8 GPU H100 (1 NVL8)'
    guidance: 'TP=8 + EP=8 + FP8. Mixtral 8x7B 是甜点 (47B BF16 装 < 100 GB, FP8 < 50 GB).'
  - scale: '8 GPU H200 (1 NVL8)'
    guidance: '同 TP=8 + EP=8, BF16 留余量. Mixtral 8x22B 141B BF16 在 H200x8 (1.13 TB) 装下 + 长 KV.'
  - scale: '4 GPU H200 (1/2 node)'
    guidance: 'Mixtral 8x7B FP8: TP=4 + EP=4 可行; 性价比起步配置.'

not_for:
  - '超大 MoE (> 200B active total, 走 moe-llm-large playbook + 多节点 EP)'
  - 'Dense 模型 (本 playbook 配 EP=8 浪费; 走 dense-llm-medium)'
  - '严苛低延迟 SLA (TTFT P99 < 60ms 走 spec decode + 单节点)'

related_cases:
  - case-llama4-scout-h100x8-vllm-bf16-001
  - case-glm51-on-h200x8-vllm-bf16-001

affects_stages: [quantize, compile, shard, serve]
status: stable

evidence:
  - id: ev-pb-moe-medium-001
    tier: estimated
    source_type: third-party-review
    url: https://docs.vllm.ai/en/latest/models/supported_models.html
    accessed: '2026-04-30'
    citation: 'Synthesized from Mixtral / Qwen 3 / GLM-4 MoE launch reports + vLLM benchmark dashboard.'

disclaimers:
  - 'Active params (13-40B) 决定 perf, 总 params (47-200B) 决定 HBM 容量需求'
  - 'EP=8 是 sweet spot — 跨节点 EP 在 < 200B 总参数下 overhead > 收益'
