id: metax-c500
name: 沐曦 曦云 C500
vendor: metax
generation: metax-gen1
status: in-production
release_year: 2024
form_factor: pcie
compute:
  fp4_tflops: null
  fp8_tflops: null
  bf16_tflops: { value: 128, evidence_ref: ev-c500-001 }
  fp16_tflops: { value: 128, evidence_ref: ev-c500-001 }
  int8_tops: { value: 256, evidence_ref: ev-c500-001 }
architecture:
  compute_unit_count: { value: 64, evidence_ref: ev-c500-arch-001 }
  compute_unit_label: CU
  hbm_stacks: { value: 4, evidence_ref: ev-c500-arch-001 }
  process_node_nm: { value: 7, evidence_ref: ev-c500-arch-001 }
  pcie_gen: { value: 5, evidence_ref: ev-c500-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-c500-001 }
  memory_hierarchy:
    - name: 'L1 / Shared Memory (per CU)'
      scope: per-cu
      size_kb: { value: 128, evidence_ref: ev-c500-arch-001 }
      notes: 'MACA 架构 per-CU 128 KB shared memory. 64 CU × 128 KB = 8 MB total on-die scratchpad. 比同代 Hygon Z100 (64 KB) 大一倍.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 16, evidence_ref: ev-c500-arch-001 }
      notes: '估算 16 MB L2 (国产卡公开规格少, 与同代 7nm 单 die 设计一致).'
    - name: 'HBM2e'
      scope: global
      size_mb: { value: 65536, evidence_ref: ev-c500-001 }
      bandwidth_tbs: { value: 1.8, evidence_ref: ev-c500-001 }
      notes: '4 stacks × 16 GB ⇒ 64 GB / 1.8 TB/s. 受出口管制限制无法用 HBM3 (vs Hygon K100 已经升 HBM3).'
  on_chip_interconnect:
    name: 'MACA on-die NoC'
    bandwidth_tbs: { value: 0.8, evidence_ref: ev-c500-arch-001 }
    notes: '单 die 设计, NoC 带宽估算 0.8 TB/s. 与 Biren BR100 (chiplet) 是不同路线 — MetaX 走单 die 简化, Biren 走 chiplet 提升 yield.'
memory:
  capacity_gb: { value: 64, evidence_ref: ev-c500-001 }
  bandwidth_gbps: { value: 1800, evidence_ref: ev-c500-001 }
  type: HBM2e
scale_up:
  protocol: MetaXLink
  bandwidth_gbps: 200
  world_size: 8
  topology: switched
scale_out:
  bandwidth_gbps_per_card: 100
  protocol: RoCEv2
power:
  tdp_w: { value: 350, evidence_ref: ev-c500-001 }
software_support:
  drivers: ['MACA']
  engines: []
  quantizations: [fp16, int8]
  parallelism: [tp]
aliases: ['C500', '曦云C500']
chinese_names: ['曦云C500']
evidence:
  - id: ev-c500-001
    tier: official
    source_type: vendor-press-release
    url: https://www.metax-tech.com/
    accessed: '2026-04-28'
    citation: 'MetaX 曦云 C500 launch announcement (limited public detail)'
  - id: ev-c500-arch-001
    tier: estimated
    source_type: vendor-press-release
    url: https://www.metax-tech.com/
    accessed: '2026-04-28'
    citation: 'C500 (曦云C500): MACA architecture, 64 compute units, 4× HBM2e ⇒ 64 GB; TSMC 7nm-class'
disclaimers:
