disclaimers:
  - 'Ascend 910D specs are partly inferred from CANN 10.0 release notes + Huawei Ascend roadmap presentations. Full architecture whitepaper will likely publish 2026 H2 — values here are best-evidence estimates.'
  - 'HCCS-2 bandwidth (800 GB/s scale-up) + 192 GB HBM3 puts 910D in direct competition with H200 (4.8 TB/s, 141 GB) and MI325X (6 TB/s, 256 GB). 910D bandwidth lower than NVIDIA / AMD but capacity competitive.'
  - 'For sovereignty-constrained deployments (China datacenter), 910D is the SOTA path 2025-2026.'
notes: |
  Ascend 910D is the 2025 flagship in Huawei's data-center accelerator line — successor to
  910C with: 192 GB HBM3 (vs 128 GB), 3.2 TB/s (vs 2.6), HCCS-2 800 GB/s scale-up (vs 400),
  700W TDP (vs 550). Full Da Vinci 5 generation (existing entries: 910C is Da Vinci 3,
  910B is Da Vinci 2).

  Atlas 900 SuperPoD A3 (next-gen super-pod) uses 910D × 64 in HCCS-2 fully-connected mesh
  for sovereign-China LLM training/inference at the DeepSeek V3 671B / Qwen 3.6 235B-A22B
  scale. MindIE 2.0 is the canonical software stack; lmdeploy Ascend fork is community
  alternative.

  Trade-offs vs NVIDIA H200:
    + 35% larger HBM (192 vs 141 GB)
    - 33% lower bandwidth (3.2 vs 4.8 TB/s)
    + Sovereign supply chain (no US export restriction risk)
    - Smaller software ecosystem (CANN/MindIE vs CUDA/vLLM)

  Used by: lmdeploy MLU/Ascend fork, MindIE production deployments, China cloud providers
  (Huawei Cloud, China Telecom AI cloud).
