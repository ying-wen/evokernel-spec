disclaimers:
  - 'Journey 5 is automotive-tier NPU — designed for camera / radar / LiDAR perception (object detection, lane segmentation, path planning), NOT general LLM inference.'
  - 'INT8-only path; no BF16/FP16 production deployment (model conversion via Horizon AI Platform produces INT8 quantized models from PyTorch / ONNX).'
  - 'No vLLM / SGLang / lmdeploy support. The "engines" field is unsupported because LLM inference on J5 is not a target use case.'
  - 'Successor: Journey 6 (BPU 4.0, Nash architecture, 200-560 TOPS, 2024-2025 development; not yet in this corpus).'
notes: |
  Horizon Journey 5 是 v3.12 加入的国产 automotive-tier NPU. 与之前 corpus 中其他
  edge / consumer hardware 的核心区别:

  - **Use case**: ADAS / 自动驾驶感知 (camera / radar / LiDAR object detection +
    lane segmentation + path planning), 不是 LLM serving 或 image gen.
  - **Certification**: AEC-Q100 Grade 2 + ASIL-B(D) — 这是车规级安全认证,
    没有这个 OEM 不会用.
  - **Deployment scale**: 累计装车 800万+ 辆 (2024 数据), 包括 BYD 海豹 / 唐 / 元 PLUS,
    NIO ET / ES, Xpeng P7 / G9, Li Auto L7/L8, VW China, Chery, GAC.
  - **Software stack**: Horizon AI Platform (HAP) — 模型 INT8 量化 + 编译 + 部署
    完整 pipeline. PyTorch / ONNX 输入, 输出 .hbm (Horizon Binary Model) 格式.

  对比国产 edge AI 同类:

  | 维度 | Horizon J5 | Sophgo BM1684X | Cambricon MLU220 |
  |---|---|---|---|
  | INT8 TOPS | 128 | 32 | 16 |
  | TDP | 30W | 30W | 8W |
  | 主要场景 | 车载 ADAS | 工业视觉 / 安防 | 嵌入式 / 边缘 NLP |
  | 认证 | AEC-Q100 + ASIL-B(D) | 工业 -40~85°C | 商业级 |
  | LLM 支持 | ❌ (仅 vision) | ⚠️ 有限 | ⚠️ 有限 |
  | 量化 | INT8-only | INT4/8 + BF16 | INT8 |

  **v3.12 加入 J5 的意义**: 验证 corpus schema 能容纳 "vision-only NPU" 这种与 LLM
  完全无关的硬件. agent 在被问到 "我要在车上做实时 ADAS" 时, 应该正确推荐 J5 / J6
  而不是错误推荐 RTX 5090 (后者无车规认证). 这是真实的 production deployment 决策点.

  **未来 v3.13+ 候选**:
  - Horizon Journey 6 (BPU 4.0, 200-560 TOPS, 2024-2025 ramp)
  - 黑芝麻 A1000 (Black Sesame, 国产车规 NPU 同代竞品)
  - 寒武纪 MLU220 (国产 edge embedded NPU)
  - Mobileye EyeQ6 (Intel 子公司, 全球车规市场)

  v3.13+ 候选 use case: 车载多模态 (车机 LLM 副驾, 智能座舱 — 用 Journey 6 + 高通
  Snapdragon Cockpit 联合部署). 当前 Journey 5 只覆盖 perception 一半.
