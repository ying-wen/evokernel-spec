id: enflame-t21
name: 燧原 云燧 T21
vendor: enflame
generation: enflame-gen3
status: in-production
release_year: 2023
form_factor: pcie
compute:
  fp4_tflops: null
  fp8_tflops: null
  bf16_tflops: { value: 192, evidence_ref: ev-t21-001 }
  fp16_tflops: { value: 192, evidence_ref: ev-t21-001 }
  int8_tops: { value: 384, evidence_ref: ev-t21-001 }
architecture:
  compute_unit_count: { value: 80, evidence_ref: ev-t21-arch-001 }
  compute_unit_label: Cluster
  hbm_stacks: { value: 4, evidence_ref: ev-t21-arch-001 }
  process_node_nm: { value: 7, evidence_ref: ev-t21-arch-001 }
  memory_hierarchy:
    - name: 'Cluster Local SRAM (per cluster)'
      scope: per-cu
      size_kb: { value: 192, evidence_ref: ev-t21-arch-001 }
      notes: '80 cluster × 192 KB ≈ 15 MB total scratchpad. T21 GCU 架构每 cluster 独立 SRAM, 与 NVIDIA SM 类似设计.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 24, evidence_ref: ev-t21-arch-001 }
      notes: '估算 24 MB L2 — 7nm 单 die 设计, 比 NVIDIA A100 (40 MB) 小, 适合云燧的中等规模推理定位.'
    - name: 'HBM2e'
      scope: global
      size_mb: { value: 65536, evidence_ref: ev-t21-001 }
      bandwidth_tbs: { value: 1.6, evidence_ref: ev-t21-001 }
      notes: '4 stacks × 16 GB ⇒ 64 GB / 1.6 TB/s. 燧原走云端推理路线 — 功耗 400W 比训练卡 (700-1000W) 友好.'
  on_chip_interconnect:
    name: 'GCU on-die NoC'
    bandwidth_tbs: { value: 0.6, evidence_ref: ev-t21-arch-001 }
    notes: '单 die NoC 估算 0.6 TB/s. 燧原 GCU3.0 架构, 国产 GPGPU 主流路线之一 (与 Hygon DCU / MetaX C500 同代).'
memory:
  capacity_gb: { value: 64, evidence_ref: ev-t21-001 }
  bandwidth_gbps: { value: 1600, evidence_ref: ev-t21-001 }
  type: HBM2e
scale_up:
  protocol: Enflame-Link
  bandwidth_gbps: 300
  world_size: 8
  topology: switched
scale_out:
  bandwidth_gbps_per_card: 200
  protocol: RoCEv2
power:
  tdp_w: { value: 400, evidence_ref: ev-t21-001 }
software_support:
  drivers: ['TopsRider']
  engines:
    - { id: vllm, status: community-port }
  quantizations: [bf16, fp16, int8]
  parallelism: [tp, pp]
aliases: ['T21', '云燧T21']
chinese_names: ['云燧T21']
evidence:
  - id: ev-t21-001
    tier: official
    source_type: vendor-product-page
    url: https://www.enflame-tech.com/
    accessed: '2026-04-28'
    citation: 'Enflame Yunsui T21 product page (limited public spec)'
  - id: ev-t21-arch-001
    tier: estimated
    source_type: vendor-press-release
    url: https://www.enflame-tech.com/
    accessed: '2026-04-28'
    citation: 'T21 (云燧T21): Gen3 GPGPU, ~80 compute clusters, 4× HBM2e ⇒ 64 GB; TSMC 7nm-class'
disclaimers:
