disclaimers:
  - 'MLU220 is edge AI tier — 16 INT8 TOPS competitive at 8W envelope but well below datacenter (BM1684X 32 TOPS at 30W).'
  - 'CNToolkit + CNNL are canonical software stacks; lmdeploy-mlu community port is rough.'
  - 'For LLM serving: viable only for 1.5B-3B INT4 (TinyLlama, Qwen 1.5B, Phi-3-mini). Not suitable for 7B+ models.'
  - 'Primary use cases: industrial vision (defect detection), smart camera, robotics SLAM, AGV, embedded NLP.'
  - 'Successor: MLU220-M.2-X (refresh, 2024); next-gen MLU260 (announced 2025) — not in this corpus yet.'
notes: |
  MLU220 是 v3.15 加入的 Cambricon edge AI 入门级产品, 完成 Cambricon 在 corpus 的
  3 层覆盖 (edge MLU220 + datacenter MLU370 + frontier MLU590).

  与 corpus 中其他 国产 edge 对比:

  | 维度 | MLU220 | RK3588 NPU | BM1684X | Journey 5 |
  |---|---|---|---|---|
  | INT8 TOPS | 16 | 6 | 32 | 128 (auto-tier) |
  | TDP | 8W | 5-12W | 30W | 30W |
  | 内存 | 8 GB LPDDR4X | 32 GB LPDDR5 | 16 GB LPDDR5 | 16 GB LPDDR4X |
  | 形态 | M.2 / Mini-PCIe | 嵌入式 SoC | M.2 / Mini-PCIe | 自动驾驶 SoC |
  | 价格 | ¥800-2000 | $80-150 (dev board) | ¥1500-3000 | (整车销售) |
  | 软件栈 | CNToolkit + CNNL | RKNN-Toolkit2 | SOPHON SDK | Horizon AI Platform |
  | 国产化 | ✅ | ✅ | ✅ | ✅ |
  | LLM 友好 | ⚠️ 1.5-3B INT4 | ⚠️ TinyLlama/Phi-3 | ⚠️ 7B INT4 | ❌ vision-only |
  | 行业目标 | 工业 / 嵌入式 NLP | DIY / 创客 / 教育 | 工业 / 安防 | 智能驾驶 |

  **MLU220 的独特之处** (vs 其他 国产 edge):
  - **真正的 edge 级 AI 加速器** (8W vs BM1684X 30W) — 适合 fanless 嵌入式
    设备 (smart 工业相机 / AGV 控制器 / 边缘 IoT 网关)
  - **NRAM + WRAM 3-tier 内存层级** (vs RK3588 / BM1684X 单层): 同 Cambricon
    datacenter MLU370/590 一致, 让 edge ↔ datacenter port 比较顺
  - **MLU MMA primitive 一致**: 写在 BANG-C 的 kernel 可以 (理论上) 跨
    MLU220/370/590 部署 — 实际有 NRAM 容量差异需要重 tune

  **典型部署**:
  - 工厂智能相机 (实时缺陷检测 + 分类) — 占 MLU220 sales 主流
  - 物流 AGV 视觉感知 (lane / pallet detection) — 与 Horizon J5 在自动场景
    重叠, 但 MLU220 是工厂内 AGV (低速), J5 是公路自动驾驶 (高速 + 安全级)
  - 嵌入式 NLP 助手 (Qwen 1.5B INT4 上限) — 客服终端 / 工业 HMI
  - **不适合**: LLM serving (>7B), image / video gen (compute 不够), bio (CG
    tensor product 在 Vector 单元下慢)

  **v3.15 加入意义**: 完成 corpus 中 Cambricon 全产品线覆盖 (edge → datacenter →
  frontier). 配合 BANG-C tiled GEMM (v2.17 corpus entry) + v3.13 Cambricon MLU MMA
  primitive, agent 可以为 "工业相机部署 YOLO" 这类场景正确推荐 MLU220 + 给出
  完整的 BANG-C + CNToolkit + CNNL 部署 pipeline.
