      scope: per-cu
      size_kb: { value: 32, evidence_ref: ev-dcuk100-arch-001 }
      notes: 'per-CU L1; ~3 MB total.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 24, evidence_ref: ev-dcuk100-arch-001 }
      notes: 'Bumped from 4 MB on Z100 to 24 MB; closer to AMD CDNA 3 L2 design.'
