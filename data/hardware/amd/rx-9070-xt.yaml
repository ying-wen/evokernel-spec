disclaimers:
  - 'RDNA 4 dropped Infinity Cache from 96 MB (RDNA 3) to 64 MB to save die area; bandwidth-bound decode workloads may regress vs RX 7900 XTX despite newer architecture.'
  - 'ROCm support for consumer RDNA cards lags MI-series (data-center) by 6-12 months — driver issues are common 2025-2026.'
  - 'No Infinity Fabric — multi-GPU consumer rigs limited to PCIe Gen5 bandwidth.'
  - 'All performance figures are vendor-claimed unless tier=measured.'
notes: |
  RX 9070 XT is AMD's first consumer RDNA card with native FP8 tensor ops (RDNA 3 had
  INT8 only). Closes the gap with NVIDIA RTX 4090/5090 for FP8 LLM inference at much lower
  price ($599 vs $1599-$1999 MSRP), but pays in (a) smaller VRAM (16 GB vs 24-32 GB),
  (b) less mature inference stack (ROCm + vLLM still has rough edges on consumer RDNA),
  (c) lower bandwidth (640 GB/s vs 1008-1792 GB/s).

  Use case: cost-sensitive indie LLM inference for 7B-13B models with FP8/INT4 quant.
  Not the path for 70B+ models without aggressive offloading.

  Compared to RX 7900 XTX (RDNA 3 flagship): RDNA 4 has FP8 native (big win for inference);
  smaller VRAM (16 vs 24 GB); less Infinity Cache (64 vs 96 MB); higher boost clock
  (2.97 vs 2.5 GHz); newer drivers. RX 9070 XT is the inference-focused card; RX 7900 XTX
  is still the 24 GB choice for legacy workflows.
