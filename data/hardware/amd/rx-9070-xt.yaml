  l2_cache_mb: { value: 8, evidence_ref: ev-rx9070xt-arch-001 }
  process_node_nm: { value: 4, evidence_ref: ev-rx9070xt-arch-001 }
  die_area_mm2: { value: 357, evidence_ref: ev-rx9070xt-arch-001 }
  transistor_count_b: { value: 54, evidence_ref: ev-rx9070xt-arch-001 }
  pcie_gen: { value: 5, evidence_ref: ev-rx9070xt-001 }
