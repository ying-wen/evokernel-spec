  boost_clock_mhz: { value: 2970, evidence_ref: ev-rx9070xt-arch-001 }
  memory_hierarchy:
    - name: 'VGPR / SGPR'
      scope: per-cu
      size_kb: { value: 192, evidence_ref: ev-rx9070xt-arch-001 }
      notes: 'Vector + scalar register file per CU. RDNA 4 keeps RDNA 3"s 192 KB VGPR/CU.'
    - name: 'L0 / L1'
      scope: per-cu
      size_kb: { value: 128, evidence_ref: ev-rx9070xt-arch-001 }
      notes: 'Per-CU L0 (16 KB instr cache + 32 KB scalar) + L1 (per-shader-array 128 KB).'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 8, evidence_ref: ev-rx9070xt-arch-001 }
      notes: 'Reduced from RDNA 3 (RX 7900 XTX has 6 MB L2 + 96 MB Infinity Cache). RDNA 4 dropped Infinity Cache to save die area.'
    - name: 'L3 / Infinity Cache'
      scope: global
      size_mb: { value: 64, evidence_ref: ev-rx9070xt-arch-001 }
      notes: '64 MB Infinity Cache (down from RX 7900 XTX 96 MB). Smaller but faster (RDNA 4 latency improvements).'
    - name: 'GDDR6'
      scope: global
      size_mb: { value: 16384, evidence_ref: ev-rx9070xt-001 }
      bandwidth_tbs: { value: 0.640, evidence_ref: ev-rx9070xt-001 }
      notes: '16 GB GDDR6 20 Gbps × 256-bit bus = 640 GB/s. Smaller VRAM than RTX 5090 (32 GB) — limits to Llama 3 8B BF16 or 70B INT4 with offloading.'
  tensor_core_specs:
    - precision: fp8
      ops_per_cycle: { value: 512, evidence_ref: ev-rx9070xt-arch-001 }
      sparsity_multiplier: 1
      notes: 'RDNA 4 added native FP8 tensor ops (RDNA 3 had INT8 only). Major workstation/inference improvement vs RDNA 3.'
    - precision: bf16
      ops_per_cycle: { value: 128, evidence_ref: ev-rx9070xt-arch-001 }
      sparsity_multiplier: 1
