id: mi355x
name: AMD Instinct MI355X
vendor: amd
generation: cdna4
status: in-production
release_year: 2025
form_factor: oam
compute:
  fp4_tflops: { value: 9200, evidence_ref: ev-mi355x-001 }
  fp8_tflops: { value: 4600, evidence_ref: ev-mi355x-001 }
  bf16_tflops: { value: 2300, evidence_ref: ev-mi355x-001 }
  fp16_tflops: { value: 2300, evidence_ref: ev-mi355x-001 }
  int8_tops: { value: 4600, evidence_ref: ev-mi355x-001 }
architecture:
  tensor_isa: [amd-cdna4-mfma-16x16x32-fp4, amd-cdna3-mfma-32x32x16]
  compute_unit_count: { value: 256, evidence_ref: ev-mi355x-arch-001 }
  compute_unit_label: CU
  l2_cache_mb: { value: 256, evidence_ref: ev-mi355x-arch-001 }
  hbm_stacks: { value: 8, evidence_ref: ev-mi355x-arch-001 }
  process_node_nm: { value: 3, evidence_ref: ev-mi355x-arch-001 }
  pcie_gen: { value: 5, evidence_ref: ev-mi355x-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-mi355x-001 }
  memory_hierarchy:
    - name: 'LDS (Local Data Share)'
      scope: per-cu
      size_kb: { value: 160, evidence_ref: ev-mi355x-arch-001 }
      notes: '160 KB LDS per CU on CDNA 4 (vs 64 KB on CDNA 3); enables larger tile dimensions for FlashAttention.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 16, evidence_ref: ev-mi355x-arch-001 }
      notes: 'Per-XCD L2; 4 XCDs × 4 MB = 16 MB total L2 (smaller than NV but compensated by Infinity Cache).'
    - name: 'Infinity Cache (L3)'
      scope: global
      size_mb: { value: 256, evidence_ref: ev-mi355x-arch-001 }
      bandwidth_tbs: { value: 17.0, evidence_ref: ev-mi355x-arch-001 }
      notes: 'AMD-only L3 layer, dramatically smooths HBM bandwidth pressure for workloads with locality.'
    - name: 'HBM3e'
      scope: global
      size_mb: { value: 294912, evidence_ref: ev-mi355x-001 }
      bandwidth_tbs: { value: 8.0, evidence_ref: ev-mi355x-001 }
      notes: '8 stacks × 36 GB across 4 XCDs and 2 IODs. Disaggregated XCD design.'
  tensor_core_specs:
    - precision: fp4
      ops_per_cycle: { value: 4096, evidence_ref: ev-mi355x-arch-001 }
      sparsity_multiplier: 1
    - precision: fp8
      ops_per_cycle: { value: 2048, evidence_ref: ev-mi355x-arch-001 }
      sparsity_multiplier: 1
    - precision: bf16
      ops_per_cycle: { value: 1024, evidence_ref: ev-mi355x-arch-001 }
      sparsity_multiplier: 1
  on_chip_interconnect:
    name: 'Infinity Fabric (chiplet die-to-die)'
    bandwidth_tbs: { value: 5.5, evidence_ref: ev-mi355x-arch-001 }
    notes: 'CDNA 4 chiplet design: 4 XCDs (compute) + 2 IODs (I/O + cache) interconnected via Infinity Fabric. Per-XCD-to-IOD bandwidth ~5.5 TB/s aggregate.'
memory:
  capacity_gb: { value: 288, evidence_ref: ev-mi355x-001 }
  bandwidth_gbps: { value: 8000, evidence_ref: ev-mi355x-001 }
  type: HBM3e
scale_up:
  protocol: Infinity-Fabric
  bandwidth_gbps: 1075
  world_size: 8
  topology: fully-connected
scale_out:
  bandwidth_gbps_per_card: 400
  protocol: RoCEv2
power:
  tdp_w: { value: 1400, evidence_ref: ev-mi355x-001 }
  sustained_w: { value: 1200, evidence_ref: ev-mi355x-001 }
  peak_w: { value: 1400, evidence_ref: ev-mi355x-001 }
  cooling: liquid-direct
  operating_temp_c: { min: 5, max: 35 }
  throttle_temp_c: 95
  fp16_tflops_per_watt: { value: 1.79, evidence_ref: ev-mi355x-001 }
  power_connector: OAM-board
  notes: 'OAM. Liquid mandatory. CDNA4 architecture; FP4 native (1× the FLOPS of MI300X at 1.87× power).'
software_support:
  drivers: ['ROCm-6.x']
  engines:
    - { id: vllm, status: officially-supported, versions: ['0.6'] }
    - { id: sglang, status: officially-supported, versions: ['0.4'] }
  quantizations: [bf16, fp16, fp8-e4m3, fp4, int8]
  parallelism: [tp, pp, ep, sp]
aliases: ['MI355X']
evidence:
  - id: ev-mi355x-001
    tier: official
    source_type: vendor-press-release
    url: https://www.amd.com/en/products/accelerators/instinct/mi355x.html
    accessed: '2026-04-28'
    citation: 'AMD MI355X announcement (vendor-claimed)'
  - id: ev-mi355x-arch-001
    tier: estimated
    source_type: vendor-press-release
    url: https://www.amd.com/en/products/accelerators/instinct/mi355x.html
    accessed: '2026-04-28'
    citation: 'CDNA 4 architecture: 256 CUs (4 XCDs × 64 CU configurable), 256 MB Infinity Cache, 8× HBM3e stacks @ 36 GB ⇒ 288 GB, FP4 native @ 9.2 PFLOPS, TSMC 3nm'
disclaimers:
  - 'All performance figures are vendor-claimed unless tier=measured.'
