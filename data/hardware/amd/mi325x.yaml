id: mi325x
name: AMD Instinct MI325X
vendor: amd
generation: cdna3
status: in-production
release_year: 2024
form_factor: oam
compute:
  fp4_tflops: null
  fp8_tflops: { value: 2614, evidence_ref: ev-mi325x-001 }
  bf16_tflops: { value: 1307, evidence_ref: ev-mi325x-001 }
  fp16_tflops: { value: 1307, evidence_ref: ev-mi325x-001 }
  int8_tops: { value: 2614, evidence_ref: ev-mi325x-001 }
architecture:
  compute_unit_count: { value: 304, evidence_ref: ev-mi325x-arch-001 }
  compute_unit_label: CU
  l2_cache_mb: { value: 256, evidence_ref: ev-mi325x-arch-001 }
  hbm_stacks: { value: 8, evidence_ref: ev-mi325x-arch-001 }
  process_node_nm: { value: 5, evidence_ref: ev-mi325x-arch-001 }
  die_area_mm2: { value: 1017, evidence_ref: ev-mi325x-arch-001 }
  transistor_count_b: { value: 153, evidence_ref: ev-mi325x-arch-001 }
  pcie_gen: { value: 5, evidence_ref: ev-mi325x-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-mi325x-001 }
  memory_hierarchy:
    - name: 'LDS (Local Data Share)'
      scope: per-cu
      size_kb: { value: 64, evidence_ref: ev-mi325x-arch-001 }
      notes: 'Inherited from CDNA 3 architecture (same as MI300X). 64 KB per CU × 304 CUs ≈ 19 MB. CDNA 4 (MI355X) bumps this to 160 KB.'
    - name: 'L1 vector cache'
      scope: per-cu
      size_kb: { value: 32, evidence_ref: ev-mi325x-arch-001 }
      notes: 'per-CU L1; ~10 MB total across 304 CUs.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 4, evidence_ref: ev-mi325x-arch-001 }
      notes: 'Per-XCD L2; 8 XCDs × 4 MB = 32 MB total. Same as MI300X (CDNA 3 generation).'
    - name: 'Infinity Cache (L3)'
      scope: global
      size_mb: { value: 256, evidence_ref: ev-mi325x-arch-001 }
      bandwidth_tbs: { value: 17.0, evidence_ref: ev-mi325x-arch-001 }
      notes: 'AMD-distinguishing L3 layer (same as MI300X). Smooths HBM bandwidth pressure for locality-friendly workloads.'
    - name: 'HBM3e'
      scope: global
      size_mb: { value: 262144, evidence_ref: ev-mi325x-001 }
      bandwidth_tbs: { value: 6.0, evidence_ref: ev-mi325x-001 }
      notes: '8 stacks × 32 GB ⇒ 256 GB. MI325X is the HBM-upgrade refresh of MI300X (192 → 256 GB, 5.3 → 6.0 TB/s); compute peak unchanged. Sits between MI300X and MI355X chronologically.'
  tensor_core_specs:
    - precision: fp8
      ops_per_cycle: { value: 1024, evidence_ref: ev-mi325x-arch-001 }
      sparsity_multiplier: 1
    - precision: bf16
      ops_per_cycle: { value: 512, evidence_ref: ev-mi325x-arch-001 }
      sparsity_multiplier: 1
  on_chip_interconnect:
    name: 'Infinity Fabric (CDNA 3 chiplet)'
    bandwidth_tbs: { value: 5.3, evidence_ref: ev-mi325x-arch-001 }
    notes: 'Inherits MI300X die + IOD layout; HBM3e is the only physical change. 8 XCDs + 4 IODs.'
memory:
  capacity_gb: { value: 256, evidence_ref: ev-mi325x-001 }
  bandwidth_gbps: { value: 6000, evidence_ref: ev-mi325x-001 }
  type: HBM3e
scale_up:
  protocol: Infinity-Fabric
  bandwidth_gbps: 896
  world_size: 8
  topology: fully-connected
scale_out:
  bandwidth_gbps_per_card: 400
  protocol: RoCEv2
power:
  tdp_w: { value: 1000, evidence_ref: ev-mi325x-001 }
software_support:
  drivers: ['ROCm-6.x']
  engines:
    - { id: vllm, status: officially-supported, versions: ['0.6'] }
    - { id: sglang, status: officially-supported, versions: ['0.4'] }
  quantizations: [bf16, fp16, fp8-e4m3, int8, int4-awq]
  parallelism: [tp, pp, ep]
aliases: ['MI325X']
evidence:
  - id: ev-mi325x-001
    tier: official
    source_type: vendor-product-page
    url: https://www.amd.com/en/products/accelerators/instinct/mi300/mi325x.html
    accessed: '2026-04-28'
    citation: 'AMD MI325X product page'
  - id: ev-mi325x-arch-001
    tier: official
    source_type: vendor-whitepaper
    url: https://www.amd.com/en/products/accelerators/instinct/mi300/mi325x.html
    accessed: '2026-04-28'
    citation: 'MI325X reuses CDNA 3 die from MI300X (same 304 CUs, 256 MB Infinity Cache); upgraded to 8× HBM3e (32 GB stacks) ⇒ 256 GB capacity'
disclaimers:
  - 'All performance figures are vendor-claimed unless tier=measured.'
