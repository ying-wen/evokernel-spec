    citation: 'AMD CDNA 3 architecture: 304 CUs across 8 XCD chiplets, 256 MB Infinity Cache (L2), 8× HBM3 stacks @ 24 GB ⇒ 192 GB, 153B transistors @ TSMC 5nm + 6nm chiplets'
