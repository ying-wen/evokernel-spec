id: mi300x
name: AMD Instinct MI300X
vendor: amd
generation: cdna3
status: in-production
release_year: 2023
form_factor: oam
compute:
  fp4_tflops: null
  fp8_tflops: { value: 2614, evidence_ref: ev-mi300x-001 }
  bf16_tflops: { value: 1307, evidence_ref: ev-mi300x-001 }
  fp16_tflops: { value: 1307, evidence_ref: ev-mi300x-001 }
  int8_tops: { value: 2614, evidence_ref: ev-mi300x-001 }
architecture:
  tensor_isa: [amd-cdna3-mfma-32x32x16]
  compute_unit_count: { value: 304, evidence_ref: ev-mi300x-arch-001 }
  compute_unit_label: CU
  l2_cache_mb: { value: 256, evidence_ref: ev-mi300x-arch-001 }
  hbm_stacks: { value: 8, evidence_ref: ev-mi300x-arch-001 }
  process_node_nm: { value: 5, evidence_ref: ev-mi300x-arch-001 }
  die_area_mm2: { value: 1017, evidence_ref: ev-mi300x-arch-001 }
  transistor_count_b: { value: 153, evidence_ref: ev-mi300x-arch-001 }
  pcie_gen: { value: 5, evidence_ref: ev-mi300x-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-mi300x-001 }
  base_clock_mhz: { value: 1500, evidence_ref: ev-mi300x-arch-001 }
  boost_clock_mhz: { value: 2100, evidence_ref: ev-mi300x-arch-001 }
  memory_hierarchy:
    - name: 'LDS (Local Data Share)'
      scope: per-cu
      size_kb: { value: 64, evidence_ref: ev-mi300x-arch-001 }
      notes: '64 KB LDS per CU on CDNA 3. 304 CUs ⇒ ~19 MB total LDS. (CDNA 4 升至 160 KB)'
    - name: 'L1 vector cache'
      scope: per-cu
      size_kb: { value: 32, evidence_ref: ev-mi300x-arch-001 }
      notes: 'per-CU L1; 304 CUs ⇒ ~10 MB total. Shared between vector ALU and matrix engine.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 4, evidence_ref: ev-mi300x-arch-001 }
      notes: 'Per-XCD L2; 8 XCDs × 4 MB = 32 MB total — relatively small vs Hopper, compensated by Infinity Cache.'
    - name: 'Infinity Cache (L3)'
      scope: global
      size_mb: { value: 256, evidence_ref: ev-mi300x-arch-001 }
      bandwidth_tbs: { value: 17.0, evidence_ref: ev-mi300x-arch-001 }
      notes: 'AMD-distinguishing L3, 17 TB/s aggregate. Smooths HBM bandwidth pressure for any locality-friendly workload.'
    - name: 'HBM3'
      scope: global
      size_mb: { value: 196608, evidence_ref: ev-mi300x-001 }
      bandwidth_tbs: { value: 5.3, evidence_ref: ev-mi300x-001 }
      notes: '8 stacks × 24 GB across 8 XCDs and 4 IODs. Disaggregated package design.'
  tensor_core_specs:
    - precision: fp8
      ops_per_cycle: { value: 1024, evidence_ref: ev-mi300x-arch-001 }
      sparsity_multiplier: 1
    - precision: bf16
      ops_per_cycle: { value: 512, evidence_ref: ev-mi300x-arch-001 }
      sparsity_multiplier: 1
    - precision: fp16
      ops_per_cycle: { value: 512, evidence_ref: ev-mi300x-arch-001 }
      sparsity_multiplier: 1
  on_chip_interconnect:
    name: 'Infinity Fabric (chiplet die-to-die)'
    bandwidth_tbs: { value: 5.3, evidence_ref: ev-mi300x-arch-001 }
    notes: 'CDNA 3 chiplet design: 8 XCDs (compute) + 4 IODs (I/O + cache) connected via Infinity Fabric.'
memory:
  capacity_gb: { value: 192, evidence_ref: ev-mi300x-001 }
  bandwidth_gbps: { value: 5300, evidence_ref: ev-mi300x-001 }
  type: HBM3
scale_up:
  protocol: Infinity-Fabric
  bandwidth_gbps: 896
  world_size: 8
  topology: fully-connected
scale_out:
  bandwidth_gbps_per_card: 400
  protocol: RoCEv2
power:
  tdp_w: { value: 750, evidence_ref: ev-mi300x-001 }
  sustained_w: { value: 650, evidence_ref: ev-mi300x-001 }
  peak_w: { value: 750, evidence_ref: ev-mi300x-001 }
  cooling: liquid-direct
  operating_temp_c: { min: 5, max: 45 }
  throttle_temp_c: 95
  fp16_tflops_per_watt: { value: 1.74, evidence_ref: ev-mi300x-001 }
  power_connector: OAM-board
  notes: 'OAM (Open Accelerator Module). Available in air-cooled (MI300X-A, 600W) variant; flagship is liquid. Best HBM/W in production: 192GB / 5.3 TB/s at 750W.'
software_support:
  drivers: ['ROCm-6.x']
  engines:
    - { id: vllm, status: officially-supported, versions: ['0.6'] }
    - { id: sglang, status: officially-supported, versions: ['0.4'] }
  quantizations: [bf16, fp16, fp8-e4m3, int8, int4-awq]
  parallelism: [tp, pp, ep]
aliases: ['MI300X', 'MI300X 192GB']
evidence:
  - id: ev-mi300x-001
    tier: official
    source_type: vendor-product-page
