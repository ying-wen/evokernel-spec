  bandwidth_gbps: { value: 5300, evidence_ref: ev-mi300a-001 }
  type: HBM3
scale_up:
  protocol: Infinity-Fabric
  bandwidth_gbps: 768
  world_size: 4
  topology: fully-connected
scale_out:
