disclaimers:
  - 'RDNA 3 has no native FP8; INT8 only for low-precision LLM inference. For FP8 paths, RDNA 4 (RX 9070 XT) is required.'
  - 'ROCm consumer GPU support is mature on Linux but uneven on Windows (WSL works for inference; native Windows ROCm is incomplete).'
  - 'All performance figures are vendor-claimed unless tier=measured.'
notes: |
  RX 7900 XTX was AMD's 2022-2024 consumer answer to RTX 4090: 24 GB VRAM at half the
  price ($999 vs $1599 MSRP). Trade-off: no native FP8, slightly less bandwidth, and
  ROCm/vLLM ecosystem lag vs CUDA. Still useful in 2026 for INT4/INT8 LLM inference
  where 24 GB VRAM matters more than FP8 throughput.

  Compared to RX 9070 XT (newer RDNA 4): RX 9070 XT has native FP8 tensor ops (big
  inference win); RX 7900 XTX has more VRAM (24 vs 16 GB) and more Infinity Cache
  (96 vs 64 MB). For 70B INT4 deploys with offloading: 7900 XTX still preferable.

  Used by: indie LLM serving, llama.cpp ROCm path, LLM fine-tuning experiments on
  budget. ROCm community continues to optimize this card despite RDNA 4 release.
