    - precision: bf16
      ops_per_cycle: { value: 128, evidence_ref: ev-rx7900xtx-arch-001 }
      sparsity_multiplier: 1
      notes: 'RDNA 3 has WMMA (matrix accel) but no native FP8. INT8 path via dedicated AI cores. RDNA 4 (RX 9070 XT) added FP8.'
