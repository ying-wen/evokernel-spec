      scope: global
      size_mb: { value: 24576, evidence_ref: ev-rx7900xtx-001 }
      bandwidth_tbs: { value: 0.96, evidence_ref: ev-rx7900xtx-001 }
      notes: '24 GB GDDR6 20 Gbps × 384-bit bus = 960 GB/s. The 24 GB VRAM was the AMD answer to RTX 4090 — same capacity, lower bandwidth, half the price.'
