      scope: global
      size_mb: { value: 6, evidence_ref: ev-rx7900xtx-arch-001 }
    - name: 'L3 / Infinity Cache'
      scope: global
      size_mb: { value: 96, evidence_ref: ev-rx7900xtx-arch-001 }
      notes: '96 MB Infinity Cache (chiplet-based, MCD dies). Big perf win for cache-friendly workloads; less helpful for LLM decode (KV cache exceeds 96 MB at modest ctx).'
