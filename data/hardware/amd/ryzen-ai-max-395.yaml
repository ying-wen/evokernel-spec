disclaimers:
  - 'Ryzen AI Max+ 395 is APU not discrete GPU — direct comparison to Apple M-series is more apt than to RTX 5090. Bandwidth (256 GB/s) is between M4 Pro (273) and prosumer GPUs.'
  - 'ROCm consumer iGPU support is rougher than discrete RDNA cards; Linux works, Windows native is incomplete.'
  - 'The XDNA 2 NPU (50 TOPS INT8) is Windows-Copilot-focused and largely unused for LLM serving — the GPU portion does the actual inference work.'
  - 'All performance figures are vendor-claimed unless tier=measured.'
notes: |
  Ryzen AI Max+ 395 is AMD's "Strix Halo" APU — the first x86 SoC with quad-channel
  LPDDR5X memory delivering 256 GB/s unified bandwidth, putting it in the same league as
  Apple M-series for LLM inference. The 128 GB ceiling fits Llama 3 70B BF16 + 32K KV
  cache or 405B INT4 with offloading.

  Direct competitor to Apple M4 Pro / M4 Max for indie LLM workstation use case. Trade-offs:
    - vs Apple M4 Pro (273 GB/s, 64 GB max): similar bandwidth, 2× memory ceiling
    - vs Apple M3 Ultra (819 GB/s, 512 GB): much smaller (Apple wins on max scale)
    - vs RTX 5090 (1792 GB/s, 32 GB): 7× lower bandwidth but 4× memory + cheaper
    - vs DGX Spark (273 GB/s, 128 GB): same memory + bandwidth class; AMD adds CPU power,
      NVIDIA adds CUDA stack + Blackwell FP4 path

  Use case: Windows / Linux indie LLM workstation, mini-PC frontier-model setups,
  laptop-scale 70B inference. ASUS ROG Flow Z13 / HP Z2 / Framework Desktop are early
  adopter platforms. ROCm + vLLM port is the inference path; llama.cpp ROCm works as
  a fallback.
