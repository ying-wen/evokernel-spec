id: trillium
name: Google TPU Trillium (v6e)
vendor: google
generation: tpu-v6
status: in-production
release_year: 2024
form_factor: proprietary
compute:
  fp4_tflops: null
  fp8_tflops: { value: 918, evidence_ref: ev-trillium-001 }
  bf16_tflops: { value: 918, evidence_ref: ev-trillium-001 }
  fp16_tflops: { value: 918, evidence_ref: ev-trillium-001 }
  int8_tops: { value: 1836, evidence_ref: ev-trillium-001 }
architecture:
  compute_unit_count: { value: 1, evidence_ref: ev-trillium-arch-001 }
  compute_unit_label: XPU
  hbm_stacks: { value: 2, evidence_ref: ev-trillium-arch-001 }
  process_node_nm: { value: 5, evidence_ref: ev-trillium-arch-001 }
  memory_hierarchy:
    - name: 'TensorCore VMEM (vector memory)'
      scope: per-cu
      size_mb: { value: 16, evidence_ref: ev-trillium-arch-001 }
      notes: '16 MB Vector Memory per TensorCore on Trillium (v6e) — single-core chip vs v5p quad-core.'
    - name: 'CMEM (common memory)'
      scope: global
      size_mb: { value: 64, evidence_ref: ev-trillium-arch-001 }
      notes: 'Common Memory; staging area between HBM and VMEM. Smaller than v5p (192 MB).'
    - name: 'HBM2e'
      scope: global
      size_mb: { value: 32768, evidence_ref: ev-trillium-001 }
      bandwidth_tbs: { value: 1.640, evidence_ref: ev-trillium-001 }
      notes: '2 stacks × 16 GB. Trillium (v6e) trades HBM size/bandwidth for cost — designed for inference workloads where v5p sits in training territory.'
  on_chip_interconnect:
    name: 'ICI router (intra-pod)'
    bandwidth_tbs: { value: 3.2, evidence_ref: ev-trillium-001 }
    notes: 'Lower than v5p (4.8 TB/s) — Trillium pods top out at 256 chips vs v5p 8960.'
memory:
  capacity_gb: { value: 32, evidence_ref: ev-trillium-001 }
  bandwidth_gbps: { value: 1640, evidence_ref: ev-trillium-001 }
  type: HBM2e
scale_up:
  protocol: ICI
  bandwidth_gbps: 3200
  world_size: 256
  topology: 2d-torus
scale_out:
  bandwidth_gbps_per_card: 100
  protocol: DCN
power:
  tdp_w: { value: 250, evidence_ref: ev-trillium-001 }
software_support:
  drivers: ['JAX', 'PyTorch/XLA']
  engines:
    - { id: vllm, status: community-port }
  quantizations: [bf16, fp8-e4m3, int8]
  parallelism: [tp, pp, ep, sp]
aliases: ['Trillium', 'TPU v6e']
evidence:
  - id: ev-trillium-001
    tier: official
    source_type: vendor-press-release
    url: https://cloud.google.com/blog/products/compute/introducing-trillium-6th-gen-tpus
    accessed: '2026-04-28'
    citation: 'Google introduces Trillium (TPU v6e) blog post'
  - id: ev-trillium-arch-001
    tier: estimated
    source_type: vendor-press-release
    url: https://cloud.google.com/blog/products/compute/introducing-trillium-6th-gen-tpus
    accessed: '2026-04-28'
    citation: 'Trillium (TPU v6e): single TensorCore chip, 2× HBM2e ⇒ 32 GB; 2D-torus ICI fabric (256 chips/pod); estimated TSMC 5nm-class'
disclaimers:
  - 'TPU Trillium only available via Google Cloud.'
