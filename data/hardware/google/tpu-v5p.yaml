id: tpu-v5p
name: Google TPU v5p
vendor: google
generation: tpu-v5
status: in-production
release_year: 2023
form_factor: proprietary
compute:
  fp4_tflops: null
  fp8_tflops: null
  bf16_tflops: { value: 459, evidence_ref: ev-tpuv5p-001 }
  fp16_tflops: { value: 459, evidence_ref: ev-tpuv5p-001 }
  int8_tops: { value: 918, evidence_ref: ev-tpuv5p-001 }
architecture:
  compute_unit_count: { value: 4, evidence_ref: ev-tpuv5p-arch-001 }
  compute_unit_label: XPU
  hbm_stacks: { value: 4, evidence_ref: ev-tpuv5p-arch-001 }
  process_node_nm: { value: 5, evidence_ref: ev-tpuv5p-arch-001 }
  memory_hierarchy:
    - name: 'TensorCore VMEM (vector memory)'
      scope: per-cu
      size_mb: { value: 32, evidence_ref: ev-tpuv5p-arch-001 }
      notes: '32 MB Vector Memory per TensorCore × 4 = 128 MB total per chip — Google-specific systolic-array scratchpad. Programmed via XLA HLO; not directly user-visible.'
    - name: 'CMEM (common memory)'
      scope: global
      size_mb: { value: 192, evidence_ref: ev-tpuv5p-arch-001 }
      notes: 'Common Memory shared across TensorCores; staging area for HBM ↔ VMEM data movement. Roughly equivalent to L2 on GPUs.'
    - name: 'HBM2e'
      scope: global
      size_mb: { value: 97280, evidence_ref: ev-tpuv5p-001 }
      bandwidth_tbs: { value: 2.765, evidence_ref: ev-tpuv5p-001 }
      notes: '4 stacks × 24 GB ⇒ 95 GiB. HBM2e bandwidth between A100 and H100. ICI fabric (4.8 TB/s) lets v5p scale to 8960-chip pods — much larger than NVL72.'
  on_chip_interconnect:
    name: 'On-chip NoC + ICI router'
    bandwidth_tbs: { value: 4.8, evidence_ref: ev-tpuv5p-001 }
    notes: 'Connects 4 TensorCores intra-chip + ICI router for inter-chip 3D torus scale-up.'
memory:
  capacity_gb: { value: 95, evidence_ref: ev-tpuv5p-001 }
  bandwidth_gbps: { value: 2765, evidence_ref: ev-tpuv5p-001 }
  type: HBM2e
scale_up:
  protocol: ICI
  bandwidth_gbps: 4800
  world_size: 8960
  topology: 3d-torus
scale_out:
  bandwidth_gbps_per_card: 100
  protocol: DCN
power:
  tdp_w: { value: 700, evidence_ref: ev-tpuv5p-001 }
software_support:
  drivers: ['JAX', 'PyTorch/XLA', 'TensorFlow']
  engines:
    - { id: vllm, status: community-port }
  quantizations: [bf16, fp16, int8]
  parallelism: [tp, pp, ep, sp]
aliases: ['TPU v5p']
evidence:
  - id: ev-tpuv5p-001
    tier: official
    source_type: vendor-product-page
    url: https://cloud.google.com/tpu/docs/v5p
    accessed: '2026-04-28'
    citation: 'Google Cloud TPU v5p documentation'
  - id: ev-tpuv5p-arch-001
    tier: official
    source_type: vendor-whitepaper
    url: https://cloud.google.com/tpu/docs/system-architecture-tpu-vm
    accessed: '2026-04-28'
    citation: 'TPU v5p: 4 systolic-array TensorCores per chip + scalar/vector units, 4× HBM2e ⇒ 95 GB; 3D-torus ICI fabric (up to 8960 chips/pod); TSMC 5nm-class'
disclaimers:
  - 'TPU v5p only available via Google Cloud.'
