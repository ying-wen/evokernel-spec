id: pingtouge-hanguang-800
name: 平头哥 含光 800
vendor: pingtouge
generation: hanguang-gen1
status: in-production
release_year: 2019
form_factor: pcie
compute:
  fp4_tflops: null
  fp8_tflops: null
  bf16_tflops: null
  fp16_tflops: { value: 25, evidence_ref: ev-hg800-001 }
  int8_tops: { value: 825, evidence_ref: ev-hg800-001 }
architecture:
  compute_unit_count: { value: 4, evidence_ref: ev-hg800-arch-001 }
  compute_unit_label: Cluster
  process_node_nm: { value: 12, evidence_ref: ev-hg800-arch-001 }
  transistor_count_b: { value: 17, evidence_ref: ev-hg800-arch-001 }
  pcie_gen: { value: 4, evidence_ref: ev-hg800-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-hg800-001 }
  memory_hierarchy:
    - name: 'Cluster Local Buffer (per cluster)'
      scope: per-cu
      size_kb: { value: 2048, evidence_ref: ev-hg800-arch-001 }
      notes: '4 cluster × 2 MB ≈ 8 MB total on-die SRAM. INT8 推理优化设计 — 大 cluster buffer 减少 LPDDR5 trip.'
    - name: 'On-chip cache'
      scope: global
      size_mb: { value: 16, evidence_ref: ev-hg800-arch-001 }
      notes: '估算 16 MB chip-wide cache. 含光 800 主打 INT8 inference, 不需要 GPU 那种大 L2.'
    - name: 'LPDDR5 (off-package)'
      scope: global
      size_mb: { value: 16384, evidence_ref: ev-hg800-001 }
      bandwidth_tbs: { value: 0.256, evidence_ref: ev-hg800-001 }
      notes: '16 GB LPDDR5 / 256 GB/s — 不用 HBM, 走 LPDDR5 是 inference-only 设计的 cost trade-off (vs HBM 价格 5-10x). 限制: 大模型装不下, 主要跑 < 10B INT8.'
  on_chip_interconnect:
    name: 'Cluster mesh (NPU)'
    bandwidth_tbs: { value: 0.5, evidence_ref: ev-hg800-arch-001 }
    notes: '4 cluster mesh, 估算 0.5 TB/s. 平头哥 NPU 是阿里巴巴自研路线 — 与 GPU 完全不同的路径 (CNN/Transformer inference 为主, 不通用).'
memory:
  capacity_gb: { value: 16, evidence_ref: ev-hg800-001 }
  bandwidth_gbps: { value: 256, evidence_ref: ev-hg800-001 }
  type: LPDDR5
scale_up:
  protocol: PCIe-Gen4
  bandwidth_gbps: 64
  world_size: 4
  topology: pcie-fabric
scale_out:
  bandwidth_gbps_per_card: 100
  protocol: RoCEv2
power:
  tdp_w: { value: 280, evidence_ref: ev-hg800-001 }
software_support:
  drivers: ['HanGuangAI']
  engines:
    - { id: hanguang-engine, status: officially-supported, versions: ['1.0'] }
  quantizations: [int8]
  parallelism: []
aliases: ['HanGuang 800']
chinese_names: ['含光800']
evidence:
  - id: ev-hg800-001
    tier: official
    source_type: vendor-press-release
    url: https://www.t-head.cn/
    accessed: '2026-04-28'
    citation: 'T-Head HanGuang 800 launch coverage (Alibaba Cloud Apsara 2019)'
  - id: ev-hg800-arch-001
    tier: estimated
    source_type: vendor-press-release
    url: https://www.t-head.cn/
    accessed: '2026-04-28'
    citation: 'HanGuang 800 (含光800): 4-cluster NPU, 17B transistors @ TSMC 12nm; INT8-focused inference accelerator (Apsara 2019 launch)'
disclaimers:
  - 'HanGuang 800 is INT8 inference-focused; not designed for FP training.'
  - 'Specs are vendor-claimed; LLM inference support is not the primary use case.'
