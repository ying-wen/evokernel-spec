disclaimers:
  - 'RK3588 NPU is true edge tier — 6 INT8 TOPS limits to small models (TinyLlama, Phi-3-mini, Qwen 1.5B INT4). Llama 3 8B INT4 runs at ~1-3 tok/s.'
  - 'RKNN-Toolkit2 is the canonical SW stack; LLM inference relies on community llama.cpp + RKNPU patches.'
  - 'Bandwidth (51 GB/s) is the constraint — even quantized small models are bandwidth-bound at decode.'
  - 'Sub-$150 dev boards (Orange Pi 5, Rock 5B) make RK3588 the volume entry point for hobbyist edge AI.'
notes: |
  RK3588 NPU is the **国产 mass-market edge** tier — at $30 chip / $80-150 dev board cost,
  it powers consumer-grade edge AI (smart cameras, robotics dev kits, single-board
  computers). 6 INT8 TOPS is enough for TinyLlama/Phi-3-mini/Qwen-1.5B INT4 but not
  serious LLM workloads.

  This is the volume tier for indie embedded AI projects. Edge AI hobbyists run llama.cpp +
  RKNPU patch; commercial deployments use RKNN-Toolkit2 SDK.

  v3.3 opens the **国产 edge class** — RK3588 NPU joins as the first entry. v3.9 will
  add Sophgo BM1684X (16 TOPS), Horizon Journey 5 (128 TOPS auto), Allwinner V853
  (1 TOPS ultra-low-power).

  Compared to NVIDIA Jetson Orin Nano ($249, 40 INT8 TOPS, 8W): RK3588 is 6× cheaper but
  6× lower TOPS. RK3588 wins on $/dev-board accessibility; Orin wins on raw inference
  perf for the hobbyist tier.
