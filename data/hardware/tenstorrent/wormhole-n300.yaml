id: wormhole-n300
name: Tenstorrent Wormhole n300
vendor: tenstorrent
generation: tenstorrent-wormhole-gen2
status: in-production
release_year: 2024
form_factor: pcie
compute:
  fp4_tflops: null
  fp8_tflops: { value: 466, evidence_ref: ev-tt-wh-001 }
  bf16_tflops: { value: 233, evidence_ref: ev-tt-wh-001 }
  fp16_tflops: { value: 233, evidence_ref: ev-tt-wh-001 }
  fp32_tflops: { value: 74, evidence_ref: ev-tt-wh-001 }
  int8_tops: { value: 466, evidence_ref: ev-tt-wh-001 }
architecture:
  compute_unit_count: { value: 128, evidence_ref: ev-tt-wh-001 }
  compute_unit_label: Tensix
  process_node_nm: { value: 12, evidence_ref: ev-tt-wh-001 }
  pcie_gen: { value: 4, evidence_ref: ev-tt-wh-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-tt-wh-001 }
  memory_hierarchy:
    - name: 'Tensix L1 SRAM (per tile)'
      scope: per-cu
      size_kb: { value: 1500, evidence_ref: ev-tt-wh-001 }
      notes: 'Per-Tensix-core 1.5 MB SRAM (5× 256 KB RISC-V data SRAM + 1 MB matrix-engine scratchpad). 128 cores × 1.5 MB ≈ 192 MB total on-die SRAM — 大量本地 SRAM, 减少 GDDR6 访问.'
    - name: 'GDDR6'
      scope: global
      size_mb: { value: 24576, evidence_ref: ev-tt-wh-001 }
      bandwidth_tbs: { value: 0.576, evidence_ref: ev-tt-wh-001 }
      notes: '12 channels × 16 Gbps = 576 GB/s. GDDR6 (而非 HBM) 是成本/能效 trade-off — Wormhole 定位 edge-to-data-center 跨级.'
  on_chip_interconnect:
    name: 'Tile NoC mesh'
    bandwidth_tbs: { value: 1.0, evidence_ref: ev-tt-wh-001 }
    notes: '128 Tensix tiles 通过 mesh NoC 互联, 每个方向 1 GB/s/tile. Tile-based 架构: 每个 Tensix 核 = 5 个 RISC-V CPU + 1 matrix engine, 类似 Cerebras/Groq 的 spatial 设计.'
memory:
  capacity_gb: { value: 24, evidence_ref: ev-tt-wh-001 }
  bandwidth_gbps: { value: 576, evidence_ref: ev-tt-wh-001 }
  type: GDDR6
scale_up:
  protocol: Galaxy-Mesh
  bandwidth_gbps: 800
  world_size: 32
  topology: 2D-torus
scale_out:
  bandwidth_gbps_per_card: 200
  protocol: Ethernet
power:
  tdp_w: { value: 300, evidence_ref: ev-tt-wh-001 }
software_support:
  drivers: ['TT-Metal', 'TT-NN', 'TT-Buda']
  engines:
    - { id: vllm, status: community-port, notes: 'tt-vllm fork; full open-source software stack' }
  quantizations: [bf16, fp16, fp8-e4m3, int8]
  parallelism: [tp, pp]
aliases: ['Wormhole', 'Wormhole n300', 'tt-wh-n300']
chinese_names: ['Tenstorrent 虫洞 n300']
evidence:
  - id: ev-tt-wh-001
    tier: official
    source_type: vendor-product-page
    url: https://tenstorrent.com/hardware/wormhole
    accessed: '2026-04-29'
    citation: 'Tenstorrent Wormhole n300 — 128 Tensix cores, 24GB GDDR6, 12nm Global Foundries, RISC-V based, fully open-source software stack (TT-Metal/TT-NN). Galaxy interconnect for 32-card 2D-torus topology.'
disclaimers:
  - 'Tenstorrent emphasizes open-source software and RISC-V instruction set — distinct from CUDA/ROCm/CANN walled gardens.'
  - 'Tile-based architecture: each Tensix core has 5 RISC-V CPUs + 1 matrix engine + 32 KB compute SRAM.'
