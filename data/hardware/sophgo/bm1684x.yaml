disclaimers:
  - 'BM1684X is edge AI tier — 16 BF16 TFLOPS is well below datacenter GPUs but competitive in 30W envelope.'
  - 'SOPHON SDK + TPU-MLIR are the canonical software stacks; lmdeploy community port has rough edges.'
  - 'For serious LLM serving (>13B): not viable. For 7B Llama 3 INT4: real-time on single chip. Multi-chip BM1684X-8 card scales to 70B INT4 with offloading.'
  - 'Industrial / IoT / smart camera / robotics use case primary. Not a desktop dev kit (vs Jetson Thor / RK3588).'
notes: |
  BM1684X 是 国产 edge AI 加速器市场的领头产品 (2023-2025), 在国内 IoT / 安防 / 工业
  视觉场景大量部署. 与 Jetson Orin / RK3588 同代竞品:

  | 维度 | BM1684X | Jetson Orin Nano | RK3588 NPU |
  |---|---|---|---|
  | INT8 TOPS | 32 | 40 (8GB) | 6 |
  | BF16 TFLOPS | 16 | 20 | 3 |
  | TDP | 30W | 8-15W | 5-12W |
  | 内存 | 16 GB LPDDR5 (32 GB option) | 8 GB LPDDR5 | 32 GB LPDDR5 |
  | 带宽 | 51 GB/s | 102 GB/s | 51 GB/s |
  | 价格 | ¥1500-3000 | $249-499 | $80-150 (dev board) |
  | 软件栈 | SOPHON SDK | NVIDIA JetPack | RKNN-Toolkit2 |
  | 国产 | ✅ | ❌ | ✅ |

  **Sophgo 的主要优势**: 国产化供应链 (政府 / SOE 项目要求), 工业温度范围 (-40 to 85°C),
  passive cooling 适合 fanless 嵌入式系统. 大模型部署上劣势明显 vs Jetson (后者 GPU 更
  通用 + CUDA 生态).

  **典型部署**: 安防 camera (实时人脸 / 物体识别), 工业视觉 (缺陷检测), 边缘 NLP
  (智能客服 7B INT4), AGV 机器人 SLAM. 大模型 LLM 部署仅适合 7B-13B INT4, 长 context
  受 51 GB/s 内存带宽限制 (decode 慢).

  软件栈成熟度 (vs Jetson 完整的 CUDA 生态):
  - SOPHON SDK: 官方; 模型 quantize + compile + 部署完整 pipeline
  - TPU-MLIR: 开源 ONNX → BM1684X 编译器 (类似 TensorRT)
  - lmdeploy-sophgo: 社区 fork, 实验性 LLM 部署 (vLLM / SGLang 不支持)
  - 没有 ComfyUI / Diffusers 路径 (image gen + video gen 完全不可行)

  v3.12 加入 BM1684X 的核心动机: 用户多次明确要求 "端侧推理芯片". BM1684X
  代表了真实国产 edge AI 部署场景 (vs 之前 corpus 偏 server/datacenter).
