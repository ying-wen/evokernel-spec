id: trainium-2
name: AWS Trainium 2
vendor: aws
generation: trn2
status: in-production
release_year: 2024
form_factor: proprietary
compute:
  fp4_tflops: null
  fp8_tflops: { value: 1300, evidence_ref: ev-trn2-001 }
  bf16_tflops: { value: 650, evidence_ref: ev-trn2-001 }
  fp16_tflops: { value: 650, evidence_ref: ev-trn2-001 }
  int8_tops: { value: 1300, evidence_ref: ev-trn2-001 }
architecture:
  compute_unit_count: { value: 8, evidence_ref: ev-trn2-arch-001 }
  compute_unit_label: XPU
  hbm_stacks: { value: 4, evidence_ref: ev-trn2-arch-001 }
  process_node_nm: { value: 5, evidence_ref: ev-trn2-arch-001 }
  memory_hierarchy:
    - name: 'NeuronCore SBUF (per-core)'
      scope: per-cu
      size_mb: { value: 24, evidence_ref: ev-trn2-arch-001 }
      notes: '24 MB SBUF per NeuronCore-v3 × 8 cores ≈ 192 MB on-chip SRAM. AWS-distinguishing scratchpad for activation reuse — much larger per-core SRAM than NV (256 KB SMEM/SM) trades flexibility for streaming-friendly compiler pipelines.'
    - name: 'HBM3'
      scope: global
      size_mb: { value: 98304, evidence_ref: ev-trn2-001 }
      bandwidth_tbs: { value: 2.9, evidence_ref: ev-trn2-001 }
      notes: '4 stacks × 24 GB. Lower bandwidth than NV/AMD top-tier (8.0 TB/s on B200), but Trn2 compensates via large per-core SBUF + NeuronLink-v3 fabric scaling to 64 chips per UltraServer.'
  tensor_core_specs:
    - precision: fp8
      ops_per_cycle: { value: 1024, evidence_ref: ev-trn2-arch-001 }
      sparsity_multiplier: 1
    - precision: bf16
      ops_per_cycle: { value: 512, evidence_ref: ev-trn2-arch-001 }
      sparsity_multiplier: 1
  on_chip_interconnect:
    name: 'NeuronLink-v3 fabric (intra-package + intra-server)'
    bandwidth_tbs: { value: 1.28, evidence_ref: ev-trn2-001 }
    notes: 'Connects NeuronCore-v3 engines on-chip + extends to 64-chip Trn2 UltraServer scale-up domain (largest scale-up per single-vendor system in our catalog after CloudMatrix 384).'
memory:
  capacity_gb: { value: 96, evidence_ref: ev-trn2-001 }
  bandwidth_gbps: { value: 2900, evidence_ref: ev-trn2-001 }
  type: HBM3
scale_up:
  protocol: NeuronLink
  bandwidth_gbps: 1280
  world_size: 64
  topology: ring-mesh
scale_out:
  bandwidth_gbps_per_card: 400
  protocol: EFA
power:
  tdp_w: { value: 500, evidence_ref: ev-trn2-001 }
  sustained_w: { value: 425, evidence_ref: ev-trn2-001 }
  peak_w: { value: 500, evidence_ref: ev-trn2-001 }
  cooling: liquid-direct
  operating_temp_c: { min: 5, max: 35 }
  throttle_temp_c: 95
  fp16_tflops_per_watt: { value: 1.30, evidence_ref: ev-trn2-001 }
  power_connector: proprietary-aws
  notes: 'AWS-only deployment in Trn2 UltraServer (16-card chassis liquid-cooled). No standalone purchase — only available via EC2 Trn2 instances.'
software_support:
  drivers: ['Neuron SDK']
  engines:
    - { id: vllm, status: community-port }
  quantizations: [bf16, fp16, fp8-e4m3, int8]
  parallelism: [tp, pp]
aliases: ['Trainium2', 'Trn2']
evidence:
  - id: ev-trn2-001
    tier: official
    source_type: vendor-product-page
    url: https://aws.amazon.com/ai/machine-learning/trainium/
    accessed: '2026-04-28'
    citation: 'AWS Trainium 2 product page'
  - id: ev-trn2-arch-001
    tier: official
    source_type: vendor-whitepaper
    url: https://awsdocs-neuron.readthedocs-hosted.com/en/latest/general/arch/neuron-hardware/trainium2.html
    accessed: '2026-04-28'
    citation: 'Trainium 2: 8 NeuronCore-v3 engines, 4× HBM3 ⇒ 96 GB; NeuronLink-v3 fabric scales to 64 chips per Trn2 UltraServer; TSMC 5nm-class'
disclaimers:
  - 'AWS does not sell chips; only available via EC2 Trn2 instances.'
