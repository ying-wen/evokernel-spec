id: inferentia-2
name: AWS Inferentia 2
vendor: aws
generation: inf2
status: in-production
release_year: 2023
form_factor: proprietary
compute:
  fp4_tflops: null
  fp8_tflops: null
  bf16_tflops: { value: 190, evidence_ref: ev-inf2-001 }
  fp16_tflops: { value: 190, evidence_ref: ev-inf2-001 }
  int8_tops: { value: 380, evidence_ref: ev-inf2-001 }
architecture:
  compute_unit_count: { value: 2, evidence_ref: ev-inf2-arch-001 }
  compute_unit_label: XPU
  hbm_stacks: { value: 2, evidence_ref: ev-inf2-arch-001 }
  process_node_nm: { value: 7, evidence_ref: ev-inf2-arch-001 }
  memory_hierarchy:
    - name: 'NeuronCore-v2 SBUF (per-core)'
      scope: per-cu
      size_mb: { value: 12, evidence_ref: ev-inf2-arch-001 }
      notes: '12 MB SBUF per NeuronCore-v2 × 2 = 24 MB on-chip SRAM (smaller than Trainium 2''s 192 MB; Inferentia 2 is inference-only, lighter compute density).'
    - name: 'HBM2e'
      scope: global
      size_mb: { value: 32768, evidence_ref: ev-inf2-001 }
      bandwidth_tbs: { value: 0.820, evidence_ref: ev-inf2-001 }
      notes: '2 stacks × 16 GB. Lower bandwidth than Trainium 2 (2.9 TB/s) — Inferentia is positioned for cost-efficient batch inference, not training.'
  on_chip_interconnect:
    name: 'NeuronLink + intra-chip mesh'
    bandwidth_tbs: { value: 0.384, evidence_ref: ev-inf2-001 }
    notes: 'Connects 2 NeuronCore-v2 + extends to 12-chip Inf2 instance scale-up via inter-chip NeuronLink.'
memory:
  capacity_gb: { value: 32, evidence_ref: ev-inf2-001 }
  bandwidth_gbps: { value: 820, evidence_ref: ev-inf2-001 }
  type: HBM2e
scale_up:
  protocol: NeuronLink
  bandwidth_gbps: 384
  world_size: 12
  topology: ring
scale_out:
  bandwidth_gbps_per_card: 100
  protocol: EFA
power:
  tdp_w: { value: 175, evidence_ref: ev-inf2-001 }
software_support:
  drivers: ['Neuron SDK']
  engines:
    - { id: vllm, status: community-port }
  quantizations: [bf16, fp16, int8]
  parallelism: [tp]
aliases: ['Inferentia2', 'Inf2']
evidence:
  - id: ev-inf2-001
    tier: official
    source_type: vendor-product-page
    url: https://aws.amazon.com/ai/machine-learning/inferentia/
    accessed: '2026-04-28'
    citation: 'AWS Inferentia 2 product page'
  - id: ev-inf2-arch-001
    tier: official
    source_type: vendor-whitepaper
    url: https://awsdocs-neuron.readthedocs-hosted.com/en/latest/general/arch/neuron-hardware/inferentia2.html
    accessed: '2026-04-28'
    citation: 'Inferentia 2: 2 NeuronCore-v2 engines (each tensor + scalar + vector + GPSIMD), 2× HBM2e ⇒ 32 GB; TSMC 7nm-class'
disclaimers:
  - 'Inferentia2 only available via EC2 Inf2 instances.'
