disclaimers:
  - 'M4 Pro 273 GB/s bandwidth is the constraint for LLM inference; halving M4 Max bandwidth doubles decode latency.'
  - 'Mac mini M4 Pro at $1399 starting price is the cheapest viable Apple Silicon LLM platform — competitive entry point for indie ML developers.'
  - 'All performance figures are vendor-claimed unless tier=measured.'
notes: |
  M4 Pro is the entry-tier Apple Silicon for LLM inference. 64 GB max unified memory fits
  Llama 3 8B-32B at BF16, or 70B at INT4 with offloading. Bandwidth (273 GB/s) is the
  floor of viable LLM decode — below this, generation feels slow even for small models.

  Mac mini M4 Pro at $1399 is the cheapest Apple Silicon Mac that can run frontier LLMs
  locally. Apple's positioning vs the LLM-curious dev/indie demographic. Mac Studio M4
  Pro variant ($1999) doubles the chassis but same chip.

  Use case: indie developers prototyping local LLM apps, students, light fine-tuning.
  For serious 70B+ inference: step up to M4 Max (546 GB/s) or M3 Ultra (819 GB/s).
