disclaimers:
  - 'M4 Max LLM perf is highly bandwidth-bound. 70B BF16 decode: ~5-8 tok/s typical (MLX), 4× lower on llama.cpp.'
  - 'Different from existing apple-m4-max-npu entry: this entry covers the FULL chip (GPU dominant for MLX) vs that entry covers the Neural Engine only (38 TFLOPS subset).'
  - 'MacBook Pro thermal envelope limits sustained workload — long inference jobs throttle after ~10 minutes; Mac Studio M4 Max variant runs continuously.'
notes: |
  M4 Max is the laptop tier of Apple Silicon LLM inference. 128 GB unified memory fits
  Llama 3 70B BF16 with KV cache budget; the GPU's 70 BF16 TFLOPS + 546 GB/s bandwidth
  give ~5-8 tok/s decode (MLX) on 70B BF16. For 8B-32B models: 30-60 tok/s decode.

  Use case: developer laptop for local LLM workflows, "prototype on the plane" inference,
  edge demos. Trade-offs: thermally constrained for sustained workloads (laptop chassis);
  no scale-out path; MLX-only for peak perf.

  Compared to M3 Ultra: half the GPU cores (40 vs 80), 2/3 the bandwidth (546 vs 819),
  1/4 the memory (128 vs 512 GB) — but 1/3 the price ($3199 vs $9999) and portable.
