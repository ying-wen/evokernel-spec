  - 'Mac Studio M5 Max + M5 Ultra variants expected 2026 — not yet shipped at this writing.'
notes: |
  M5 Max is Apple's first Silicon with **dedicated GPU tensor units** — closing the
  architectural gap with NVIDIA tensor cores / AMD WMMA / Intel XMX. Real LLM inference
  uplift on MLX is typically 1.5-2× vs M4 Max for the same model + quant.

  Use case: developer laptop for serious local LLM workflows, replaces M4 Max as the
  apex MacBook Pro inference platform. Mac Studio M5 Max + M5 Ultra variants expected
  2026; the M5 Max in MBP is the Apple Silicon LLM SOTA mid-2026.

  Compared to M4 Max (v3.1): 35% more BF16 TFLOPS, 17% more bandwidth, dedicated tensor
  units (the architectural step-change). For 70B BF16 decode: ~10-12 tok/s on M5 Max vs
  ~5-8 on M4 Max.
