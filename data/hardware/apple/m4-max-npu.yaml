id: apple-m4-max-npu
name: Apple M4 Max Neural Engine
vendor: apple
generation: apple-neural-engine-gen5
status: in-production
release_year: 2024
form_factor: embedded-soc
compute:
  fp4_tflops: null
  fp8_tflops: null
  bf16_tflops: { value: 38, evidence_ref: ev-m4-001 }
  fp16_tflops: { value: 38, evidence_ref: ev-m4-001 }
  int8_tops: { value: 38, evidence_ref: ev-m4-001 }
  tops_per_watt: { value: 3.4, evidence_ref: ev-m4-001 }
architecture:
  compute_unit_count: { value: 16, evidence_ref: ev-m4-001 }
  compute_unit_label: NeuralEngine
  process_node_nm: { value: 3, evidence_ref: ev-m4-001 }
  memory_hierarchy:
    - name: 'ANE Local Cache (per core)'
      scope: per-cu
      size_kb: { value: 128, evidence_ref: ev-m4-001 }
      notes: 'Per-Neural-Engine 核心 ~128 KB 私有 SRAM (估算). 16 核 × 128 KB ≈ 2 MB total ANE-local cache.'
    - name: 'System Level Cache (SLC)'
      scope: global
      size_mb: { value: 32, evidence_ref: ev-m4-001 }
      notes: 'M4 Max SoC SLC ~32 MB — 与 CPU/GPU/ANE 共享, Apple SoC 关键设计.'
    - name: 'LPDDR5X (unified, CPU+GPU+ANE 共享)'
      scope: global
      size_mb: { value: 131072, evidence_ref: ev-m4-001 }
      bandwidth_tbs: { value: 0.546, evidence_ref: ev-m4-001 }
      notes: '128 GB unified memory — UMA 架构让 CPU/GPU/ANE 共用同一物理内存, 无 PCIe transfer. M4 Max LLM 推理的 sleeper 优势 (端侧大模型可装下).'
  on_chip_interconnect:
    name: 'AMX/SLC/ANE fabric (unified)'
    bandwidth_tbs: { value: 0.55, evidence_ref: ev-m4-001 }
    notes: 'Apple Silicon UMA 让 ANE 直接读 unified memory — 没有独立 GPU 那种 HBM/PCIe 不对称设计. 对推理影响: KV cache 可以用全部 unified memory.'
memory:
  capacity_gb: { value: 128, evidence_ref: ev-m4-001 }
  bandwidth_gbps: { value: 546, evidence_ref: ev-m4-001 }
  type: LPDDR5X
scale_up:
  protocol: UMA
  bandwidth_gbps: 546
  world_size: 1
  topology: unified
scale_out:
  bandwidth_gbps_per_card: 0
  protocol: none
power:
  tdp_w: { value: 11, evidence_ref: ev-m4-001 }
software_support:
  drivers: ['Core ML 8', 'Metal 4']
  engines:
    - { id: vllm, status: community-port, notes: 'mlx-vllm port; native llama.cpp + MLX support' }
  quantizations: [bf16, fp16, int8, int4-awq]
  parallelism: [tp]
aliases: ['M4 Max', 'M4 Max ANE', 'M4 Neural Engine']
chinese_names: ['苹果 M4 Max 神经引擎']
evidence:
  - id: ev-m4-001
    tier: official
    source_type: vendor-product-page
    url: https://www.apple.com/mac/m4/
    accessed: '2026-04-29'
    citation: 'Apple M4 Max: 16-core Neural Engine @ 38 TOPS, unified memory architecture (UMA) up to 128 GB LPDDR5X with 546 GB/s bandwidth shared with GPU/CPU. ~11 W package TDP for ANE portion.'
disclaimers:
  - 'Apple M4 NPU rating is 38 TOPS at INT8 precision; FP16 is roughly 38 TFLOPS via Metal Performance Shaders.'
  - 'Unified memory means the 128 GB capacity is shared across CPU/GPU/ANE; for inference, expect ~80-100 GB usable.'
  - 'No multi-card scaling: single-package only. World-size=1 reflects this.'
  - 'Energy efficiency (3.4 TOPS/W) is the strongest of any accelerator in the corpus — relevant for edge / on-device.'
