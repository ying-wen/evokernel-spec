notes: |
  M5 Pro completes the M5 family alongside M5 Max (v3.2). Mid-tier MacBook Pro / Mac mini
  inference platform. With dedicated GPU tensor units (the M5 generation step-change),
  real LLM perf uplift on MLX is ~1.5× vs M4 Pro for the same model + quant.

  Mac mini M5 Pro at $1599 starting price is the next-step-up from M4 Pro ($1399) for
  indie LLM developers who want the M5 tensor-unit boost.
