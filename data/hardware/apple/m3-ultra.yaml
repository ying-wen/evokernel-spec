disclaimers:
  - 'Apple Silicon LLM inference performance is constrained by GPU memory bandwidth + MLX kernel maturity, not raw TFLOPS. Real Llama 3 70B BF16 decode on M3 Ultra: ~10-15 tok/s typical (vs vendor TFLOPS would suggest much higher).'
  - 'No NVLink / Infinity Fabric / PCIe scaling — single-Mac only. Multi-Mac via Thunderbolt 5 is experimental community work.'
  - 'MLX is the canonical Apple Silicon LLM stack; vLLM/llama.cpp work but with reduced perf vs MLX.'
  - 'All performance figures are vendor-claimed unless tier=measured.'
notes: |
  M3 Ultra Mac Studio is a uniquely positioned LLM inference platform: **512 GB unified
  memory** is more than ANY single-card datacenter GPU (H200 = 141 GB, B200 = 192 GB,
  MI355X = 288 GB). For models that fit in 512 GB but not in a single H100/H200, M3 Ultra
  is the only single-device option.

  Use case: local inference of frontier models (Llama 3 405B FP16, DeepSeek V3 671B INT4),
  research workflows requiring large memory + low latency to model load, "develop on the
  same machine you'll deploy to" prototyping.

  Trade-offs: bandwidth (819 GB/s) is between L40S (864) and RX 7900 XTX (960) — well below
  HBM-class. Decode throughput is bandwidth-bound and noticeably slower than equivalent
  $-cost data-center setup. But the 512 GB at $9999 max is unmatched in any other tier.

  MLX is the canonical software stack: written by Apple, optimized for unified memory,
  and usually 2-3× faster than llama.cpp on the same hardware.
