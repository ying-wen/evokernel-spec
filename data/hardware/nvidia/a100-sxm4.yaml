id: a100-sxm4
name: NVIDIA A100 SXM4 80GB
vendor: nvidia
generation: ampere
status: in-production
release_year: 2020
form_factor: sxm
compute:
  fp4_tflops: null
  fp8_tflops: null
  bf16_tflops: { value: 312, evidence_ref: ev-a100-001 }
  fp16_tflops: { value: 312, evidence_ref: ev-a100-001 }
  int8_tops: { value: 624, evidence_ref: ev-a100-001 }
architecture:
  compute_unit_count: { value: 108, evidence_ref: ev-a100-arch-001 }
  compute_unit_label: SM
  tensor_cores_per_cu: { value: 4, evidence_ref: ev-a100-arch-001 }
  l2_cache_mb: { value: 40, evidence_ref: ev-a100-arch-001 }
  hbm_stacks: { value: 5, evidence_ref: ev-a100-arch-001 }
  process_node_nm: { value: 7, evidence_ref: ev-a100-arch-001 }
  die_area_mm2: { value: 826, evidence_ref: ev-a100-arch-001 }
  transistor_count_b: { value: 54, evidence_ref: ev-a100-arch-001 }
  pcie_gen: { value: 4, evidence_ref: ev-a100-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-a100-001 }
  base_clock_mhz: { value: 1095, evidence_ref: ev-a100-arch-001 }
  boost_clock_mhz: { value: 1410, evidence_ref: ev-a100-arch-001 }
  memory_hierarchy:
    - name: 'Register File'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-a100-arch-001 }
      notes: '256 KB per SM × 108 SMs ≈ 27 MB total RF. Same RF size as Hopper but fewer SMs.'
    - name: 'L1 / Shared Memory'
      scope: per-cu
      size_kb: { value: 192, evidence_ref: ev-a100-arch-001 }
      notes: 'Configurable up to 164 KB SMEM (vs Hopper 228 KB). 108 SMs × 192 KB ≈ 20 MB total. SMEM size is the main attention-tile-size limit on Ampere vs Hopper.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 40, evidence_ref: ev-a100-arch-001 }
      notes: 'Single-partition L2 (Hopper split it into 2× 25 MB). Smaller than Hopper L2 (40 vs 50 MB).'
    - name: 'HBM2e'
      scope: global
      size_mb: { value: 81920, evidence_ref: ev-a100-001 }
      bandwidth_tbs: { value: 2.039, evidence_ref: ev-a100-001 }
      notes: '5 stacks × 16 GB. HBM2e bandwidth ~60% of H100 (3.35 TB/s) — main reason A100 is much slower at decode despite same 80 GB capacity.'
  tensor_core_specs:
    - precision: bf16
      ops_per_cycle: { value: 256, evidence_ref: ev-a100-arch-001 }
      sparsity_multiplier: 2
    - precision: fp16
      ops_per_cycle: { value: 256, evidence_ref: ev-a100-arch-001 }
      sparsity_multiplier: 2
    - precision: tf32
      ops_per_cycle: { value: 128, evidence_ref: ev-a100-arch-001 }
      sparsity_multiplier: 2
  on_chip_interconnect:
    name: 'NVLink-3.0 SM ↔ L2 crossbar'
    bandwidth_tbs: { value: 4.5, evidence_ref: ev-a100-arch-001 }
    notes: 'Pre-Hopper crossbar; lower bandwidth than Hopper NVLink-C2C (7 TB/s on H100).'
memory:
  capacity_gb: { value: 80, evidence_ref: ev-a100-001 }
  bandwidth_gbps: { value: 2039, evidence_ref: ev-a100-001 }
  type: HBM2e
scale_up:
  protocol: NVLink-3.0
  bandwidth_gbps: 600
  world_size: 8
  topology: switched
  switch: nvswitch-gen2
scale_out:
  bandwidth_gbps_per_card: 200
  protocol: InfiniBand-HDR
  nic: ConnectX-6
power:
  tdp_w: { value: 400, evidence_ref: ev-a100-001 }
  sustained_w: { value: 350, evidence_ref: ev-a100-001 }
  peak_w: { value: 400, evidence_ref: ev-a100-001 }
  cooling: air
  operating_temp_c: { min: 5, max: 50 }
  throttle_temp_c: 92
  fp16_tflops_per_watt: { value: 0.78, evidence_ref: ev-a100-001 }
  power_connector: SXM-board
  notes: 'SXM4 socket; air-cooled in HGX A100. PCIe variant available (300W TDP). Lower fp16/W than Hopper but mature ecosystem.'
software_support:
  drivers: ['CUDA-11.x', 'CUDA-12.x']
  engines:
    - { id: vllm, status: officially-supported, versions: ['0.6'] }
    - { id: sglang, status: officially-supported, versions: ['0.4'] }
    - { id: tensorrt-llm, status: officially-supported, versions: ['0.14'] }
    - { id: lmdeploy, status: officially-supported, versions: ['0.6'] }
  quantizations: [bf16, fp16, int8, int4-awq, int4-gptq, w4a16]
  parallelism: [tp, pp, ep, sp, disaggregated]
aliases: ['A100 SXM', 'A100-80GB', 'A100']
chinese_names: []
evidence:
  - id: ev-a100-001
    tier: official
    source_type: vendor-datasheet
    url: https://www.nvidia.com/en-us/data-center/a100/
    accessed: '2026-04-28'
    citation: 'NVIDIA A100 Tensor Core GPU Datasheet (80GB SXM variant)'
  - id: ev-a100-arch-001
    tier: official
    source_type: vendor-whitepaper
    url: https://images.nvidia.com/aem-dam/en-zz/Solutions/data-center/nvidia-ampere-architecture-whitepaper.pdf
    accessed: '2026-04-28'
    citation: 'NVIDIA Ampere Architecture Whitepaper (GA100 die: 108 SMs enabled, 40 MB L2, 54B transistors, 826 mm² @ TSMC 7nm)'
disclaimers:
  - 'A100 has no FP8 native (Hopper+); FP8 only via emulated paths.'
  - 'All performance figures are vendor-claimed unless tier=measured.'
