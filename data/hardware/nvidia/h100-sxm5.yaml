id: h100-sxm5
name: NVIDIA H100 SXM5 80GB
vendor: nvidia
generation: hopper-gen1
status: in-production
release_year: 2022
form_factor: sxm
compute:
  fp4_tflops: null
  fp8_tflops: { value: 1979, evidence_ref: ev-h100-001 }
  bf16_tflops: { value: 989, evidence_ref: ev-h100-001 }
  fp16_tflops: { value: 989, evidence_ref: ev-h100-001 }
  int8_tops: { value: 1979, evidence_ref: ev-h100-001 }
architecture:
  tensor_isa: [nvidia-hopper-wgmma, nvidia-hopper-tma]
  compute_unit_count: { value: 132, evidence_ref: ev-h100-arch-001 }
  compute_unit_label: SM
  tensor_cores_per_cu: { value: 4, evidence_ref: ev-h100-arch-001 }
  l2_cache_mb: { value: 50, evidence_ref: ev-h100-arch-001 }
  hbm_stacks: { value: 5, evidence_ref: ev-h100-arch-001 }
  process_node_nm: { value: 4, evidence_ref: ev-h100-arch-001 }
  die_area_mm2: { value: 814, evidence_ref: ev-h100-arch-001 }
  transistor_count_b: { value: 80, evidence_ref: ev-h100-arch-001 }
  pcie_gen: { value: 5, evidence_ref: ev-h100-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-h100-001 }
  base_clock_mhz: { value: 1095, evidence_ref: ev-h100-arch-001 }
  boost_clock_mhz: { value: 1980, evidence_ref: ev-h100-arch-001 }
  memory_hierarchy:
    - name: 'Register File'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-h100-arch-001 }
      notes: '256 KB per SM (65536 × 32-bit registers); 33 MB total chip-wide.'
    - name: 'L1 / Shared Memory'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-h100-arch-001 }
      notes: 'Configurable: up to 228 KB SMEM + 28 KB L1, or vice-versa. ~33 MB total across 132 SMs.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 50, evidence_ref: ev-h100-arch-001 }
      bandwidth_tbs: { value: 5.5, evidence_ref: ev-h100-arch-001 }
      notes: 'Split into 2 partitions of 25 MB each on the GH100 die.'
    - name: 'HBM3'
      scope: global
      size_mb: { value: 81920, evidence_ref: ev-h100-002 }
      bandwidth_tbs: { value: 3.35, evidence_ref: ev-h100-002 }
      notes: '5 stacks × 16 GB; 5th stack disabled on partial-yield SKUs.'
  tensor_core_specs:
    - precision: fp8
      ops_per_cycle: { value: 1024, evidence_ref: ev-h100-arch-001 }
      sparsity_multiplier: 1
    - precision: bf16
      ops_per_cycle: { value: 512, evidence_ref: ev-h100-arch-001 }
      sparsity_multiplier: 1
    - precision: fp16
      ops_per_cycle: { value: 512, evidence_ref: ev-h100-arch-001 }
      sparsity_multiplier: 1
  on_chip_interconnect:
    name: 'NVLink-C2C (intra-die crossbar)'
    bandwidth_tbs: { value: 7.0, evidence_ref: ev-h100-arch-001 }
    notes: 'Connects 132 SMs to L2 partitions; effectively the SM↔L2 crossbar bandwidth.'
memory:
  capacity_gb: { value: 80, evidence_ref: ev-h100-002 }
  bandwidth_gbps: { value: 3350, evidence_ref: ev-h100-002 }
  type: HBM3
scale_up:
  protocol: NVLink-4.0
  bandwidth_gbps: 900
  world_size: 8
  topology: switched
  switch: nvswitch-gen3
scale_out:
  bandwidth_gbps_per_card: 400
  protocol: InfiniBand-NDR
  nic: ConnectX-7
power:
  tdp_w: { value: 700, evidence_ref: ev-h100-001 }
  sustained_w: { value: 600, evidence_ref: ev-h100-001 }
  peak_w: { value: 700, evidence_ref: ev-h100-001 }
  cooling: liquid-direct
  operating_temp_c: { min: 5, max: 45 }
  throttle_temp_c: 95
  fp16_tflops_per_watt: { value: 1.41, evidence_ref: ev-h100-001 }
  power_connector: SXM-board
  notes: 'SXM5 socket — board provides power; liquid-cooled in HGX H100 / DGX H100 chassis. Sustained typically 80-90% of TDP under inference.'
software_support:
  drivers: ['CUDA-12.x']
  engines:
    - { id: vllm, status: officially-supported, versions: ['0.6'] }
    - { id: sglang, status: officially-supported, versions: ['0.4'] }
    - { id: tensorrt-llm, status: officially-supported, versions: ['0.14'] }
    - { id: lmdeploy, status: officially-supported, versions: ['0.6'] }
  quantizations: [bf16, fp16, fp8-e4m3, fp8-e5m2, int8, int4-awq, int4-gptq]
  parallelism: [tp, pp, ep, sp, disaggregated]
aliases: ['H100 SXM', 'H100-80GB']
chinese_names: []
