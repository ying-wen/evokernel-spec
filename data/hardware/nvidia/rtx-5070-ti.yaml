disclaimers:
  - 'RTX 5070 Ti slots between RTX 5070 ($549) and RTX 5080 ($999) — at $749, it"s the price/perf sweet spot for indie 13B-32B FP4/FP8 LLM serving.'
  - '16 GB VRAM is identical to RTX 5080 / 5070 — VRAM tier doesn"t differentiate; perf does.'
notes: |
  RTX 5070 Ti completes the Blackwell consumer lineup in the corpus
  (RTX 5090, 5080, 5070 Ti, 5070 — 4 of the 5 SKUs; only RTX 5060 / 5060 Ti remain
  for v3.13+ if needed).

  Pricing comparison vs RTX 5070 / 5080:

  | SKU | Price | SMs | L2 | GDDR7 BW | TGP | $/FP8-TFLOP |
  |---|---|---|---|---|---|---|
  | RTX 5070 | $549 | 48 | 48 MB | 672 GB/s | 250W | $1.11 |
  | **RTX 5070 Ti** | **$749** | **70** | **56 MB** | **896 GB/s** | **300W** | **$1.07** |
  | RTX 5080 | $999 | 84 | 64 MB | 960 GB/s | 360W | $1.11 |
  | RTX 5090 | $1999 | 170 | 96 MB | 1792 GB/s | 575W | $1.19 |

  **RTX 5070 Ti is the $/perf winner** in the lineup — slightly better $/FP8-TFLOP than
  both RTX 5070 and RTX 5080. For indie LLM serving where 16 GB VRAM fits the model
  and the goal is throughput-per-dollar, this is the SKU to recommend.

  **When to pick RTX 5070 Ti vs alternatives**:
  - vs RTX 5080: save $250 for 17% lower throughput. Sweet spot for 13B FP8.
  - vs RTX 5070: spend $200 more for 46% more compute. Worth it for 32B INT4.
  - vs RX 9070 XT ($599): NVIDIA wins on FP4 (no AMD FP4) + mature CUDA stack.
  - vs Arc B580 ($249): 3× the price, ~3× the throughput; same VRAM tier (16 vs 12 GB).
