id: gb200-nvl72
name: NVIDIA GB200 NVL72
vendor: nvidia
generation: blackwell-gen1
status: in-production
release_year: 2024
form_factor: nvl
compute:
  fp4_tflops: { value: 9000, evidence_ref: ev-gb200-001 }
  fp8_tflops: { value: 4500, evidence_ref: ev-gb200-001 }
  bf16_tflops: { value: 2250, evidence_ref: ev-gb200-001 }
  fp16_tflops: { value: 2250, evidence_ref: ev-gb200-001 }
  int8_tops: { value: 4500, evidence_ref: ev-gb200-001 }
architecture:
  compute_unit_count: { value: 160, evidence_ref: ev-gb200-arch-001 }
  compute_unit_label: SM
  tensor_cores_per_cu: { value: 4, evidence_ref: ev-gb200-arch-001 }
  l2_cache_mb: { value: 100, evidence_ref: ev-gb200-arch-001 }
  hbm_stacks: { value: 8, evidence_ref: ev-gb200-arch-001 }
  process_node_nm: { value: 4, evidence_ref: ev-gb200-arch-001 }
  memory_hierarchy:
    - name: 'Register File (per SM)'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-gb200-arch-001 }
      notes: 'Blackwell SM 寄存器文件 256 KB/SM × 160 SMs = 40 MB. 与 Hopper H100 同 RF size.'
    - name: 'Shared Memory / L1 (per SM)'
      scope: per-cu
      size_kb: { value: 228, evidence_ref: ev-gb200-arch-001 }
      notes: 'Blackwell SMEM 228 KB/SM (与 Hopper 相同). 160 SM × 228 KB ≈ 36 MB total scratchpad.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 100, evidence_ref: ev-gb200-arch-001 }
      notes: '100 MB L2 — 比 H100 (50 MB) 翻倍, 但 GB200 是 dual-die 设计, 实际 50 MB/die × 2.'
    - name: 'HBM3e'
      scope: global
      size_mb: { value: 196608, evidence_ref: ev-gb200-001 }
      bandwidth_tbs: { value: 8.0, evidence_ref: ev-gb200-001 }
      notes: '8 stacks × 24 GB ⇒ 192 GB / 8 TB/s — 比 H200 (141 GB / 4.8 TB/s) HBM 容量+36%, 带宽+67%.'
  on_chip_interconnect:
    name: 'NV-HBI (Blackwell dual-die bridge)'
    bandwidth_tbs: { value: 10.0, evidence_ref: ev-gb200-arch-001 }
    notes: 'NV-HBI (NVIDIA High-Bandwidth Interconnect) 把两个 B200 die 缝合成单一 GPU. 10 TB/s 让两 die 之间通信几乎免费, 软件视角是单 GPU.'
memory:
  capacity_gb: { value: 192, evidence_ref: ev-gb200-001 }
  bandwidth_gbps: { value: 8000, evidence_ref: ev-gb200-001 }
  type: HBM3e
scale_up:
  protocol: NVLink-5.0
  bandwidth_gbps: 1800
  world_size: 72
  topology: switched-rail-optimized
  switch: nvswitch-gen4
scale_out:
  bandwidth_gbps_per_card: 800
  protocol: InfiniBand-XDR
  nic: ConnectX-8
power:
  tdp_w: { value: 1200, evidence_ref: ev-gb200-001 }
software_support:
  drivers: ['CUDA-12.5+']
  engines:
    - { id: vllm, status: officially-supported, versions: ['0.6'] }
    - { id: sglang, status: officially-supported, versions: ['0.4'] }
    - { id: tensorrt-llm, status: officially-supported, versions: ['0.14'] }
    - { id: mori, status: officially-supported, versions: ['0.1'] }
  quantizations: [bf16, fp8-e4m3, fp4, int8]
  parallelism: [tp, pp, ep, sp, disaggregated]
aliases: ['GB200 NVL72', 'GB200']
evidence:
  - id: ev-gb200-001
    tier: official
    source_type: vendor-product-page
    url: https://www.nvidia.com/en-us/data-center/gb200-nvl72/
    accessed: '2026-04-28'
    citation: 'NVIDIA GB200 NVL72 product page; per-GPU specs (each GB200 contains 2 B200s)'
  - id: ev-gb200-arch-001
    tier: official
    source_type: vendor-whitepaper
    url: https://resources.nvidia.com/en-us-blackwell-architecture
    accessed: '2026-04-28'
    citation: 'GB200 reuses Blackwell B200 die: 160 SMs, 100 MB L2, 8× HBM3e (per-GPU); 2 GPUs + 1 Grace CPU per Bianca board'
disclaimers:
  - 'All performance figures are vendor-claimed unless tier=measured.'
  - 'GB200 chip pairs 2 B200 GPUs with 1 Grace CPU; specs above are per-B200.'
