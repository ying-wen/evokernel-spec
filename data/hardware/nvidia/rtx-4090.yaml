disclaimers:
  - 'RTX 4090 was the canonical hobbyist LLM GPU 2023-2025; superseded by RTX 5090 for Blackwell FP4 path but still cost-effective for FP8/INT4 inference.'
  - 'No NVLink on consumer Ada — TP > 2 has serious PCIe bottleneck.'
  - 'All performance figures are vendor-claimed unless tier=measured.'
notes: |
  RTX 4090 was the dominant indie LLM inference GPU 2023-2025. 24 GB VRAM fits Llama 3 8B
  bf16 + 32K KV cache, or Llama 3 70B INT4 with offloading. The card is the reference for
  GGUF-style hobbyist quantization paths (llama.cpp default tuning targets RTX 4090).

  Compared to RTX 5090: ~half the FP8 throughput (1321 vs 1676 TFLOPS), no FP4 path,
  76% the bandwidth (1008 vs 1792 GB/s), 75% the VRAM (24 vs 32 GB), but much cheaper
  on the secondhand market in 2026. Often the better $/inference-token at FP8/INT4 quant.

  Used by: indie LLM serving, llama.cpp / Ollama / LM Studio default targets, fine-tuning
  experiments, GGUF community.
