id: gb300-nvl72
name: NVIDIA GB300 NVL72
vendor: nvidia
generation: blackwell-gen2
status: in-production
release_year: 2025
form_factor: nvl
compute:
  fp4_tflops: { value: 15000, evidence_ref: ev-gb300-001 }
  fp8_tflops: { value: 7500, evidence_ref: ev-gb300-001 }
  bf16_tflops: { value: 3750, evidence_ref: ev-gb300-001 }
  fp16_tflops: { value: 3750, evidence_ref: ev-gb300-001 }
  int8_tops: { value: 7500, evidence_ref: ev-gb300-001 }
architecture:
  compute_unit_count: { value: 168, evidence_ref: ev-gb300-arch-001 }
  compute_unit_label: SM
  tensor_cores_per_cu: { value: 4, evidence_ref: ev-gb300-arch-001 }
  l2_cache_mb: { value: 100, evidence_ref: ev-gb300-arch-001 }
  hbm_stacks: { value: 8, evidence_ref: ev-gb300-arch-001 }
  process_node_nm: { value: 4, evidence_ref: ev-gb300-arch-001 }
  memory_hierarchy:
    - name: 'Register File (per SM)'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-gb300-arch-001 }
      notes: 'B300 RF 256 KB/SM × 168 SMs = 42 MB total RF (比 B200 多 5%, SMs 多 8 个).'
    - name: 'Shared Memory / L1 (per SM)'
      scope: per-cu
      size_kb: { value: 228, evidence_ref: ev-gb300-arch-001 }
      notes: '228 KB/SM × 168 SMs ≈ 38 MB total scratchpad. 与 B200 同 SMEM 设计, 更多 SMs.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 100, evidence_ref: ev-gb300-arch-001 }
      notes: '100 MB L2 — 与 B200 相同, dual-die 50 MB/die × 2.'
    - name: 'HBM3e (36 GB stacks)'
      scope: global
      size_mb: { value: 294912, evidence_ref: ev-gb300-001 }
      bandwidth_tbs: { value: 8.0, evidence_ref: ev-gb300-001 }
      notes: '8 × 36 GB ⇒ 288 GB / 8 TB/s — 比 B200 (192 GB / 8 TB/s) 容量 +50%, 带宽相同. HBM 容量是 B300 vs B200 的核心差异化.'
  on_chip_interconnect:
    name: 'NV-HBI (Blackwell dual-die bridge, 2nd gen)'
    bandwidth_tbs: { value: 10.0, evidence_ref: ev-gb300-arch-001 }
    notes: 'NV-HBI 同 B200 (10 TB/s); B300 vs B200 主要差异在 HBM 容量 + SM count, 不在 die-to-die fabric.'
memory:
  capacity_gb: { value: 288, evidence_ref: ev-gb300-001 }
  bandwidth_gbps: { value: 8000, evidence_ref: ev-gb300-001 }
  type: HBM3e
scale_up:
  protocol: NVLink-5.0
  bandwidth_gbps: 1800
  world_size: 72
  topology: switched-rail-optimized
  switch: nvswitch-gen4
scale_out:
  bandwidth_gbps_per_card: 800
  protocol: InfiniBand-XDR
  nic: ConnectX-8
power:
  tdp_w: { value: 1400, evidence_ref: ev-gb300-001 }
software_support:
  drivers: ['CUDA-12.6+']
  engines:
    - { id: vllm, status: officially-supported, versions: ['0.6'] }
    - { id: tensorrt-llm, status: officially-supported, versions: ['0.14'] }
    - { id: mori, status: officially-supported, versions: ['0.1'] }
  quantizations: [bf16, fp8-e4m3, fp4, int8]
  parallelism: [tp, pp, ep, sp, disaggregated]
aliases: ['GB300 NVL72', 'GB300']
evidence:
  - id: ev-gb300-001
    tier: official
    source_type: vendor-press-release
    url: https://www.nvidia.com/en-us/data-center/gb300-nvl72/
    accessed: '2026-04-28'
    citation: 'NVIDIA GB300 NVL72 announcement; per-B300 specs'
  - id: ev-gb300-arch-001
    tier: estimated
    source_type: vendor-press-release
    url: https://www.nvidia.com/en-us/data-center/gb300-nvl72/
    accessed: '2026-04-28'
    citation: 'GB300 reuses B300 die: 168 SMs (more enabled vs B200), 100 MB L2, 8× HBM3e (36 GB stacks ⇒ 288 GB)'
disclaimers:
  - 'All performance figures are vendor-claimed unless tier=measured.'
