disclaimers:
  - 'RTX 5070 12 GB VRAM limits to 7B-8B BF16 inference; 13B+ requires INT4 quant.'
  - 'Same VRAM tier as Arc B580 ($249) but at $549 — pays for Blackwell FP4 + mature CUDA stack.'
notes: |
  RTX 5070 is the Blackwell entry-tier consumer GPU at $549 MSRP. Same VRAM tier as Arc B580
  ($249) but mature CUDA + native FP4. For indie/hobbyist users running 7B-8B BF16 or 13B
  INT4 — the cost-efficient Blackwell entry point.
