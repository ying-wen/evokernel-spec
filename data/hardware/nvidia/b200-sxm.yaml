id: b200-sxm
name: NVIDIA B200 SXM 180GB
vendor: nvidia
generation: blackwell-gen1
status: in-production
release_year: 2024
form_factor: sxm
compute:
  fp4_tflops: { value: 9000, evidence_ref: ev-b200-001 }
  fp8_tflops: { value: 4500, evidence_ref: ev-b200-001 }
  bf16_tflops: { value: 2250, evidence_ref: ev-b200-001 }
  fp16_tflops: { value: 2250, evidence_ref: ev-b200-001 }
  int8_tops: { value: 4500, evidence_ref: ev-b200-001 }
architecture:
  tensor_isa: [nvidia-blackwell-tcgen05, nvidia-hopper-wgmma, nvidia-hopper-tma]
  compute_unit_count: { value: 160, evidence_ref: ev-b200-arch-001 }
  compute_unit_label: SM
  tensor_cores_per_cu: { value: 4, evidence_ref: ev-b200-arch-001 }
  l2_cache_mb: { value: 100, evidence_ref: ev-b200-arch-001 }
  hbm_stacks: { value: 8, evidence_ref: ev-b200-arch-001 }
  process_node_nm: { value: 4, evidence_ref: ev-b200-arch-001 }
  die_area_mm2: { value: 1600, evidence_ref: ev-b200-arch-001 }
  transistor_count_b: { value: 208, evidence_ref: ev-b200-arch-001 }
  pcie_gen: { value: 5, evidence_ref: ev-b200-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-b200-001 }
  base_clock_mhz: { value: 1500, evidence_ref: ev-b200-arch-001 }
  boost_clock_mhz: { value: 2400, evidence_ref: ev-b200-arch-001 }
  memory_hierarchy:
    - name: 'Register File'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-b200-arch-001 }
      notes: '256 KB per SM × 160 SMs ≈ 40 MB total register file across the dual-die package.'
    - name: 'L1 / Shared Memory'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-b200-arch-001 }
      notes: 'Configurable up to 228 KB SMEM (same as Hopper). ~40 MB total.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 100, evidence_ref: ev-b200-arch-001 }
      bandwidth_tbs: { value: 11.0, evidence_ref: ev-b200-arch-001 }
      notes: 'Split per-die: 50 MB on each of the 2 reticle-stitched dies, connected via NV-HBI.'
    - name: 'HBM3e'
      scope: global
      size_mb: { value: 184320, evidence_ref: ev-b200-001 }
      bandwidth_tbs: { value: 8.0, evidence_ref: ev-b200-001 }
      notes: '8 stacks × 24 GB across 2 dies; 4 stacks per die. Total 180 GB usable (192 GB raw).'
  tensor_core_specs:
    - precision: fp4
      ops_per_cycle: { value: 4096, evidence_ref: ev-b200-arch-001 }
      sparsity_multiplier: 2
    - precision: fp8
      ops_per_cycle: { value: 2048, evidence_ref: ev-b200-arch-001 }
      sparsity_multiplier: 1
    - precision: bf16
      ops_per_cycle: { value: 1024, evidence_ref: ev-b200-arch-001 }
      sparsity_multiplier: 1
  on_chip_interconnect:
    name: 'NV-HBI (NVIDIA High-Bandwidth Interface, die-to-die)'
    bandwidth_tbs: { value: 10.0, evidence_ref: ev-b200-arch-001 }
    notes: 'Reticle-stitched dual-die package; NV-HBI connects the two GB100 dies as a single logical GPU. ~10 TB/s aggregate die-to-die bandwidth.'
memory:
  capacity_gb: { value: 180, evidence_ref: ev-b200-001 }
  bandwidth_gbps: { value: 8000, evidence_ref: ev-b200-001 }
  type: HBM3e
scale_up:
  protocol: NVLink-5.0
  bandwidth_gbps: 1800
  world_size: 8
  topology: switched
  switch: nvswitch-gen4
scale_out:
  bandwidth_gbps_per_card: 800
  protocol: InfiniBand-XDR
  nic: ConnectX-8
power:
  tdp_w: { value: 1000, evidence_ref: ev-b200-001 }
  sustained_w: { value: 850, evidence_ref: ev-b200-001 }
  peak_w: { value: 1000, evidence_ref: ev-b200-001 }
  cooling: liquid-direct
  operating_temp_c: { min: 5, max: 35 }
  throttle_temp_c: 95
  fp16_tflops_per_watt: { value: 2.25, evidence_ref: ev-b200-001 }
  power_connector: SXM-board
  notes: 'SXM6 socket; liquid cooling required (no air-cooled variant). NVL72 chassis is liquid-only.'
software_support:
  drivers: ['CUDA-12.5+']
  engines:
    - { id: vllm, status: officially-supported, versions: ['0.6'] }
    - { id: sglang, status: officially-supported, versions: ['0.4'] }
    - { id: tensorrt-llm, status: officially-supported, versions: ['0.14'] }
  quantizations: [bf16, fp16, fp8-e4m3, fp8-e5m2, fp4, int8, int4-awq]
  parallelism: [tp, pp, ep, sp, disaggregated]
aliases: ['B200']
evidence:
  - id: ev-b200-001
    tier: official
    source_type: vendor-product-page
    url: https://www.nvidia.com/en-us/data-center/dgx-b200/
    accessed: '2026-04-28'
    citation: 'NVIDIA Blackwell B200 product specifications'
  - id: ev-b200-arch-001
    tier: official
    source_type: vendor-whitepaper
    url: https://resources.nvidia.com/en-us-blackwell-architecture
    accessed: '2026-04-28'
    citation: 'Blackwell B200 architecture: dual-die package (2× 104 SMs ⇒ 160 enabled), 100 MB L2, 8× HBM3e stacks (180 GB), 208B transistors @ TSMC 4NP'
disclaimers:
  - 'All performance figures are vendor-claimed unless tier=measured.'
