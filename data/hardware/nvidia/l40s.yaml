id: l40s
name: NVIDIA L40S
vendor: nvidia
generation: ada-lovelace
status: in-production
release_year: 2023
form_factor: pcie
compute:
  fp4_tflops: null
  fp8_tflops: { value: 1466, evidence_ref: ev-l40s-001 }
  bf16_tflops: { value: 366, evidence_ref: ev-l40s-001 }
  fp16_tflops: { value: 366, evidence_ref: ev-l40s-001 }
  int8_tops: { value: 1466, evidence_ref: ev-l40s-001 }
architecture:
  compute_unit_count: { value: 142, evidence_ref: ev-l40s-arch-001 }
  compute_unit_label: SM
  tensor_cores_per_cu: { value: 4, evidence_ref: ev-l40s-arch-001 }
  l2_cache_mb: { value: 96, evidence_ref: ev-l40s-arch-001 }
  process_node_nm: { value: 5, evidence_ref: ev-l40s-arch-001 }
  die_area_mm2: { value: 609, evidence_ref: ev-l40s-arch-001 }
  transistor_count_b: { value: 76, evidence_ref: ev-l40s-arch-001 }
  pcie_gen: { value: 4, evidence_ref: ev-l40s-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-l40s-001 }
  base_clock_mhz: { value: 1110, evidence_ref: ev-l40s-arch-001 }
  boost_clock_mhz: { value: 2520, evidence_ref: ev-l40s-arch-001 }
  memory_hierarchy:
    - name: 'Register File'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-l40s-arch-001 }
      notes: 'Ada Lovelace SMs (gaming-derived AD102 die); same 256 KB RF/SM as Ampere/Hopper. 142 SMs × 256 KB ≈ 35 MB total.'
    - name: 'L1 / Shared Memory'
      scope: per-cu
      size_kb: { value: 128, evidence_ref: ev-l40s-arch-001 }
      notes: 'Configurable up to 100 KB SMEM (vs Hopper 228 KB) — Ada Lovelace was scoped for graphics, didn''t need Hopper''s SMEM expansion.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 96, evidence_ref: ev-l40s-arch-001 }
      notes: 'AD102 die L2 — bigger than Hopper (50 MB) because Ada was designed for cache-friendly raster/compute workloads. L40s benefits at small batch sizes.'
    - name: 'GDDR6'
      scope: global
      size_mb: { value: 49152, evidence_ref: ev-l40s-001 }
      bandwidth_tbs: { value: 0.864, evidence_ref: ev-l40s-001 }
      notes: '12× GDDR6 (no HBM). Bandwidth ~25% of H100 HBM3 — the main reason L40s decode throughput is much lower than H100 despite similar SM count. Cost trade-off: L40s ~1/3 the price of H100.'
  tensor_core_specs:
    - precision: fp8
      ops_per_cycle: { value: 1024, evidence_ref: ev-l40s-arch-001 }
      sparsity_multiplier: 1
    - precision: bf16
      ops_per_cycle: { value: 512, evidence_ref: ev-l40s-arch-001 }
      sparsity_multiplier: 1
  on_chip_interconnect:
    name: 'AD102 SM ↔ L2 crossbar'
    notes: 'Ada Lovelace generation crossbar; not the NVLink-C2C of Hopper.'
memory:
  capacity_gb: { value: 48, evidence_ref: ev-l40s-001 }
  bandwidth_gbps: { value: 864, evidence_ref: ev-l40s-001 }
  type: GDDR6
scale_up:
  protocol: PCIe-Gen4
  bandwidth_gbps: 64
  world_size: 8
  topology: pcie-fabric
scale_out:
  bandwidth_gbps_per_card: 200
  protocol: InfiniBand-NDR
  nic: ConnectX-7
power:
  tdp_w: { value: 350, evidence_ref: ev-l40s-001 }
software_support:
  drivers: ['CUDA-12.x']
  engines:
    - { id: vllm, status: officially-supported, versions: ['0.6'] }
    - { id: sglang, status: officially-supported, versions: ['0.4'] }
    - { id: tensorrt-llm, status: officially-supported, versions: ['0.14'] }
    - { id: lmdeploy, status: officially-supported, versions: ['0.6'] }
  quantizations: [bf16, fp16, fp8-e4m3, fp8-e5m2, int8, int4-awq, int4-gptq, w4a16]
  parallelism: [tp, pp]
aliases: ['L40S', 'L40 Server']
chinese_names: []
evidence:
  - id: ev-l40s-001
    tier: official
    source_type: vendor-datasheet
    url: https://www.nvidia.com/en-us/data-center/l40s/
    accessed: '2026-04-28'
    citation: 'NVIDIA L40S Datasheet (Ada Lovelace inference-optimized PCIe card)'
  - id: ev-l40s-arch-001
    tier: official
    source_type: vendor-whitepaper
    url: https://images.nvidia.com/aem-dam/Solutions/Data-Center/l4/nvidia-ada-gpu-architecture-whitepaper-v2.1.pdf
    accessed: '2026-04-28'
    citation: 'NVIDIA Ada Lovelace Whitepaper (AD102 die: 142 SMs enabled in L40S, 96 MB L2, 76B transistors, 609 mm² @ TSMC 4N)'
disclaimers:
  - 'L40S uses GDDR6 (not HBM); memory bandwidth is much lower than H100/A100, making it bandwidth-bound for many decode workloads.'
  - 'Designed for graphics + inference workloads (gaming derivative); strong FP8/INT8 throughput per dollar.'
  - 'All performance figures are vendor-claimed unless tier=measured.'
