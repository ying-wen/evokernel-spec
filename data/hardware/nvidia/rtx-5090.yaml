  base_clock_mhz: { value: 2017, evidence_ref: ev-rtx5090-arch-001 }
  boost_clock_mhz: { value: 2407, evidence_ref: ev-rtx5090-arch-001 }
  memory_hierarchy:
    - name: 'Register File'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-rtx5090-arch-001 }
      notes: 'Blackwell consumer SM (GB202 die); same 256 KB RF/SM as Hopper. 170 SMs × 256 KB ≈ 42 MB total.'
    - name: 'L1 / Shared Memory'
      scope: per-cu
      size_kb: { value: 128, evidence_ref: ev-rtx5090-arch-001 }
      notes: 'Configurable up to 100 KB SMEM per SM (consumer Blackwell — smaller than Hopper''s 228 KB; gaming-derived die).'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 96, evidence_ref: ev-rtx5090-arch-001 }
      notes: 'GB202 die L2 — same as Ada Lovelace (AD102). Cache-friendly for raster + small-batch inference.'
    - name: 'GDDR7'
      scope: global
      size_mb: { value: 32768, evidence_ref: ev-rtx5090-001 }
      bandwidth_tbs: { value: 1.792, evidence_ref: ev-rtx5090-001 }
      notes: 'First Blackwell card with GDDR7 (28 Gbps × 512-bit bus). 1.79 TB/s — ~50% of H100 HBM3 (3.35 TB/s). Sweet spot for indie LLM inference: more bandwidth than L40S (864 GB/s) at consumer pricing.'
  tensor_core_specs:
    - precision: fp4
      ops_per_cycle: { value: 4096, evidence_ref: ev-rtx5090-arch-001 }
      sparsity_multiplier: 1
      notes: 'Native FP4 via NVFP4 (Blackwell tensor cores) — same path as B200 but consumer SKU.'
    - precision: fp8
      ops_per_cycle: { value: 2048, evidence_ref: ev-rtx5090-arch-001 }
      sparsity_multiplier: 1
    - precision: bf16
      ops_per_cycle: { value: 256, evidence_ref: ev-rtx5090-arch-001 }
      sparsity_multiplier: 1
memory:
  capacity_gb: { value: 32, evidence_ref: ev-rtx5090-001 }
  bandwidth_gbps: { value: 1792, evidence_ref: ev-rtx5090-001 }
  type: GDDR7
scale_up:
  protocol: PCIe-Gen5
  bandwidth_gbps: 128
  world_size: 4
  topology: pcie-fabric
  notes: 'Consumer cards lack NVLink (NVIDIA reserves NVLink for data-center SKUs). Multi-GPU on consumer = PCIe Gen5 x16 only; bottleneck for TP > 2.'
scale_out:
  bandwidth_gbps_per_card: 0
  protocol: pcie-only
  nic: none
  notes: 'No NIC integration. Consumer rigs scale out via host NIC + PCIe — typical home/office Ethernet (10GbE or 25GbE), no IB/RoCE.'
power:
  tdp_w: { value: 575, evidence_ref: ev-rtx5090-001 }
  sustained_w: { value: 575, evidence_ref: ev-rtx5090-001 }
  peak_w: { value: 600, evidence_ref: ev-rtx5090-001 }
  cooling: air
  operating_temp_c: { min: 0, max: 35 }
  throttle_temp_c: 87
  fp16_tflops_per_watt: { value: 0.36, evidence_ref: ev-rtx5090-001 }
  power_connector: 12V-2x6
  notes: 'Dual-slot or triple-slot AIB designs; 12V-2x6 (12VHPWR successor) connector required. Sustained 575W is double L40S — household 15A circuit handles 1 GPU max. Multi-GPU consumer rigs need dedicated 20A circuits.'
software_support:
  drivers: ['CUDA-12.7', 'CUDA-13']
  engines:
    - { id: vllm, status: officially-supported, versions: ['0.7'] }
    - { id: sglang, status: officially-supported, versions: ['0.5'] }
    - { id: tensorrt-llm, status: officially-supported, versions: ['0.18'] }
    - { id: lmdeploy, status: officially-supported, versions: ['0.7'] }
  quantizations: [bf16, fp16, fp8-e4m3, fp8-e5m2, nvfp4, int8, int4-awq, int4-gptq, w4a16]
  parallelism: [tp, pp]
