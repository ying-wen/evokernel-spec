disclaimers:
  - 'RTX 5090 uses GDDR7; bandwidth is between L40S (GDDR6) and H100 (HBM3). Bandwidth-bound decode workloads run at ~30-40% H100 throughput.'
  - 'NVFP4 path is functionally identical to B200 — indie LLM users get Blackwell FP4 at consumer pricing.'
  - 'Single-card power budget (575W sustained) requires dedicated 20A circuits for multi-GPU rigs; consumer chassis cooling becomes a real constraint past 2 cards.'
  - 'All performance figures are vendor-claimed unless tier=measured.'
notes: |
  RTX 5090 is the v3.0 reference for "consumer Blackwell" — first card making FP4 + GDDR7 +
  Blackwell tensor cores accessible at consumer pricing ($1999 MSRP). Closes the gap between
  hobbyist LLM inference (was: RTX 4090 + GGUF quants) and small-team production (was: L40S +
  vLLM). For 7B-32B local models with FP4/FP8 quant, this is the new sweet spot.

  Compared to L40S: similar L2 (96 MB), more SMs (170 vs 142), GDDR7 vs GDDR6 (~2× bandwidth),
  but lower bf16 TFLOPS (Blackwell consumer trades bf16 for FP4/FP8 throughput). For LLM
  inference with FP8/FP4 quant, RTX 5090 wins; for FP16 training, L40S still relevant.

  Used by: indie LLM serving, fine-tuning experiments, small-team production. Not designed
  for multi-GPU rack deployment — 575W TGP × 8 cards = 4.6 kW, beyond consumer chassis.
