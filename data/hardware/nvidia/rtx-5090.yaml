  compute_unit_label: SM
  tensor_cores_per_cu: { value: 4, evidence_ref: ev-rtx5090-arch-001 }
  l2_cache_mb: { value: 96, evidence_ref: ev-rtx5090-arch-001 }
  process_node_nm: { value: 4, evidence_ref: ev-rtx5090-arch-001 }
  die_area_mm2: { value: 750, evidence_ref: ev-rtx5090-arch-001 }
  transistor_count_b: { value: 92, evidence_ref: ev-rtx5090-arch-001 }
  pcie_gen: { value: 5, evidence_ref: ev-rtx5090-001 }
