id: r200-sxm
name: NVIDIA R200 SXM (Vera Rubin)
vendor: nvidia
generation: rubin-gen1
status: announced
release_year: 2026
form_factor: sxm
compute:
  fp4_tflops: { value: 30000, evidence_ref: ev-r200-001 }
  fp8_tflops: { value: 15000, evidence_ref: ev-r200-001 }
  bf16_tflops: { value: 7500, evidence_ref: ev-r200-001 }
  fp16_tflops: { value: 7500, evidence_ref: ev-r200-001 }
  fp32_tflops: { value: 3700, evidence_ref: ev-r200-001 }
  int8_tops: { value: 15000, evidence_ref: ev-r200-001 }
architecture:
  compute_unit_count: { value: 200, evidence_ref: ev-r200-arch }
  compute_unit_label: SM
  tensor_cores_per_cu: { value: 4, evidence_ref: ev-r200-arch }
  l2_cache_mb: { value: 128, evidence_ref: ev-r200-arch }
  hbm_stacks: { value: 8, evidence_ref: ev-r200-001 }
  process_node_nm: { value: 3, evidence_ref: ev-r200-arch }
  pcie_gen: { value: 6, evidence_ref: ev-r200-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-r200-001 }
  memory_hierarchy:
    - name: 'Register File (per SM)'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-r200-arch }
      notes: 'Rubin RF 256 KB/SM × 200 SMs = 50 MB total. RF size 与 Hopper/Blackwell 一致, 主要靠 SMs 多.'
    - name: 'Shared Memory / L1 (per SM)'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-r200-arch }
      notes: 'Rubin SMEM 估算扩到 256 KB/SM (从 Hopper/Blackwell 228 KB 升级). 200 SMs × 256 KB ≈ 50 MB total scratchpad.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 128, evidence_ref: ev-r200-arch }
      notes: '128 MB L2 — 比 GB300 (100 MB) +28%. 大 L2 配合 HBM4 大带宽是 Rubin 的内存层级关键设计.'
    - name: 'HBM4'
      scope: global
      size_mb: { value: 294912, evidence_ref: ev-r200-001 }
      bandwidth_tbs: { value: 13.0, evidence_ref: ev-r200-001 }
      notes: '288 GB / 13 TB/s — HBM4 首发, 比 GB300 HBM3e (8 TB/s) 带宽 +63%. Rubin 主要差异化在 HBM4 + 更宽 NVLink-6.'
  on_chip_interconnect:
    name: 'NV-HBI v2 (Rubin dual-die)'
    bandwidth_tbs: { value: 15.0, evidence_ref: ev-r200-arch }
    notes: 'NV-HBI v2 估算 15 TB/s (vs Blackwell 10 TB/s). 配合 NVLink-6 跨 GPU (3.6 TB/s) 让 Rubin scale-up 域到 144 卡.'
memory:
  capacity_gb: { value: 288, evidence_ref: ev-r200-001 }
  bandwidth_gbps: { value: 13000, evidence_ref: ev-r200-001 }
  type: HBM4
scale_up:
  protocol: NVLink-6.0
  bandwidth_gbps: 3600
  world_size: 144
  topology: switched
  switch: nvswitch-gen5
scale_out:
  bandwidth_gbps_per_card: 1600
  protocol: InfiniBand-XDR
  nic: ConnectX-9
power:
  tdp_w: { value: 1800, evidence_ref: ev-r200-001 }
software_support:
  drivers: ['CUDA-13.x']
  engines:
    - { id: vllm, status: officially-supported, versions: ['0.7-rubin'] }
    - { id: tensorrt-llm, status: officially-supported, versions: ['0.16'] }
  quantizations: [bf16, fp16, fp8-e4m3, fp8-e5m2, fp4, int8]
  parallelism: [tp, pp, ep, sp, disaggregated]
aliases: ['Rubin R200', 'Vera Rubin R200']
chinese_names: ['英伟达 Rubin R200']
evidence:
  - id: ev-r200-001
    tier: official
    source_type: vendor-press-release
    url: https://www.nvidia.com/en-us/data-center/rubin/
    accessed: '2026-04-29'
    citation: 'NVIDIA Rubin announcement (Computex 2025): NVLink-6.0 at 3.6 TB/s, NVL144 rack-scale, HBM4 with 288 GB / 13 TB/s. Vendor-claimed; not yet GA.'
  - id: ev-r200-arch
    tier: estimated
    source_type: third-party-review
    url: https://www.semianalysis.com/p/rubin-architecture-deep-dive
    accessed: '2026-04-29'
    citation: 'Rubin die: 200 SMs enabled, 128 MB L2, dual-die package on TSMC 3nm. Specs estimated from public roadmap; subject to change at GA.'
disclaimers:
  - 'Status: announced — not yet in customer hands. Specs sourced from Computex 2025 keynote; subject to revision at GA.'
  - 'NVL144 super-pod (144 R200 in one scale-up domain) is planned for 2026 H2.'
