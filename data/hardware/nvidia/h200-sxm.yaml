id: h200-sxm
name: NVIDIA H200 SXM 141GB
vendor: nvidia
generation: hopper-gen1
status: in-production
release_year: 2024
form_factor: sxm
compute:
  fp4_tflops: null
  fp8_tflops: { value: 1979, evidence_ref: ev-h200-001 }
  bf16_tflops: { value: 989, evidence_ref: ev-h200-001 }
  fp16_tflops: { value: 989, evidence_ref: ev-h200-001 }
  int8_tops: { value: 1979, evidence_ref: ev-h200-001 }
architecture:
  compute_unit_count: { value: 132, evidence_ref: ev-h200-arch-001 }
  compute_unit_label: SM
  tensor_cores_per_cu: { value: 4, evidence_ref: ev-h200-arch-001 }
  l2_cache_mb: { value: 50, evidence_ref: ev-h200-arch-001 }
  hbm_stacks: { value: 6, evidence_ref: ev-h200-arch-001 }
  process_node_nm: { value: 4, evidence_ref: ev-h200-arch-001 }
  die_area_mm2: { value: 814, evidence_ref: ev-h200-arch-001 }
  transistor_count_b: { value: 80, evidence_ref: ev-h200-arch-001 }
  pcie_gen: { value: 5, evidence_ref: ev-h200-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-h200-001 }
  base_clock_mhz: { value: 1095, evidence_ref: ev-h200-arch-001 }
  boost_clock_mhz: { value: 1980, evidence_ref: ev-h200-arch-001 }
  memory_hierarchy:
    - name: 'Register File'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-h200-arch-001 }
      notes: '与 H100 共用 GH100 die, 256 KB / SM × 132 SMs ≈ 33 MB total RF.'
    - name: 'L1 / Shared Memory'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-h200-arch-001 }
      notes: 'Configurable up to 228 KB SMEM (Hopper-class). ~33 MB total.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 50, evidence_ref: ev-h200-arch-001 }
      bandwidth_tbs: { value: 5.5, evidence_ref: ev-h200-arch-001 }
      notes: '与 H100 完全相同 — H200 是 HBM 升级版, 不动算力.'
    - name: 'HBM3e'
      scope: global
      size_mb: { value: 144384, evidence_ref: ev-h200-001 }
      bandwidth_tbs: { value: 4.8, evidence_ref: ev-h200-001 }
      notes: '6 stacks × 24 GB. 141 GB usable. 比 H100 (3.35 TB/s) 提升 43% 带宽 — 长 context attention 关键收益点.'
  tensor_core_specs:
    - precision: fp8
      ops_per_cycle: { value: 1024, evidence_ref: ev-h200-arch-001 }
      sparsity_multiplier: 1
    - precision: bf16
      ops_per_cycle: { value: 512, evidence_ref: ev-h200-arch-001 }
      sparsity_multiplier: 1
    - precision: fp16
      ops_per_cycle: { value: 512, evidence_ref: ev-h200-arch-001 }
      sparsity_multiplier: 1
  on_chip_interconnect:
    name: 'NVLink-C2C (intra-die crossbar)'
    bandwidth_tbs: { value: 7.0, evidence_ref: ev-h200-arch-001 }
    notes: 'Same crossbar as H100. SM ↔ L2 partition.'
memory:
  capacity_gb: { value: 141, evidence_ref: ev-h200-001 }
  bandwidth_gbps: { value: 4800, evidence_ref: ev-h200-001 }
  type: HBM3e
scale_up:
  protocol: NVLink-4.0
  bandwidth_gbps: 900
  world_size: 8
  topology: switched
  switch: nvswitch-gen3
scale_out:
  bandwidth_gbps_per_card: 400
  protocol: InfiniBand-NDR
  nic: ConnectX-7
power:
  tdp_w: { value: 700, evidence_ref: ev-h200-001 }
  sustained_w: { value: 600, evidence_ref: ev-h200-001 }
  peak_w: { value: 700, evidence_ref: ev-h200-001 }
  cooling: liquid-direct
  operating_temp_c: { min: 5, max: 45 }
  throttle_temp_c: 95
  fp16_tflops_per_watt: { value: 1.41, evidence_ref: ev-h200-001 }
  power_connector: SXM-board
  notes: 'SXM5 socket; same TDP as H100 but with HBM3e (141GB / 4.8 TB/s).'
software_support:
  drivers: ['CUDA-12.x']
  engines:
    - { id: vllm, status: officially-supported, versions: ['0.6'] }
    - { id: sglang, status: officially-supported, versions: ['0.4'] }
    - { id: tensorrt-llm, status: officially-supported, versions: ['0.14'] }
  quantizations: [bf16, fp16, fp8-e4m3, fp8-e5m2, int8, int4-awq, int4-gptq]
  parallelism: [tp, pp, ep, sp, disaggregated]
aliases: ['H200', 'H200 141GB']
evidence:
  - id: ev-h200-001
    tier: official
    source_type: vendor-product-page
    url: https://www.nvidia.com/en-us/data-center/h200/
    accessed: '2026-04-28'
    citation: 'NVIDIA H200 Tensor Core GPU product page'
  - id: ev-h200-arch-001
    tier: official
    source_type: vendor-whitepaper
