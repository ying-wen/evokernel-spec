id: b300-sxm
name: NVIDIA B300 SXM 288GB
vendor: nvidia
generation: blackwell-gen2
status: in-production
release_year: 2025
form_factor: sxm
compute:
  fp4_tflops: { value: 15000, evidence_ref: ev-b300-001 }
  fp8_tflops: { value: 7500, evidence_ref: ev-b300-001 }
  bf16_tflops: { value: 3750, evidence_ref: ev-b300-001 }
  fp16_tflops: { value: 3750, evidence_ref: ev-b300-001 }
  int8_tops: { value: 7500, evidence_ref: ev-b300-001 }
architecture:
  tensor_isa: [nvidia-blackwell-tcgen05, nvidia-hopper-wgmma, nvidia-hopper-tma]
  compute_unit_count: { value: 168, evidence_ref: ev-b300-arch-001 }
  compute_unit_label: SM
  tensor_cores_per_cu: { value: 4, evidence_ref: ev-b300-arch-001 }
  l2_cache_mb: { value: 100, evidence_ref: ev-b300-arch-001 }
  hbm_stacks: { value: 8, evidence_ref: ev-b300-arch-001 }
  process_node_nm: { value: 4, evidence_ref: ev-b300-arch-001 }
  pcie_gen: { value: 5, evidence_ref: ev-b300-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-b300-001 }
  base_clock_mhz: { value: 1500, evidence_ref: ev-b300-arch-001 }
  boost_clock_mhz: { value: 2500, evidence_ref: ev-b300-arch-001 }
  memory_hierarchy:
    - name: 'Register File'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-b300-arch-001 }
      notes: '256 KB per SM × 168 SMs ≈ 42 MB total RF (Blackwell-Ultra refresh of B200; same RF size).'
    - name: 'L1 / Shared Memory'
      scope: per-cu
      size_kb: { value: 256, evidence_ref: ev-b300-arch-001 }
      notes: 'Configurable up to 228 KB SMEM (Blackwell-class). ~42 MB total across 168 SMs.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 100, evidence_ref: ev-b300-arch-001 }
      bandwidth_tbs: { value: 11.0, evidence_ref: ev-b300-arch-001 }
      notes: 'Split per-die (50 MB × 2) on the dual-die package; connected via NV-HBI.'
    - name: 'HBM3e'
      scope: global
      size_mb: { value: 294912, evidence_ref: ev-b300-001 }
      bandwidth_tbs: { value: 8.0, evidence_ref: ev-b300-001 }
      notes: '8 stacks × 36 GB across the dual-die package (vs B200: 8 × 24 GB ⇒ 180 GB). 60% memory bump is the main B300 vs B200 upgrade.'
  tensor_core_specs:
    - precision: fp4
      ops_per_cycle: { value: 4096, evidence_ref: ev-b300-arch-001 }
      sparsity_multiplier: 2
    - precision: fp8
      ops_per_cycle: { value: 2048, evidence_ref: ev-b300-arch-001 }
      sparsity_multiplier: 1
    - precision: bf16
      ops_per_cycle: { value: 1024, evidence_ref: ev-b300-arch-001 }
      sparsity_multiplier: 1
  on_chip_interconnect:
    name: 'NV-HBI (NVIDIA High-Bandwidth Interface, die-to-die)'
    bandwidth_tbs: { value: 10.0, evidence_ref: ev-b300-arch-001 }
    notes: 'Same NV-HBI as B200, connecting two GB100/200 dies as one logical GPU.'
memory:
  capacity_gb: { value: 288, evidence_ref: ev-b300-001 }
  bandwidth_gbps: { value: 8000, evidence_ref: ev-b300-001 }
  type: HBM3e
scale_up:
  protocol: NVLink-5.0
  bandwidth_gbps: 1800
  world_size: 8
  topology: switched
  switch: nvswitch-gen4
scale_out:
  bandwidth_gbps_per_card: 800
  protocol: InfiniBand-XDR
  nic: ConnectX-8
power:
  tdp_w: { value: 1400, evidence_ref: ev-b300-001 }
  sustained_w: { value: 1200, evidence_ref: ev-b300-001 }
  peak_w: { value: 1400, evidence_ref: ev-b300-001 }
  cooling: liquid-direct
  operating_temp_c: { min: 5, max: 30 }
  throttle_temp_c: 95
  fp16_tflops_per_watt: { value: 1.93, evidence_ref: ev-b300-001 }
  power_connector: SXM-board
  notes: 'SXM6 socket; liquid required. GB300 NVL72 uses cold-plate at chassis level — no individual card air-cooled SKU.'
software_support:
  drivers: ['CUDA-12.6+']
  engines:
    - { id: vllm, status: officially-supported, versions: ['0.6'] }
    - { id: tensorrt-llm, status: officially-supported, versions: ['0.14'] }
  quantizations: [bf16, fp8-e4m3, fp8-e5m2, fp4, int8]
  parallelism: [tp, pp, ep, sp, disaggregated]
aliases: ['B300']
evidence:
  - id: ev-b300-001
    tier: official
    source_type: vendor-press-release
    url: https://www.nvidia.com/en-us/data-center/dgx-b300/
    accessed: '2026-04-28'
    citation: 'NVIDIA B300 announcement (vendor-claimed)'
  - id: ev-b300-arch-001
    tier: estimated
    source_type: vendor-press-release
    url: https://www.nvidia.com/en-us/data-center/dgx-b300/
    accessed: '2026-04-28'
    citation: 'B300 dual-die package, refresh of Blackwell with 168 SMs enabled and 8× HBM3e stacks @ 36 GB ⇒ 288 GB'
disclaimers:
  - 'All performance figures are vendor-claimed unless tier=measured.'
