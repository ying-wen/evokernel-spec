disclaimers:
  - 'DGX Spark unified memory 128 GB at 273 GB/s — same bandwidth as Apple M4 Pro, smaller than M3 Ultra (512 GB / 819 GB/s). Trade-off vs Apple: lower memory, but full CUDA stack + Blackwell FP4.'
  - '$3000 starting price puts it directly opposite Mac mini M4 Pro 64 GB ($1399) and Mac Studio M3 Ultra ($3999-$9999).'
  - 'NVLink-C2C between Grace CPU and Blackwell GPU is unique to GH200 / GB10 — full UMA + full CUDA, no other consumer device offers this combo.'
  - 'All performance figures are vendor-claimed unless tier=measured.'
notes: |
  DGX Spark is NVIDIA's direct answer to Apple Silicon for personal AI inference workstations.
  At $3000 MSRP, it offers 128 GB unified memory + full CUDA / vLLM / TensorRT-LLM stack —
  filling the gap between consumer GPU (RTX 5090: 32 GB, no UMA) and datacenter (H100/H200:
  80-141 GB, $30K+).

  Use case: indie/researcher running 70B-200B models locally with full CUDA tooling. The
  same vLLM / SGLang configs that run on H100 run here at smaller scale — zero stack
  retraining cost vs Apple Silicon (which requires MLX-port mindshare).

  Trade-off vs Apple M3 Ultra: smaller memory (128 vs 512 GB), lower bandwidth (273 vs 819
  GB/s), but full CUDA + Blackwell FP4 path. For "develop on the same toolchain you'll
  deploy to" workflows, DGX Spark wins; for raw memory ceiling, Mac Studio wins.

  Two DGX Spark units can be linked via 200 GbE for ~256 GB unified — NVIDIA-blessed scale
  pattern targeting frontier-model researchers on a budget.
