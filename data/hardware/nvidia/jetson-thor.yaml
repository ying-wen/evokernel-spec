    citation: 'NVIDIA Jetson Thor product page (T5000 SoC: ARM Grace 14-core CPU + Blackwell GPU 96 SMs + dedicated NVDLA + Tensor Core; 128 GB unified LPDDR5X @ 273 GB/s; 30-130W configurable TDP; designed for humanoid robots, autonomous vehicles, edge AI workstations).'
