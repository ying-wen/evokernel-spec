    citation: 'NVIDIA Jetson Thor announcement (2025): 7.5× perf vs Jetson Orin; Grace ARM CPU + Blackwell GPU; 8× I/O bandwidth for multi-camera robotics.'
disclaimers:
  - 'Jetson Thor is a developer kit + module form factor (not a discrete GPU). Marketed for physical-AI / robotics use case but architecturally identical to a "DGX Spark Lite".'
  - 'TDP configurable 30-130W — at low-power profile, throughput drops ~3-4×. Edge deployments typically run 40-60W sustained.'
  - 'Same software stack as DGX Spark + RTX 5090 (CUDA + cuDNN + TensorRT-LLM); applications port across with no code changes.'
notes: |
  Jetson Thor opens the **edge NPU class** in this corpus (was empty pre-v3.3). At 128 GB
  unified memory + 273 GB/s + 1035 FP8 TFLOPS in a 100W envelope, it's the SOTA edge
  inference platform 2025-2026 — surpasses the Apple M4 Pro / M5 Pro for raw throughput
  while matching their memory tier.

  Use case: humanoid robots (NVIDIA Isaac), autonomous vehicles (NVIDIA DRIVE), edge AI
  workstations, robotics research. Commercial price ~$3000 dev kit.

  Compared to consumer GPU class:
    - vs RTX 5090 ($1999, 575W desktop): Thor has 4× memory (128 vs 32 GB) at 1/5 the
      power; loses on raw throughput (1035 vs 1676 FP8 TFLOPS).
    - vs DGX Spark ($3000, 170W): same 128 GB / 273 GB/s memory; Thor adds NVDLA + I/O
      for robotics; Spark has higher CPU core count for desktop-AI workloads.
    - vs Apple M5 Pro ($1599, 40W): Thor 7× more compute, 1.6× more memory, 5× the power.
      Choose Thor for robotics / sustained inference; M5 Pro for indie / battery-life.
