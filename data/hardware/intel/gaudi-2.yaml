  memory_hierarchy:
    - name: 'MME / TPC scratchpad'
      scope: per-cu
      size_kb: { value: 128, evidence_ref: ev-gaudi2-arch-001 }
      notes: 'Per-cluster scratchpad (smaller than Gaudi 3''s 192 KB). 24 clusters × 128 KB ≈ 3 MB total.'
    - name: 'Cache hierarchy'
      scope: global
      size_mb: { value: 48, evidence_ref: ev-gaudi2-arch-001 }
      notes: 'Multi-level cache (smaller than Gaudi 3''s 96 MB). Detailed split not publicly disclosed.'
    - name: 'HBM2e'
      scope: global
      size_mb: { value: 98304, evidence_ref: ev-gaudi2-001 }
      bandwidth_tbs: { value: 2.45, evidence_ref: ev-gaudi2-001 }
      notes: '6 stacks × 16 GB. HBM2e bandwidth competitive with A100 (2.04 TB/s). Open-fabric scale-up: 21× 100 GbE RoCE (Gaudi 3 has 24× 200 GbE).'
  on_chip_interconnect:
    name: 'On-chip mesh + integrated 100 GbE NICs'
    notes: 'Connects 24 clusters + 21 integrated 100 GbE NIC ports for scale-up via Ethernet (vs Gaudi 3''s 24× 200 GbE).'
