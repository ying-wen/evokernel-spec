id: gaudi-3
name: Intel Gaudi 3
vendor: intel
generation: gaudi-gen3
status: in-production
release_year: 2024
form_factor: oam
compute:
  fp4_tflops: null
  fp8_tflops: { value: 1835, evidence_ref: ev-gaudi3-001 }
  bf16_tflops: { value: 1835, evidence_ref: ev-gaudi3-001 }
  fp16_tflops: { value: 1835, evidence_ref: ev-gaudi3-001 }
  int8_tops: { value: 1835, evidence_ref: ev-gaudi3-001 }
architecture:
  compute_unit_count: { value: 64, evidence_ref: ev-gaudi3-arch-001 }
  compute_unit_label: Cluster
  hbm_stacks: { value: 8, evidence_ref: ev-gaudi3-arch-001 }
  process_node_nm: { value: 5, evidence_ref: ev-gaudi3-arch-001 }
  pcie_gen: { value: 5, evidence_ref: ev-gaudi3-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-gaudi3-001 }
  memory_hierarchy:
    - name: 'MME / TPC scratchpad'
      scope: per-cu
      size_kb: { value: 192, evidence_ref: ev-gaudi3-arch-001 }
      notes: 'Per-cluster scratchpad on Habana Gaudi 3. 64 clusters × 192 KB ≈ 12 MB total. Habana Synapse compiler manages this directly.'
    - name: 'Cache hierarchy'
      scope: global
      size_mb: { value: 96, evidence_ref: ev-gaudi3-arch-001 }
      notes: 'Multi-level cache split across MME (matrix engines) and TPC (tensor processor cores). Detailed split not publicly disclosed.'
    - name: 'HBM2e'
      scope: global
      size_mb: { value: 131072, evidence_ref: ev-gaudi3-001 }
      bandwidth_tbs: { value: 3.7, evidence_ref: ev-gaudi3-001 }
      notes: '8 stacks × 16 GB. HBM2e (not HBM3); bandwidth competitive with H100 (3.35 TB/s). Native scale-up via 200 GbE RoCE (no proprietary NVLink-equivalent).'
  on_chip_interconnect:
    name: 'On-chip mesh + integrated RoCE NIC'
    notes: 'Connects 64 clusters + 24 integrated 200 GbE NIC ports for scale-up via Ethernet. Open-fabric approach contrasts with NVIDIA NVLink lock-in.'
memory:
  capacity_gb: { value: 128, evidence_ref: ev-gaudi3-001 }
  bandwidth_gbps: { value: 3700, evidence_ref: ev-gaudi3-001 }
  type: HBM2e
scale_up:
  protocol: RoCE-v2-200GbE
  bandwidth_gbps: 1200
  world_size: 8
  topology: all-to-all
scale_out:
  bandwidth_gbps_per_card: 200
  protocol: RoCEv2
power:
  tdp_w: { value: 900, evidence_ref: ev-gaudi3-001 }
  sustained_w: { value: 750, evidence_ref: ev-gaudi3-001 }
  peak_w: { value: 900, evidence_ref: ev-gaudi3-001 }
  cooling: liquid-direct
  operating_temp_c: { min: 5, max: 35 }
  throttle_temp_c: 95
  fp16_tflops_per_watt: { value: 1.61, evidence_ref: ev-gaudi3-001 }
  power_connector: OAM-board
  notes: 'OAM. PCIe HL-338 variant available at 600W (air-cooled). 24×200GbE on-die NICs differentiate from peers.'
