disclaimers:
  - 'Intel Arc inference stack (IPEX-LLM, oneAPI) is the least mature of the 3 vendors here. Real-world inference perf often 30-50% below vendor TFLOPS claims due to driver immaturity (2025 status).'
  - 'PCIe Gen4 x8 (not x16) — half the lane count of NVIDIA/AMD consumer flagships.'
  - 'No LLM inference engine has Battlemage as a Tier-1 target as of mid-2026; vLLM/lmdeploy support is experimental.'
  - 'All performance figures are vendor-claimed unless tier=measured.'
notes: |
  Arc B580 is Intel's first consumer card with FP8 XMX support (Alchemist Arc A-series
  was INT8 only). At $249 MSRP with 12 GB VRAM, it's the cheapest viable LLM-inference
  card for 7B-13B models with INT4/INT8 quant. Real-world LLM perf is hampered by Intel's
  inference software lag — IPEX-LLM is the recommended path; vLLM/lmdeploy work but with
  rough edges (kernel coverage gaps, occasional driver bugs).

  Use case: cost-floor indie LLM inference, students/researchers exploring on a budget,
  3-card rigs for parallel experiments. Not suitable for production serving without
  significant Intel SW stack engineering.

  Compared to RTX 5090 ($1999) / RX 9070 XT ($599): Arc B580 ($249) trades raw perf
  for price. ~7× cheaper than RTX 5090, ~2.4× cheaper than RX 9070 XT; perf scales
  roughly with price. The card defines the floor of "viable LLM inference hardware".
