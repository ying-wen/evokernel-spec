  bf16_tflops: { value: 116, evidence_ref: ev-arcb580-001 }
  fp16_tflops: { value: 116, evidence_ref: ev-arcb580-001 }
  int8_tops: { value: 233, evidence_ref: ev-arcb580-001 }
architecture:
  compute_unit_count: { value: 20, evidence_ref: ev-arcb580-arch-001 }
  compute_unit_label: XPU
  l2_cache_mb: { value: 18, evidence_ref: ev-arcb580-arch-001 }
  process_node_nm: { value: 5, evidence_ref: ev-arcb580-arch-001 }
  die_area_mm2: { value: 272, evidence_ref: ev-arcb580-arch-001 }
  transistor_count_b: { value: 19, evidence_ref: ev-arcb580-arch-001 }
  pcie_gen: { value: 4, evidence_ref: ev-arcb580-001 }
  pcie_lanes: { value: 8, evidence_ref: ev-arcb580-001 }
  base_clock_mhz: { value: 1700, evidence_ref: ev-arcb580-arch-001 }
  boost_clock_mhz: { value: 2670, evidence_ref: ev-arcb580-arch-001 }
  memory_hierarchy:
    - name: 'XMX scratchpad'
      scope: per-cu
      size_kb: { value: 192, evidence_ref: ev-arcb580-arch-001 }
      notes: 'Per-Xe-core register + scratchpad. 20 Xe-cores × 192 KB ≈ 4 MB. XMX = Intel"s tensor unit equivalent.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 18, evidence_ref: ev-arcb580-arch-001 }
      notes: 'BMG-G21 die L2. Modest L2 vs RTX 5090 (96 MB) — Intel went smaller for cost.'
    - name: 'GDDR6'
      scope: global
      size_mb: { value: 12288, evidence_ref: ev-arcb580-001 }
      bandwidth_tbs: { value: 0.456, evidence_ref: ev-arcb580-001 }
      notes: '12 GB GDDR6 19 Gbps × 192-bit bus = 456 GB/s. The 12 GB capacity at $249 MSRP is the entire product positioning — VRAM/dollar leader for indie LLM inference.'
  tensor_core_specs:
    - precision: fp8
      ops_per_cycle: { value: 256, evidence_ref: ev-arcb580-arch-001 }
      sparsity_multiplier: 1
      notes: 'XMX engines added FP8 in Battlemage (not in Alchemist Arc A-series). 233 FP8 TFLOPS per card.'
    - precision: bf16
      ops_per_cycle: { value: 128, evidence_ref: ev-arcb580-arch-001 }
      sparsity_multiplier: 1
