  sustained_w: { value: 175, evidence_ref: ev-arcb580-001 }
  peak_w: { value: 220, evidence_ref: ev-arcb580-001 }
  cooling: air
  operating_temp_c: { min: 0, max: 50 }
  throttle_temp_c: 95
  fp16_tflops_per_watt: { value: 0.61, evidence_ref: ev-arcb580-001 }
  power_connector: 8-pin
  notes: 'Single 8-pin connector — easy for any consumer chassis. Lowest-power option in this set; 4-card rig fits in standard 1500W PSU.'
