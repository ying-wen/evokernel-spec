      size_mb: { value: 49152, evidence_ref: ev-mtts4000-001 }
      bandwidth_tbs: { value: 0.768, evidence_ref: ev-mtts4000-001 }
      notes: '12 × 4 GB GDDR6 (no HBM). S4000 chose GDDR6 for cost/yield reasons; bandwidth ceiling much lower than HBM-class cards. MUSA stack continues to mature.'
