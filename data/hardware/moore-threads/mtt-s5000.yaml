disclaimers:
  - 'MUSA software stack is in active development; vllm-musa fork has occasional kernel coverage gaps vs CUDA upstream.'
  - 'MTT S5000 is China-domestic supply-chain — major customer base is China cloud providers under sovereignty constraints.'
notes: |
  MTT S5000 is Moore Threads' first HBM-equipped data-center card, replacing S4000
  (GDDR6) for LLM inference workloads. The HBM3 + native FP8 combo brings the card into
  competitive territory for 7B-70B model serving in 国产-only deployments.

  Trade-offs vs NVIDIA H100 (the obvious comparison):
    - 25% the FP8 throughput (200 vs 1979 TFLOPS)
    - 33% the bandwidth (1.6 vs 3.35 TB/s)
    - 80% the memory (64 vs 80 GB)
    + China-domestic supply chain (sovereignty-friendly)
    + MUSA developer tooling (CUDA-compatible API surface)

  Used by: vllm-musa community fork, China cloud providers needing 国产 hardware,
  sovereignty-constrained government / SOE deployments.
