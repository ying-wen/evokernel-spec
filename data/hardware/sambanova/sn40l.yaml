id: sn40l
name: SambaNova SN40L
vendor: sambanova
generation: sambanova-rdu-gen4
status: in-production
release_year: 2024
form_factor: reconfigurable
compute:
  fp4_tflops: null
  fp8_tflops: { value: 1040, evidence_ref: ev-sn40l-001 }
  bf16_tflops: { value: 638, evidence_ref: ev-sn40l-001 }
  fp16_tflops: { value: 638, evidence_ref: ev-sn40l-001 }
  fp32_tflops: { value: 320, evidence_ref: ev-sn40l-001 }
  int8_tops: { value: 1040, evidence_ref: ev-sn40l-001 }
architecture:
  compute_unit_count: { value: 1040, evidence_ref: ev-sn40l-001 }
  compute_unit_label: RDU-Tile
  on_die_sram_mb: { value: 64, evidence_ref: ev-sn40l-001 }
  process_node_nm: { value: 5, evidence_ref: ev-sn40l-001 }
  die_area_mm2: { value: 800, evidence_ref: ev-sn40l-001 }
  pcie_gen: { value: 5, evidence_ref: ev-sn40l-001 }
  pcie_lanes: { value: 16, evidence_ref: ev-sn40l-001 }
  reconfigurable: true
  memory_hierarchy:
    - name: 'PMU SRAM (per RDU tile)'
      scope: per-cu
      size_kb: { value: 64, evidence_ref: ev-sn40l-001 }
      notes: 'Pattern Memory Unit (PMU) — 每个 RDU tile 上 64 KB 本地 SRAM. 1040 tiles × 64 KB ≈ 64 MB on-die fast SRAM (与 architecture.on_die_sram_mb 一致).'
    - name: 'HBM3 (Tier 2)'
      scope: global
      size_mb: { value: 65536, evidence_ref: ev-sn40l-001 }
      bandwidth_tbs: { value: 6.4, evidence_ref: ev-sn40l-001 }
      notes: '64 GB HBM3 / 6.4 TB/s — 与 NVIDIA H100 (80 GB / 3.35 TB/s) 类似容量但带宽高 2x. 用于 hot weight + KV cache.'
    - name: 'DDR5 (Tier 3)'
      scope: global
      size_mb: { value: 1638400, evidence_ref: ev-sn40l-001 }
      bandwidth_tbs: { value: 0.4, evidence_ref: ev-sn40l-001 }
      notes: '1.6 TB DDR5 / ~400 GB/s — SN40L 独家三级内存, 让 5T+ 参数模型可以单卡 host (其他加速器都做不到).'
  on_chip_interconnect:
    name: 'RDU dataflow mesh (reconfigurable)'
    bandwidth_tbs: { value: 150.0, evidence_ref: ev-sn40l-001 }
    notes: 'RDU (Reconfigurable Dataflow Unit) 内部 PCU + PMU 通过 reconfigurable mesh 互联, 总带宽估算 150 TB/s. 关键差异化: tile 之间通过 dataflow 编程模型组合, 不需要 explicit memcpy — 数据流过 spatial graph.'
memory:
  capacity_gb: { value: 1664, evidence_ref: ev-sn40l-001 }
  bandwidth_gbps: { value: 6400, evidence_ref: ev-sn40l-001 }
  type: HBM3
scale_up:
  protocol: SambaFabric
  bandwidth_gbps: 800
  world_size: 16
  topology: switched
scale_out:
  bandwidth_gbps_per_card: 200
  protocol: Ethernet
power:
  tdp_w: { value: 300, evidence_ref: ev-sn40l-001 }
software_support:
  drivers: ['SambaNova-SDK-2.x', 'SambaFlow']
  engines:
    - { id: vllm, status: community-port, notes: 'SambaNova native serving stack' }
  quantizations: [bf16, fp16, fp8-e4m3, int8]
  parallelism: [tp, pp, dataflow]
aliases: ['SN40L', 'Cardinal SN40L']
chinese_names: ['SambaNova SN40L']
evidence:
  - id: ev-sn40l-001
    tier: official
    source_type: vendor-product-page
    url: https://sambanova.ai/products/sn40l
    accessed: '2026-04-29'
    citation: 'SambaNova SN40L (Cardinal): RDU (Reconfigurable Dataflow Unit) with 1040 PCUs, 64 MB on-chip SRAM, 1.5 TB HBM3 + DDR5 hybrid memory (1664 GB total), 5nm TSMC, 800 mm² die. Full system: 8-card SN40L node with 12 TB aggregate fast memory.'
disclaimers:
  - 'SN40L unique architecture: 3-tier memory (on-chip SRAM + HBM + DDR5) lets it host 5+ trillion-parameter models in a single node — no other accelerator does this.'
  - 'Compute reported is per-RDU; sustained throughput depends on dataflow graph fit (reconfigurable; not all models map cleanly).'
