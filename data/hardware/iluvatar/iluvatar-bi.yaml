      scope: per-cu
      size_kb: { value: 192, evidence_ref: ev-tianhe-arch-001 }
      notes: 'CoreX SM 与 NVIDIA A100 SMEM 类似 (192 KB). CUDA-compatible 设计意味着 PTX 兼容, 软件栈可以从 NVIDIA 平移.'
    - name: 'L2 Cache'
      scope: global
      size_mb: { value: 8, evidence_ref: ev-tianhe-arch-001 }
      notes: '估算 8 MB L2 — 32 SM 单 die 设计, 比 A100 (40 MB) 小很多, 大部分 reuse 走 HBM.'
