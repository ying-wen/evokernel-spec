      scope: global
      size_mb: { value: 32768, evidence_ref: ev-tianhe-001 }
      bandwidth_tbs: { value: 1.2, evidence_ref: ev-tianhe-001 }
      notes: '2 stacks × 16 GB ⇒ 32 GB / 1.2 TB/s. CUDA 兼容路线让其在国产替代中部署阻力低.'
  on_chip_interconnect:
    name: 'CoreX on-die NoC'
    bandwidth_tbs: { value: 0.5, evidence_ref: ev-tianhe-arch-001 }
    notes: '单 die NoC, 估算 0.5 TB/s. 关键差异化 — 多卡互联走 PCIe Gen4 而非专用 fabric, scale-up 域被限制.'
