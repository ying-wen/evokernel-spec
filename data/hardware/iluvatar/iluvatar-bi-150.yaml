disclaimers:
  - 'BI-V150 perf figures are vendor-claimed (peak); measured benchmarks vs A100/H100 limited in public sources.'
  - 'CUDA-compatible 不等于 100% binary compat — 部分高级 PTX intrinsics + tensor core APIs 可能需要重新编译, 不是 drop-in CUDA replacement.'
  - 'CoreX-Link 不是开放标准 — 8-card scale-up 需要使用 Iluvatar 官方 server reference design.'
  - 'FP8 是 v3 generation 第一次支持 (BI-100 仅有 BF16/FP16); 让 BI-V150 与 H100 在 LLM training quantization 上首次对齐.'
notes: |
  Iluvatar BI-V150 是 v3.16 加入的国产 server training 第二代加速卡, 与 v2.x corpus
  中的 BI-100 (天垓 100) 形成"国产 H100 alternative"路线的 generational pair.

  与 BI-100 (gen2) 的核心代际跃进:

  | 维度 | BI-100 (gen2, 2023) | BI-V150 (gen3, 2024) | Δ |
  |---|---|---|---|
  | BF16 TFLOPS | 95 | 240 | 2.5× |
  | FP8 TFLOPS | ❌ | 480 | NEW |
  | INT8 TOPS | 190 | 480 | 2.5× |
  | HBM | 32 GB HBM2e @ 1.2 TB/s | 64 GB HBM3 @ 2.4 TB/s | 2× / 2× |
  | L2 cache | 8 MB | 32 MB | 4× |
  | TDP | 300W | 600W | 2× |
  | PCIe | Gen4 ×16 | Gen5 ×16 | 2× |
  | Scale-up | PCIe-only (64 GB/s) | CoreX-Link (600 GB/s) | 9.4× |
  | Scale-out | 100 GbE | 200 GbE | 2× |

  **代际意义**: BI-V150 是 Iluvatar 第一款"接近 H100 PCIe"的产品. BI-100 还是
  PCIe-fabric 国产替代; BI-V150 配 CoreX-Link 后, 8-card scale-up 首次接近
  NVLink 体验 (600 vs 900 GB/s NVLink 4.0). 这意味着 corpus 中的国产训练
  路线不再被限制在 < 100B 模型 — Llama 3 70B / Qwen 2 72B / DeepSeek V2 236B
  在 BI-V150 集群上 viable.

  ## 与 corpus 中的国产 server training 同代对比

  | 维度 | BI-V150 | 昇腾 910B | Cambricon MLU590 | Hygon DCU-Z100 | Biren BR104 |
  |---|---|---|---|---|---|
  | BF16 TFLOPS | 240 | 320 | 256 | 192 | 256 |
  | FP8 TFLOPS | 480 | ❌ | 512 | ❌ | 512 |
  | HBM | 64 GB HBM3 | 64 GB HBM2e | 64 GB HBM2e | 32 GB HBM2 | 64 GB HBM2e |
  | HBM 带宽 | 2.4 TB/s | 1.6 TB/s | 1.7 TB/s | 1.0 TB/s | 1.6 TB/s |
  | Scale-up | CoreX-Link 600 | HCCS 392 | MLU-Link 200 | xGMI3 | BLink 384 |
  | 软件栈 | CUDA-compat (易迁移) | CANN (重写) | Neuware/BANG-C | ROCm-DTK | BIRENSUPA |
  | 千卡集群 | ✅ 早期客户 | ✅ 大规模 (DeepSeek 部分用) | ✅ Cambricon AI Lab | ⚠️ 有限 | ⚠️ 出口限制 |

  **BI-V150 差异化**: **CUDA-compatible PTX**. 在国产路线里, BI-V150 + 摩尔线程 是
  仅有的两个走 CUDA 兼容 (PTX) 路线的. 优势: PyTorch / vLLM / SGLang 移植成本低,
  现有 NVIDIA 代码改 1-3% 即可跑. 劣势: 受 CUDA toolchain 法律风险约束 (NVIDIA
  CUDA EULA 不允许 re-distribute / re-implement).

  ## 典型部署场景

  - **国产 LLM training (千卡级)**: Llama 3 / Qwen 2 / DeepSeek V2 在 BI-V150 集群上,
    8-node × 8-card = 64 卡 = 15 PFLOPS BF16 (64 × 240 = 15,360). 与 4 node H100
    DGX (256 H100 @ 989 = 253 PFLOPS) 仍有 16× 差距, 但已经能 sustain 70B 训练.
  - **国产 LLM serving**: vLLM-iluvatar fork 在 BI-V150 上 Llama 3 70B BF16 ~50 tok/s
    decode (估算; 实测 benchmark 数据 limited). 比 H100 SXM ~120 tok/s 慢 2.4×.
  - **CUDA migration POC**: 客户从 NVIDIA A100 迁移到国产, BI-V150 是最低 friction
    选项 (PTX 兼容 vs 昇腾完全重写 + Cambricon 半重写).

  ## v3.16 加入意义

  - **完成 corpus 中国产 server training 路线的 generational coverage**: BI-100 (gen2)
    + BI-V150 (gen3) 双足. 让 agent 能给出 "国产替代 H100" 路线的代际选择 (gen2 便宜
    + 7nm 早期; gen3 性能接近 H100 PCIe + 客户案例多).
  - **CUDA-compat 路线代表**: corpus 中"易迁移"国产路线明确化 (BI-V150 + 摩尔线程
    MUSA), vs "重写"路线 (昇腾 CANN + Cambricon Neuware + Hygon DTK + Biren BIRENSUPA).
    Agent 在 "CUDA 代码迁移到国产" 决策上有依据.
  - **填补 FP8 国产支持**: BI-V150 是国产 PCIe 加速卡里第二款支持 FP8 的 (after MLU590,
    before 摩尔线程下一代). 让 corpus 中"国产 FP8 训练" 选项不再只有 1 张卡.

  ## v3.17+ 候选

  - 摩尔线程 MTT S5000 (国产 CUDA-compat 路线第二家)
  - Iluvatar BI-V200 (gen4, 2025-2026 announced)
  - Hygon DCU-K100 (gen5, FP8 支持)
  - 寒武纪 MLU690 (gen5 frontier, post-MLU590)
