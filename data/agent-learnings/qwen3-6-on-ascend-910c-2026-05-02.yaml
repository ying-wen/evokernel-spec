observations:
  - kind: numerical-mismatch
    op_or_kernel: fused-rope-qkv
    description: |
      Long-context (64K) generation diverged from H100 reference at output position
      ~50K. Investigation: aclnn-rope keeps rotation in FP16 throughout, but at
      ctx ≥ 32K the cos/sin × q multiply-add accumulates rounding. Switching to
      Vector-FP32 fallback path (3× slower) fixed quality but dropped throughput
      from 89 to 31 tok/s.
    evidence: |
      Layer-wise output L2 distance from H100 reference: 0.8% at pos=10K (acceptable);
      4.7% at pos=50K (regression). With Vector-FP32: 0.3% at pos=50K.
    proposed_corpus_update: |
      Already documented in data/fused-kernels/fused-rope-qkv.yaml
      formal_semantics.numerical_rules.rotation_compute_dtype (added in v2.18).
      Agent should auto-flag this for Ascend × ctx ≥ 32K configs going forward.

  - kind: missing-primitive
    isa_primitive: ascend-vector-unit-fp32
    description: |
      Discovered: Ascend Vector unit has FP32 path but it's not surfaced in
      `data/isa-primitives/huawei-ascend-vector.yaml` as a separate primitive.
      Agent had no way to reason about "FP32 vector fallback" without it.
    proposed_corpus_update: |
      Add `huawei-ascend-vector-fp32` ISA primitive entry; cross-reference
      from huawei-ascend-vector with class:precision-fallback.

  - kind: perf-cliff
    op_or_kernel: fused-rope-qkv
    description: |
      Vector-FP32 fallback is 2.9× slower than aclnn-rope FP16. Predicted
      throughput 89 tok/s; actual with FP32 fallback 31 tok/s. 65% perf delta.
    evidence: 'cnperf trace: rotation kernel 4.2ms FP16 → 12.1ms FP32.'

