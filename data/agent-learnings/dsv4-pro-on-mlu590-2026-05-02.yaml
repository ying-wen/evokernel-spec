observations:
  - kind: kernel-gap
    op_or_kernel: fused-rope-qkv
    description: |
      MLU590 has no fused-rope-qkv equivalent — kernel-codegen emitted a BANG-C
      skeleton with the WGMMA→Cube mapping. Human reviewer needed to swap
      __memcpy_async direction enums and adapt SMEM size to NRAM (smaller buffer).
      Took 2-3 hours of porting work; result was 1.18× speedup vs unfused path.
    evidence: |
      kernel_gaps.md flagged "fused-rope-qkv missing on cambricon-mlu" with
      cross-vendor primitive mapping cambricon-mlu-mma. NCU-equivalent (cnperf)
      profile confirmed RoPE fused-epilogue path activated.
    proposed_corpus_update: |
      data/dsl-examples/bang-c-fused-rope-qkv.yaml — add as v2.21 deliverable.
      Already exists for tiled-gemm; this is the natural next BANG-C example.

  - kind: success-pattern
    op_or_kernel: paged-attention-decode
    description: |
      MindIE's paged-attention-decode on MLU590 worked first-try with vLLM-style
      page_size=64. No port required — Cambricon's MLU MMA primitive maps
      cleanly to the existing kernel template.
    evidence: 'agent-deploy-output/launch.sh ran clean; no kernel-codegen needed.'

  - kind: perf-cliff
    op_or_kernel: fused-moe-dispatch-deepep
    description: |
      No DeepEP equivalent on Cambricon (HCCS does not yet expose RDMA-direct
      from kernel). MoE dispatch fell back to standard HCCL all-to-all + separate
      permute kernel — observed 35% slower than predicted vs DeepEP-on-Hopper baseline.
    evidence: 'msprof equivalent (cnperf) shows HCCL all-to-all takes 1.8x predicted time.'
    proposed_corpus_update: |
      Add `fused-moe-dispatch-hccl` fused-kernel entry as the Cambricon analog
      to fused-moe-dispatch-deepep. Document the perf gap explicitly.

