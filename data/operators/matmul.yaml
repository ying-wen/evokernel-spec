id: matmul
name: Matrix Multiplication (GEMM)
category: matmul

flops_formula: '2 * M * N * K'
bytes_formula: '2 * (M*K + K*N + M*N)'
arithmetic_intensity_formula: 'M*N*K / (M*K + K*N + M*N) ≈ M*N/(M+N) when K is large'
arithmetic_intensity_typical:
  min: 16
  max: 4096
  notes: 'small-batch decode GEMV ~ 16-64 FLOP/byte (memory-bound); large prefill batched ~ 1000+ (compute-bound)'

description: |
  General Matrix Multiply (GEMM): `C = A @ B`. 推理里所有 GEMM 都来自 attention projection
  (Q/K/V/O), FFN gate/up/down, lm_head, embedding lookup-projection. 规模决定 roofline 位置:
  decode 阶段几乎都是 GEMV (batch=1), prefill 是 batched GEMM。

variants: [gemv, batched-matmul, grouped-matmul]

fusion_targets: [silu, gelu, rmsnorm, layernorm, rope, allreduce]
participates_in_fused_kernels:
  - fused-mlp-silu
  - fused-rope-qkv
  - fused-rmsnorm-residual
  - fused-qkv-projection

engine_implementations:
  - name: cuBLAS / cuBLASLt
    hardware_arch: [hopper, ampere, ada, blackwell]
    url: https://docs.nvidia.com/cuda/cublas/
    notes: 'NVIDIA 官方 BLAS; FP8/FP4 走 cuBLASLt'
  - name: hipBLASLt
    hardware_arch: [cdna3, cdna4, rdna3]
    url: https://github.com/ROCm/hipBLASLt
    notes: 'AMD ROCm BLAS, MI300X/MI355X'
  - name: CUTLASS
    hardware_arch: [hopper, ampere, ada, blackwell]
    url: https://github.com/NVIDIA/cutlass
    notes: '可定制模板, 支持自定义 epilogue (fusion 入口)'
  - name: Triton matmul
    hardware_arch: [hopper, ampere, ada, blackwell, cdna3, cdna4]
    url: https://github.com/triton-lang/triton
    notes: 'Python DSL, vLLM/SGLang 大量用'
  - name: AscendC GEMM
    engine_id: mindie
    hardware_arch: [ascend-910b, ascend-910c, davinci-3]
    notes: '昇腾原生 GEMM via Cube Unit'
  - name: BANG / Neuware GEMM
    hardware_arch: [cambricon-mlu]
    notes: '寒武纪 MLU 私有 GEMM'

precision_support: [fp4, fp8-e4m3, fp8-e5m2, bf16, fp16, fp32, int4-awq, int4-gptq, int8]

related_patterns: [memory-bound-decode-prefer-int8, flashattention-v3]

references:
  - title: 'CUTLASS: CUDA Templates for Linear Algebra Subroutines'
    url: https://github.com/NVIDIA/cutlass
    source_type: implementation
  - title: 'Marlin: Mixed Precision Auto-Tuned GEMM Kernel'
    url: https://github.com/IST-DASLab/marlin
    source_type: implementation

formal_semantics:
  signature: |
    matmul(A: Tensor[M, K], B: Tensor[K, N], alpha: scalar = 1.0, beta: scalar = 0.0,
           C: Optional[Tensor[M, N]] = None) -> Tensor[M, N]
    output[m, n] = alpha * sum_k(A[m, k] * B[k, n]) + beta * (C[m, n] if C else 0)
    Layout (row-major vs column-major) and transpose flags affect indexing.

  edge_cases:
    - input: 'M=0 or N=0 or K=0 (any zero-dim)'
      behaviors:
        cublas: 'Returns C unchanged (or zero tensor if C absent)'
        cutlass: 'ASSERT — refuses dispatch in some templates; user must check first'
        cnnl: 'Returns C unchanged'
        aclnn: 'Returns C unchanged'
        rocblas: 'Returns C unchanged'
      mitigation: 'Always check non-zero dims before calling. Critical for dynamic-shape inference (e.g., padded batches).'

    - input: 'Mixed dtypes (FP8 A, FP16 B)'
      behaviors:
        cublas: 'Supported via cuBLASLt with separate scaling factors'
        rocblas: 'Supported on MI300X+; older archs require manual cast'
        aclnn: 'Limited support; usually requires manual cast to common dtype first'
        cnnl: 'Cast required to common dtype'

    - input: 'NaN/Inf in A or B'
      behaviors:
        all_libs: 'Propagated via floating-point semantics (NaN × x = NaN, Inf × 0 = NaN)'
      mitigation: 'Detect upstream; matmul will not silently mask.'

  numerical_rules:
    - aspect: 'accumulation_dtype'
      per_library:
        cublas: 'FP16 input → FP32 accum (default) or FP16 accum (CUBLAS_COMPUTE_16F)'
        cutlass: 'Configurable per template instantiation; default FP32'
        rocblas: 'FP16 input → FP32 accum (default)'
        aclnn: 'FP16 input → FP32 accum'
        ck: 'Configurable; default FP32'
      notes: 'Some custom Triton kernels accumulate in FP16 silently — quality drop on long K dim.'

    - aspect: 'deterministic_reduction'
      per_library:
        cublas: 'Default deterministic for fixed alpha/beta'
        rocblas: 'Default non-deterministic pre-MI300X; ROCBLAS_LAYER=1 for det'
        cutlass: 'Deterministic per template; split-K may introduce non-det'
        aclnn: 'Deterministic'

    - aspect: 'fp8_scaling'
      per_library:
        cublas: 'Per-tensor scaling (cuBLASLt scaleA, scaleB args)'
        cutlass: 'Per-tensor or per-block (FP8 epilogue layout)'
        rocblas: 'Per-tensor (MI300X)'
        ck: 'Per-tensor or per-block (CK epilogue)'
      notes: 'NVFP4 / MXFP4 use per-block scaling; agent must check block size matches kernel expectation (16 vs 32).'

  reference_impl:
    framework: pytorch
    snippet: |
      def matmul(A, B, alpha=1.0, beta=0.0, C=None):
          # PyTorch's @ operator + bias
          out = alpha * (A @ B)
          if C is not None:
              out = out + beta * C
          return out
