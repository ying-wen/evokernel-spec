id: mel-spectrogram-encode
name: Mel-Spectrogram Encode (audio preprocessing for ASR/TTS)
category: misc

flops_formula: 'T_audio * fft_size * log(fft_size) (T = audio frames at 16kHz)'
bytes_formula: 'T_audio * (fft_size * 4 + n_mels * 4)'
arithmetic_intensity_formula: 'fft_size * log(fft_size) / 8'
arithmetic_intensity_typical:
  min: 5
  max: 20
  notes: 'Memory-bound; FFT is the dominant cost. Often run on CPU but GPU offload is possible.'

description: |
  Mel-spectrogram encoding is the audio preprocessing step common to all ASR + TTS
  models in the corpus (Whisper, Parakeet, F5-TTS). Converts raw 16-bit PCM audio
  (16 kHz typical) into a 2D Mel-frequency spectrogram suitable for input to a
  neural network.

  Pipeline:
  ```
  1. Frame audio: split into overlapping windows (25ms × 10ms hop typical)
  2. Window function: apply Hann window
  3. FFT: each window → frequency bins (n_fft = 400 or 512)
  4. Power spectrum: |FFT|²
  5. Mel filterbank: project linear-frequency bins → 80 (Mel) bins
  6. Log-magnitude: log(mel + epsilon)
  7. Normalize: zero-mean, unit-variance
  ```

  Output: [n_mels=80, T_frames] (e.g., 30 seconds audio → 3000 frames).

  ## Why it's a separate op (not just CPU preprocessing)

  Most ASR / TTS pipelines run mel-spectrogram on CPU, but for **streaming low-latency
  inference** (real-time voice agent), CPU preprocessing adds 10-30ms latency that
  can dominate the total round-trip. GPU offload reduces this to <1ms.

  - Whisper standard pipeline: CPU mel-spec, single 30s chunk
  - Whisper-streaming: GPU mel-spec, chunked 5s windows
  - F5-TTS: GPU mel-spec (output side: text → mel → waveform)
  - Parakeet: GPU mel-spec embedded in encoder graph

  ## Implementation paths

  - **PyTorch torchaudio**: `torchaudio.transforms.MelSpectrogram` — slow, CPU-only
  - **NVIDIA NeMo**: GPU-native via cuFFT. Used in Parakeet. ~30× faster than CPU.
  - **Whisper.cpp**: Custom AVX/Metal/Neon impl for edge / mobile.
  - **TensorRT-LLM**: Includes Whisper preprocessing as a fused kernel; recommended for production.
  - **Apple MLX**: Native Metal mel-spec for on-device Whisper / F5-TTS.

variants: [streaming, batch, log-mel]

fusion_targets: []
participates_in_fused_kernels: []

engine_implementations:
  - name: NVIDIA NeMo audio_to_mel_spectrogram_preprocessor
    engine_id: tensorrt-llm
    hardware_arch: [hopper, ampere, ada, blackwell]
    url: https://github.com/NVIDIA/NeMo/blob/main/nemo/collections/asr/parts/preprocessing/features.py
    notes: 'Reference impl, used in Parakeet and Riva TTS.'
  - name: torchaudio MelSpectrogram (slow but portable)
    hardware_arch: [hopper, ampere, ada, cdna3, cdna4]
    url: https://pytorch.org/audio/stable/transforms.html
  - name: Whisper.cpp mel encoder (CPU)
    hardware_arch: []
    url: https://github.com/ggml-org/whisper.cpp
    notes: 'AVX/Metal/Neon SIMD; for edge / mobile / fanless devices.'
  - name: F5-TTS Vocos vocoder mel-encoder
    hardware_arch: [hopper, ampere, ada, blackwell]
    url: https://github.com/SWivid/F5-TTS
    notes: 'Output side: text → predicted mel → Vocos vocoder → waveform.'

precision_support: [fp32, fp16]

related_patterns: []

references:
  - title: 'Robust Speech Recognition via Large-Scale Weak Supervision (Whisper)'
    url: https://cdn.openai.com/papers/whisper.pdf
    source_type: paper
  - title: 'NVIDIA NeMo audio preprocessing'
    url: https://docs.nvidia.com/deeplearning/nemo/user-guide/docs/en/main/asr/api.html
    source_type: docs

formal_semantics:
  signature: |
    mel_spectrogram_encode(audio: [B, T_samples], n_fft: int=400, hop_length: int=160,
                            n_mels: int=80, sample_rate: int=16000)
        -> mel: [B, n_mels=80, T_frames]
    where T_frames = (T_samples - n_fft) / hop_length + 1
    Standard parameters: 16 kHz audio, 25ms window (n_fft=400), 10ms hop (160), 80 Mel bins.

  edge_cases:
    - input: 'streaming chunked audio (chunk < 30s for Whisper)'
      behaviors:
        whisper-streaming: 'Pad to 30s with zeros; processes only valid frames.'
        parakeet-streaming: 'No 30s constraint; can process arbitrary length frame-by-frame.'
        f5-tts: 'Output side; chunk size is "mel frames per generation step", not audio.'
      mitigation: 'For streaming Whisper: zero-pad. For Parakeet/F5: no special handling needed.'

    - input: 'audio sample rate mismatch (e.g., 8 kHz phone audio fed to 16 kHz model)'
      behaviors:
        all_libs: 'Resample at preprocessing — torchaudio.transforms.Resample. Critical to do FIRST before FFT.'
      mitigation: 'Wrong sample rate → wrong frequency content → wrong mel features. Always validate input rate.'

  numerical_rules:
    - aspect: 'fft_dtype'
      per_library:
        cufft-fp32: 'FP32 standard. cuFFT supports FP16 but rarely useful.'
        torch-stft: 'FP32 internally even with FP16 input.'
      notes: 'FP32 is the safe default; FP16 FFT loses too much resolution at low frequencies (where speech energy concentrates).'

    - aspect: 'log_epsilon_handling'
      per_library:
        whisper: 'log(max(mel, 1e-10)) — clamps before log to avoid -inf.'
        nemo-asr: 'Same approach; configurable epsilon.'
      notes: 'Without epsilon clamp: silence produces -inf → NaN propagates. All production impls clamp.'

  reference_impl:
    framework: pytorch
    snippet: |
      import torchaudio.transforms as T
      def mel_spectrogram_encode(audio, sample_rate=16000, n_mels=80, n_fft=400, hop_length=160):
          mel_spec = T.MelSpectrogram(
              sample_rate=sample_rate,
              n_fft=n_fft,
              hop_length=hop_length,
              n_mels=n_mels,
              power=2.0,  # power spectrum
          )
          mel = mel_spec(audio)  # [B, n_mels, T_frames]
          # Log-mel
          log_mel = torch.log(torch.clamp(mel, min=1e-10))
          # Normalize per-utterance
          mean = log_mel.mean(dim=-1, keepdim=True)
          std = log_mel.std(dim=-1, keepdim=True)
          return (log_mel - mean) / (std + 1e-5)
