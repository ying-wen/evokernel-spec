id: allreduce
name: AllReduce
category: communication

flops_formula: '0'
bytes_formula: '2 * (N-1)/N * payload_bytes'
arithmetic_intensity_formula: 'N/A (zero compute, pure bandwidth)'
arithmetic_intensity_typical:
  min: 0.001
  max: 0.01
  notes: '纯带宽搬运, 不占算力, 受 NVLink/HCCS scale-up bandwidth 主导'

description: |
  AllReduce: 把每张卡的局部张量求和, 结果广播到全组。Tensor Parallel (TP) 每层 forward
  之后必须 AllReduce 输出 — TP 互联带宽不足时直接卡死整个 LLM 推理。

  实际实现:
  - **Ring AllReduce**: 经典算法, 带宽利用率 (N-1)/N, 适合 NVLink-flat 拓扑
  - **Tree AllReduce**: 大规模时延迟更优
  - **NCCL allreduce**: NVIDIA 自动选择算法的 black-box
  - **MSCCL** (Microsoft) / **HCCL** (Huawei): 拓扑感知, 在层级化网络上更优

variants: [ring-allreduce, tree-allreduce, double-binary-tree]

fusion_targets: [matmul]
participates_in_fused_kernels:
  - fused-allreduce-residual

engine_implementations:
  - name: NCCL
    hardware_arch: [hopper, ampere, ada, blackwell]
    url: https://docs.nvidia.com/deeplearning/nccl/
    notes: 'NVIDIA 通信库, NVLink/IB 拓扑感知'
  - name: RCCL (AMD)
    hardware_arch: [cdna3, cdna4, rdna3]
    url: https://github.com/ROCm/rccl
    notes: 'AMD ROCm 对应 NCCL, Infinity Fabric 优化'
  - name: HCCL (华为)
    hardware_arch: [ascend-910b, ascend-910c]
    notes: '昇腾通信库, HCCS scale-up + RoCE scale-out'
  - name: MUSA Communication Library
    hardware_arch: [moore-threads]
    notes: '摩尔线程对应 NCCL'

precision_support: [bf16, fp16, fp32, fp8-e4m3, int8]

related_patterns: []

references:
  - title: 'Bandwidth Optimal All-reduce Algorithms for Clusters of Workstations'
    url: http://www.cs.fsu.edu/~xyuan/paper/09jpdc.pdf
    source_type: paper
  - title: 'NCCL Documentation'
    url: https://docs.nvidia.com/deeplearning/nccl/
    source_type: docs

formal_semantics:
  signature: |
    allreduce(local_buf: [shape], op: SUM|PROD|MAX|MIN|AVG, dtype) -> reduced_buf: [shape]
    Each rank contributes a buffer; every rank ends up with the same reduced result.
    Two-step decomposition (most modern impls): allreduce = reduce-scatter + all-gather.

  edge_cases:
    - input: 'ring vs tree vs Halving-Doubling algorithm selection'
      behaviors:
        nccl: 'Auto-selects based on (message_size, topology). Ring for large; tree for small.'
        hccl: 'Same auto-selection. Tree variant uses HCCS topology when available (Atlas 800/900).'
        rccl: 'Inherits NCCL algorithm; AMD-specific tuning for Infinity Fabric.'
        torch-distributed: 'Wraps backend; user can hint via NCCL_ALGO env var.'
      mitigation: 'For TP allreduce in LLM (small messages, ~MB scale): tree algorithm. For DP gradient sync (large, GB-scale): ring. Force via NCCL_ALGO=Tree or NCCL_ALGO=Ring.'

    - input: 'in-place vs out-of-place'
      behaviors:
        nccl-inplace: 'send_buf == recv_buf — saves memory; supported.'
        nccl-outplace: 'Separate buffers — required if user code mutates send_buf during the call.'
      mitigation: 'In-place is the common path. Out-of-place rare except in custom CUDA-Graph captures.'

    - input: 'SHARP (in-network reduction on InfiniBand SHARP-capable switches)'
      behaviors:
        nccl-sharp: 'Switch performs the reduction; saves 1 round-trip. Activated via NCCL_SHARP env var + supported topology (NVLink+IB).'
        hccl-no-sharp: 'No equivalent on Ascend (HCCS does not yet support in-network reduce).'
      mitigation: 'On NVL72 / H200 / B200 with SHARP-enabled IB: enable. Saves ~30% on large allreduce.'

    - input: 'CUDA Graph capture mode'
      behaviors:
        nccl-cuda-graph: 'Supported NCCL ≥ 2.13; persistent buffers + capture-time-fixed comm topology.'
        hccl-cuda-graph: 'Equivalent on Ascend via aclrtCmdQueue.'
      mitigation: 'For decode-step latency-critical TP allreduce: use CUDA Graph + NCCL persistent. ~10–20% latency win.'

  numerical_rules:
    - aspect: 'reduction_dtype_for_fp16_inputs'
      per_library:
        nccl-fp16-sum: 'Reduces in FP16. Loses precision when many ranks (8+) sum small values; mantissa overflow possible.'
        nccl-fp32-accum: 'NCCL ≥ 2.18 supports FP32 reduction with FP16 inputs (env: NCCL_PROTO=LL128 + accum_dtype). Recommended for training.'
        hccl: 'BF16 reduction by default; promotes to FP32 for op=SUM if precision_mode=high_precision.'
      notes: |
        Critical for LLM gradient allreduce on TP > 8: FP16 inputs + FP16 reduction loses
        precision, causing convergence regressions. Always promote to FP32 for SUM. PROD/MAX/MIN
        are exact in input dtype, no upcast needed.

    - aspect: 'op_avg_implementation'
      per_library:
        nccl-avg: 'Implemented as SUM then divide by world_size. Two-step but exact.'
        hccl-avg: 'Same.'
      notes: 'AVG = SUM/N; not a separate primitive. Beware: for non-uniform contributions (padded sequences), AVG-as-SUM-then-div may NOT be desired — multiply by 1/active_rank_count instead.'

    - aspect: 'split_allreduce_for_overlap'
      per_library:
        zero-bubble-split: 'allreduce = reduce-scatter (kernel A) → wait → all-gather (kernel B). Allows overlap of A with downstream compute.'
        flash-comm: 'Same decomposition; embedded into kernel boundary by FlashComm fusion.'
      notes: 'For TP-overlap optimization (DeepSpeed Ulysses, FlashComm): explicit split avoids the synchronous allreduce barrier. Used in DeepSeek V3 training.'

  reference_impl:
    framework: pytorch
    snippet: |
      import torch.distributed as dist
      def allreduce_sum_fp32_accum(buf):
          # buf: BF16 or FP16 tensor; reduce in FP32 internally
          buf_fp32 = buf.to(torch.float32)
          dist.all_reduce(buf_fp32, op=dist.ReduceOp.SUM)
          return buf_fp32.to(buf.dtype)
