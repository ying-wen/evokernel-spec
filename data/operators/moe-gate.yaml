id: moe-gate
name: MoE Routing & Dispatch
category: moe-routing

flops_formula: 'batch * seq * hidden * num_experts'
bytes_formula: '2 * batch * seq * (hidden + num_experts)'
arithmetic_intensity_formula: '~ hidden / 2 (compute-bound for large hidden)'
arithmetic_intensity_typical:
  min: 100
  max: 4000
  notes: '路由本身是 GEMM-shaped; 但 dispatch + combine 引入 all-to-all → 受互联带宽控制'

description: |
  MoE 路由有 3 段:
  1. **Router GEMM**: `logits = x @ W_router`  (类似 GEMV/GEMM)
  2. **Top-k selection + softmax** over experts (排序 + 归一化)
  3. **Dispatch**: 把 token 按选中的 expert 拆分 (all-to-all 通信)
     **Combine**: 拉回 expert 输出 (再一次 all-to-all)

  实际部署中 1+2 通常 fuse 成 router kernel; 3 是 EP (expert parallel) 通信瓶颈,
  跨节点 all-to-all 在大规模 MoE 上是性能杀手 (DeepSeek-V3 用 DeepEP 优化此处).

variants: [top-k-routing, soft-mixture-of-experts, expert-choice-routing]

fusion_targets: [matmul, softmax, all2all]
participates_in_fused_kernels:
  - fused-moe-routing
  - fused-moe-experts

engine_implementations:
  - name: vLLM fused_moe
    engine_id: vllm
    hardware_arch: [hopper, ampere, ada, blackwell]
    url: https://github.com/vllm-project/vllm/blob/main/vllm/model_executor/layers/fused_moe
    notes: 'top-k + softmax + dispatch in one Triton kernel'
  - name: SGLang grouped_topk + dispatch
    engine_id: sglang
    hardware_arch: [hopper, ampere, blackwell]
  - name: DeepEP (DeepSeek)
    hardware_arch: [hopper, blackwell]
    url: https://github.com/deepseek-ai/DeepEP
    notes: '专门优化大规模 EP 的高性能 all-to-all + dispatch 库'
  - name: MindIE MoE dispatch
    engine_id: mindie
    hardware_arch: [ascend-910b, ascend-910c]
    notes: '昇腾原生 MoE 支持, HCCS all-to-all'

precision_support: [bf16, fp16, fp32, fp8-e4m3]

related_patterns: [moe-expert-routing-on-domestic]

references:
  - title: 'Outrageously Large Neural Networks: The Sparsely-Gated Mixture-of-Experts'
    url: https://arxiv.org/abs/1701.06538
    source_type: paper
  - title: 'DeepEP: An efficient expert-parallel communication library'
    url: https://github.com/deepseek-ai/DeepEP
    source_type: implementation
  - title: 'GShard: Scaling Giant Models with Conditional Computation'
    url: https://arxiv.org/abs/2006.16668
    source_type: paper

formal_semantics:
  signature: |
    moe_gate(x: [B, S, D], W_router: [D, E], top_k: int) -> (indices: [B,S,K], weights: [B,S,K])
    logits = x @ W_router
    indices, weights = top_k(softmax(logits), k=top_k)
    Routes each token to top-K experts (E total experts).

  edge_cases:
    - input: 'extreme load imbalance (1 expert gets 90%+ tokens)'
      behaviors:
        vllm-deepep: 'OK — pad/drop with aux loss tracking; warn'
        sglang-deepep: 'Same'
        mindie-moe: 'Triggers expert-overload alert; may quantize / drop low-prio'
      mitigation: 'Add aux balance loss during training. At inference: monitor per-expert utilization, alert if max/min > 4×.'

    - input: 'top_k > num_experts (config error)'
      behaviors:
        all_libs: 'ASSERT or undefined behavior'
      mitigation: 'Validate config: top_k ≤ E. Llama 4 Scout uses K=1, DeepSeek V3 K=8, Qwen 3.6 K=8 — all valid.'

    - input: 'shared_experts > 0 (DeepSeek/Mixtral hybrid)'
      behaviors:
        vllm-shared: 'Shared experts always active; routed top-K added on top'
        sglang-shared: 'Same'
        deepseek-r1: 'Built-in: 1 shared + top-8 routed per token'
      mitigation: 'When porting, distinguish shared (always-on) from routed (top-K). Different compute path.'

    - input: 'noisy gating (training-only) vs deterministic (inference)'
      behaviors:
        vllm-inference: 'Deterministic; no noise injection'
        sglang-inference: 'Same'
      notes: 'Training-time noise (Switch Transformer) is OFF at inference.'

  numerical_rules:
    - aspect: 'softmax_position'
      per_library:
        vllm-deepep: 'softmax over all E logits, then top-K'
        sglang: 'Same'
        deepseek-paper: 'Some variants softmax AFTER top-K (sigmoid+norm)'
      notes: 'Pre vs post softmax matters for numerical stability + load distribution. Verify match with model paper.'
    - aspect: 'gate_dtype'
      per_library:
        vllm-default: 'FP32 router (even when model is FP16/FP8 quantized)'
        sglang-default: 'FP32 router'
      notes: 'Router precision is critical — quantizing it loses load balance fidelity.'

  reference_impl:
    framework: pytorch
    snippet: |
      def moe_gate(x, W_router, top_k=8):
          # Router is always full-precision (fp32)
          logits = (x.float() @ W_router.float())  # [B, S, E]
          # softmax then top-k (DeepSeek convention)
          weights = F.softmax(logits, dim=-1)
          top_weights, top_indices = weights.topk(top_k, dim=-1)
          # renormalize so top-K weights sum to 1
          top_weights = top_weights / top_weights.sum(dim=-1, keepdim=True)
          return top_indices, top_weights
