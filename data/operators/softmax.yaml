id: softmax
name: Softmax
category: activation

flops_formula: '5 * batch * heads * seq * seq'
bytes_formula: '2 * batch * heads * seq * seq'
arithmetic_intensity_formula: '~ 2.5 FLOP/byte'
arithmetic_intensity_typical:
  min: 2
  max: 3
  notes: 'memory-bound when standalone; FlashAttention 把它 fuse 进 attention 主 kernel 让它"消失"'

description: |
  Softmax over attention scores: `softmax(QK^T / sqrt(d_k))`. 数值稳定形式需要先减 max
  再 exp, 然后归一化 — **三遍 N×N 矩阵读写**, 显存带宽极敏感。
  这正是 FlashAttention 的核心优化目标: 不显式 materialize attention matrix, softmax
  改用 online normalization 算法在 SRAM 内分块累加。

variants: []

fusion_targets: [attention]
participates_in_fused_kernels:
  - flash-attention-v3
  - paged-attention-decode

engine_implementations:
  - name: 'Online softmax (Milakov & Gimelshein 2018)'
    hardware_arch: [hopper, ampere, ada, blackwell, cdna3, cdna4]
    url: https://arxiv.org/abs/1805.02867
    notes: '所有现代 attention kernel 都用这个; 不再单独有 standalone softmax kernel'
  - name: cudnn softmax
    hardware_arch: [hopper, ampere, ada, blackwell]
    notes: '兜底实现, 性能不如 fused 版'

precision_support: [bf16, fp16, fp32]

related_patterns: [flashattention-v3, paged-attention]

references:
  - title: 'Online normalizer calculation for softmax'
    url: https://arxiv.org/abs/1805.02867
    source_type: paper

formal_semantics:
  signature: |
    softmax(x: Tensor[..., D], dim: int = -1) -> Tensor[..., D]
    output[..., i] = exp(x[..., i] - max(x[..., :])) / sum_j(exp(x[..., j] - max(x[..., :])))
    Numerically stable form requires subtracting max before exp.

  edge_cases:
    - input: 'all elements are -inf (e.g., fully-masked attention row)'
      behaviors:
        cudnn: 'Returns 0 in all positions'
        cublas: 'Returns 0 in all positions (via cuBLASLt softmax)'
        triton-default: 'Returns NaN if max-subtract not applied (older Triton kernels)'
        aclnn: 'Returns 0 in all positions'
        cnnl: 'Returns 0 in all positions'
        rocblas-miopen: 'Returns 0 in all positions'
      mitigation: 'Always use stable variant (max-subtract). Verify by feeding all -inf and asserting output is all 0.'

    - input: 'single-element dim'
      behaviors:
        all_libs: 'Returns 1.0'

    - input: 'empty dim (size 0)'
      behaviors:
        cudnn: 'Returns empty tensor'
        pytorch: 'Returns empty tensor'
        cutlass: 'ASSERT — refuses to dispatch; user must check size before call'

  numerical_rules:
    - aspect: 'deterministic_reduction'
      per_library:
        cudnn: 'Deterministic by default'
        cublas: 'Deterministic by default'
        triton-flash-attn: 'Non-deterministic (parallel reduction order varies across runs)'
        aclnn: 'Deterministic'
        cnnl: 'Deterministic'
        rocblas: 'Default non-deterministic pre-MI300X; deterministic on MI300X+'

    - aspect: 'accumulation_dtype_with_fp16_input'
      per_library:
        cudnn: 'FP32 internal'
        cublas: 'FP32 internal'
        custom_triton: 'Configurable (FP16 or FP32) — must specify explicitly'
        aclnn: 'FP32 internal'

  reference_impl:
    framework: pytorch
    snippet: |
      def softmax(x, dim=-1):
          x_max = x.max(dim=dim, keepdim=True).values
          # max-subtract for numerical stability
          x_shifted = x - x_max
          # all -inf input → all -inf shifted → exp 0 → sum 0
          # divide-by-zero gives NaN; some libs short-circuit and return 0
          exp_x = torch.exp(x_shifted)
          return exp_x / exp_x.sum(dim=dim, keepdim=True)
