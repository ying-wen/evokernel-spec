id: lora-bgmv
name: LoRA BGMV (Batched Grouped Matrix-Vector for multi-tenant LoRA serving)
category: matmul

flops_formula: '2 * batch * rank * (input_dim + output_dim)'
bytes_formula: 'batch * (input_dim + output_dim) + active_loras * 2 * rank * (input_dim + output_dim)'
arithmetic_intensity_formula: 'rank * 2 / (1 + active_loras / batch)'
arithmetic_intensity_typical:
  min: 1.0
  max: 16.0
  notes: 'Bandwidth-bound for typical rank=8-64 + ~16 active LoRAs per batch. Bigger rank or fewer LoRAs → more compute-bound.'

description: |
  BGMV (Batched Grouped Matrix-Vector) is the kernel that makes multi-tenant
  LoRA serving fast. The naive approach to serving N LoRAs on a single base
  model is to either (a) run N separate inference passes, or (b) merge each
  LoRA into base weights (which destroys the multiplexing benefit).

  BGMV instead **batches requests with different LoRAs** in a single forward
  pass. For each token in the batch, it does:
  ```
  output[i] = base_weight @ input[i] + lora_B[adapter_id[i]] @ (lora_A[adapter_id[i]] @ input[i])
  ```
  Different rows of `output` may use different LoRA adapters. The kernel uses
  `gather`-style indexing into a stacked LoRA tensor (shape: [num_loras, rank, hidden_dim])
  so each token gets its assigned adapter at near-zero overhead.

  ## Why BGMV is the key

  Without BGMV: serving 100 LoRAs requires either 100 separate batches (3-5%
  GPU utilization each) or 100 separate model copies (impossible at scale).

  With BGMV (Punica / S-LoRA / vLLM 0.6+): all 100 LoRAs share the base model
  HBM, requests with different LoRAs batch together, GPU stays at 60-80% util.

  ## Performance characteristics

  - **Bandwidth-bound** for typical workloads (rank=8-64, 16 active LoRAs in batch).
    HBM reads: base weights once, then for each token gather rank-sized LoRA slice.
  - **Compute scaling**: BGMV adds ~5-10% throughput overhead vs single-LoRA serving.
    At 100+ active LoRAs, throughput penalty grows but is still cheaper than separate models.
  - **Cold LoRA swap**: when an adapter not in HBM is needed, ~50-200 ms swap from
    host RAM. Production systems keep top-K most-recently-used in HBM.

variants: [punica, s-lora, vllm-multi-lora]

fusion_targets: [matmul]
participates_in_fused_kernels: []

engine_implementations:
  - name: vLLM multi-LoRA path
    engine_id: vllm
    hardware_arch: [hopper, ada, blackwell, ampere, cdna3]
    url: https://docs.vllm.ai/en/latest/features/lora.html
    notes: 'Default BGMV implementation; --enable-lora --max-loras N --max-lora-rank R'
  - name: Punica (NeurIPS 2024 reference impl)
    hardware_arch: [hopper, ada]
    url: https://github.com/punica-ai/punica
    notes: 'Original BGMV kernel; CUDA-only, single GPU optimized'
  - name: S-LoRA
    hardware_arch: [hopper, ada]
    url: https://github.com/S-LoRA/S-LoRA
    notes: 'Extends Punica to thousands of LoRAs with LRU cache eviction'
  - name: SGLang LoRA
    engine_id: sglang
    hardware_arch: [hopper, blackwell, ada]
    url: https://docs.sglang.ai/

precision_support: [bf16, fp16, int8]

related_patterns: [lora-adapter-multiplexing]

references:
  - title: 'Punica: Multi-Tenant LoRA Serving (NeurIPS 2024)'
    url: https://arxiv.org/abs/2310.18547
    source_type: paper
  - title: 'S-LoRA: Serving Thousands of Concurrent LoRA Adapters'
    url: https://arxiv.org/abs/2311.03285
    source_type: paper
  - title: 'vLLM multi-LoRA documentation'
    url: https://docs.vllm.ai/en/latest/features/lora.html
    source_type: docs

formal_semantics:
  signature: |
    lora_bgmv(x: [B, D_in], A: [num_loras, D_in, r], B: [num_loras, r, D_out],
              lora_indices: [B], scale: float) -> y: [B, D_out]
    Batched grouped matrix-vector: each batch row i applies its assigned LoRA
    (lora_indices[i]) to x[i]. Output y[i] += scale * x[i] @ A[lora_indices[i]] @ B[lora_indices[i]].

  edge_cases:
    - input: 'no LoRA assigned (lora_index = -1 sentinel)'
      behaviors:
        punica: 'Sentinel -1 maps to identity LoRA (zero contribution).'
        vllm-multi-lora: 'Same — base model output passes through unchanged.'
      mitigation: 'Standard. Base model traffic mixed with LoRA traffic in same batch; sentinel handling is critical.'

    - input: 'LoRA rank r too large (memory blowup)'
      behaviors:
        all_libs: 'r * num_loras * D_in storage cost. Typical r=16-64; num_loras up to 100s in production multi-tenant.'
      mitigation: 'Cap num_loras × r at HBM budget. For S-LoRA: spill cold LoRAs to DRAM, page-in on demand.'

    - input: 'distinct base models (different shape) requested in same batch'
      behaviors:
        vllm: 'Forbidden — all batch rows must use same base model. Use separate engine instances.'
      mitigation: 'Architecture limitation; don"t mix base models in same batch.'

  numerical_rules:
    - aspect: 'two_step_matmul_precision'
      per_library:
        punica: 'Both A and B matmuls use BF16 inputs + FP32 accumulator (standard).'
        vllm: 'Same.'
      notes: 'No LoRA-specific precision concern. The scale factor (typically alpha/r ≈ 1-2) is applied in BF16 — no overflow.'

  reference_impl:
    framework: pytorch
    snippet: |
      def lora_bgmv(x, A, B, lora_indices, scale):
          # x: [B, D_in]; A: [num_loras, D_in, r]; B: [num_loras, r, D_out]
          # Per-row gather + GEMV
          A_per_row = A[lora_indices]  # [B, D_in, r]
          B_per_row = B[lora_indices]  # [B, r, D_out]
          tmp = torch.einsum('bd,bdr->br', x, A_per_row)  # [B, r]
          out = torch.einsum('br,bro->bo', tmp, B_per_row)  # [B, D_out]
          return scale * out
