id: embedding-lookup
name: Embedding Lookup (input + output projection)
category: embedding

flops_formula: '2 * batch * seq * hidden * vocab_size (output projection only — input is gather)'
bytes_formula: 'input: 4 * batch * seq * hidden (gather); output: 2 * batch * hidden * vocab_size'
arithmetic_intensity_formula: '~ 0.1 FLOP/byte for input gather; ~10–100 for output proj (depends on vocab)'
arithmetic_intensity_typical:
  min: 0.1
  max: 100
  notes: 'Bimodal: input embedding lookup 是纯 memory access (AI ~0.1); output projection 是 large GEMM (AI ~10-100)'

description: |
  Embedding 在 LLM 推理中分两部分:

  1. **Input embedding lookup**: token id → embedding vector. 纯 memory gather, 几乎免费 (但
     在大 vocab 模型 vocab_size = 200K+ 时 embedding table 占大量 HBM).
  2. **Output projection (LM head)**: hidden state → logits over vocab. 大 GEMM,
     `[batch, hidden] × [hidden, vocab_size]` → `[batch, vocab_size]`. **Decode 阶段
     这是单次 forward 的 dominant compute** (vocab=128K-200K 时 LM head GEMM > attention).

  ## 现代 LLM 关键考虑

  - **Tied embedding**: 输入 embedding 和 LM head 共享权重 (Llama 2/3, Qwen 2.5)
    省 vocab×hidden 内存; Llama 4, DeepSeek V3 解绑 (每个独立, 但 vocab 上小 model
    上几百 MB 占用)
  - **Vocab pruning**: 大 vocab 模型 (Llama 4 Behemoth 260K vocab) 在低延迟场景启用
    vocab pruning — 只在 top-K candidate 上算 logits
  - **Mixed-precision LM head**: weight INT8/FP8, activation FP16. 减 50-75% 内存占用
  - **FP4 LM head (Blackwell)**: native FP4 GEMM, 4x decode speedup on output proj

  ## Decode 时 LM head 是真实瓶颈

  ```
  Llama 3 70B decode:
    attention:    ~ 300 GFLOPs / token  (memory-bound)
    LM head:      ~ 2000 GFLOPs / token (compute-bound on H100 BF16)
  ```

  这就是为什么 Blackwell 的 FP4 LM head GEMM 是 decode 提速的 sleeper feature.

variants: [tied-embedding, untied-embedding, lm-head, vocab-parallel-projection]

fusion_targets: [matmul, softmax]
participates_in_fused_kernels: []

engine_implementations:
  - name: vLLM Vocabulary parallel embedding
    engine_id: vllm
    hardware_arch: [hopper, ampere, ada, blackwell]
    url: https://github.com/vllm-project/vllm/blob/main/vllm/model_executor/layers/vocab_parallel_embedding.py
  - name: TRT-LLM ParallelEmbedding
    engine_id: tensorrt-llm
    hardware_arch: [hopper, ada, blackwell]
  - name: SGLang LM head with logit cache
    engine_id: sglang
    hardware_arch: [hopper, ampere, blackwell]
  - name: MindIE Embedding (AscendC)
    engine_id: mindie
    hardware_arch: [ascend-910b, ascend-910c, davinci-3]

precision_support: [bf16, fp16, fp8-e4m3, fp4, int8]

related_patterns: [fp4-weight-only-quant]

references:
  - title: 'Tied Embedding Weights (Press & Wolf 2017)'
    url: https://arxiv.org/abs/1608.05859
    source_type: paper
  - title: 'vLLM vocab parallel embedding'
    url: https://github.com/vllm-project/vllm/blob/main/vllm/model_executor/layers/vocab_parallel_embedding.py
    source_type: implementation

formal_semantics:
  signature: |
    embedding_lookup(input_ids: [B, S], embedding: [V, D]) -> y: [B, S, D]
    Pure indexed gather: y[b, s, :] = embedding[input_ids[b, s], :].

  edge_cases:
    - input: 'vocab parallel — embedding split across TP ranks'
      behaviors:
        vllm-vocab-parallel: 'Each TP rank owns V/world_size rows; out-of-range token_id returns zero, then all-reduce sums contributions.'
        megatron-vocab-parallel: 'Same pattern.'
      mitigation: 'Mandatory at TP=8+ for huge vocab (V=128K-256K). Without vocab-parallel: 256K * 8K * BF16 = 4 GB embedding fully replicated per rank.'

    - input: 'tied input/output embedding'
      behaviors:
        all_libs: 'Most LLMs (Llama 3, Qwen 3.6, GPT-OSS) tie input embedding == output projection W. Saves V*D params.'
      mitigation: 'Engine must detect tying from config (tie_word_embeddings flag) and avoid duplicate weight load.'

    - input: 'OOV / padding tokens'
      behaviors:
        all_libs: 'pad_token_id (typically 0) maps to a row of zeros (or learned pad embedding).'
      mitigation: 'Standard. No correctness concern unless pad tokens leak into attention compute (mask should exclude them).'

  numerical_rules:
    - aspect: 'no_arithmetic_no_precision_concern'
      per_library:
        all_libs: 'Pure gather; bit-identical. The output dtype matches embedding dtype (typically BF16/FP16).'

  reference_impl:
    framework: pytorch
    snippet: |
      import torch.nn.functional as F
      def embedding_lookup(input_ids, embedding):
          # input_ids: [B, S] int64; embedding: [V, D]
          return F.embedding(input_ids, embedding)
