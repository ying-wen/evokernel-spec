    notes: 'Block-radix top-K + fused multinomial; FP32 logit accumulator'
  - name: TRT-LLM sampling
    engine_id: tensorrt-llm
    hardware_arch: [hopper, ada, blackwell]
  - name: SGLang sampling
    engine_id: sglang
    hardware_arch: [hopper, ampere, blackwell]
  - name: llama.cpp sampling
    hardware_arch: [hopper, ampere, ada, cdna3]
    url: https://github.com/ggerganov/llama.cpp
    notes: 'CPU + GPU; min-p / mirostat sampling 默认'
  - name: MindIE Sampling (AscendC)
    engine_id: mindie
