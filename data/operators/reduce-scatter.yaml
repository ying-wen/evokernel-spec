id: reduce-scatter
name: Reduce-Scatter (TP / SP collective)
category: communication

flops_formula: '0 (pure communication)'
bytes_formula: '(N - 1) / N * total_size'
arithmetic_intensity_formula: '0 (network-bound, latency + bandwidth)'
arithmetic_intensity_typical:
  min: 0.001
  max: 0.01
  notes: '纯通信; 性能由 NVLink/NVSwitch/HCCS bandwidth + topology + algorithm 决定 (近零 AI)'

description: |
  Reduce-Scatter 把分布在 N 张卡上的张量做 element-wise reduce (求和), 然后把结果
  按 rank 切分回 N 份, 每张卡只持有 1/N 大小. 与 all-reduce 互补 (`all-reduce = reduce-scatter + all-gather`).

  ## 与其他 collective 的关系

  - **all-reduce(N elements)** = reduce-scatter(N) + all-gather(N) — 总通信量 2 × (N-1)/N × bytes
  - **reduce-scatter(N)** = single-pass reduce + sharding — 通信量 (N-1)/N × bytes
  - **all-gather(N)** = broadcast 自己的 chunk 给所有人 — 通信量 (N-1)/N × bytes

  Reduce-scatter 比 all-reduce **省一半带宽** — 但下游必须接受 sharded 输出.

  ## 在 LLM 推理中的使用

  - **Tensor Parallelism (TP)**: 每层 attention/FFN 输出做 all-reduce → 改造成 reduce-scatter + all-gather 拆开,
    可以与下一层 GEMM overlap (zero-bubble TP)
  - **Sequence Parallelism (SP)**: layer-norm / dropout 等 element-wise 操作沿 sequence 切分 →
    reduce-scatter 是 SP→TP 转换的关键 collective
  - **MoE EP**: expert 输出 reduce-scatter 回 token-routing 域

  ## 算法变种

  - **Ring**: 每张卡向下一张卡发 1/N chunk × N-1 step; bandwidth-optimal, 延迟高
  - **Tree (recursive halving)**: 对数级 step, 延迟低, 但带宽利用率稍低
  - **NVSwitch SHARP**: 在 switch 内做 reduce, 1-hop 完成 — Hopper+ NVL 启用 SHARP 时延迟降 30-50%

variants: [ring-rs, recursive-halving-rs, sharp-rs]

fusion_targets: [matmul, attention, all-reduce]
participates_in_fused_kernels:
  - fused-allreduce-residual

engine_implementations:
  - name: NCCL ncclReduceScatter
    hardware_arch: [hopper, ampere, ada, blackwell]
    url: https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/api/colls.html
    notes: 'NVLink/NVSwitch + IB/RoCE; SHARP optional 加速'
  - name: HCCL HcclReduceScatter
    hardware_arch: [ascend-910b, ascend-910c, davinci-3]
    url: https://www.hiascend.com/document
    notes: '昇腾 HCCS 内 reduce; 与 NCCL ABI-similar'
  - name: RCCL ncclReduceScatter
    hardware_arch: [cdna3, cdna4]
    url: https://github.com/ROCm/rccl
    notes: 'AMD ROCm; Infinity Fabric on-package'
  - name: vLLM TP comm
    engine_id: vllm
    hardware_arch: [hopper, ampere, blackwell]
    notes: 'NCCL + custom fused-allreduce-residual path'

precision_support: [bf16, fp16, fp8-e4m3, int8]

related_patterns: []

references:
  - title: 'NCCL collective communication library'
    url: https://github.com/NVIDIA/nccl
    source_type: implementation
  - title: 'Zero-Bubble Pipeline Parallelism (uses split AR=RS+AG)'
    url: https://arxiv.org/abs/2401.10241
    source_type: paper
  - title: 'NVIDIA SHARP collectives'
    url: https://docs.nvidia.com/networking/display/sharpv300
    source_type: docs

formal_semantics:
  signature: |
    reduce_scatter(local_buf: [world_size * N, ...], op: SUM|PROD|MAX|MIN, dtype) -> local_chunk: [N, ...]
    Each rank contributes a full buffer; each rank receives one reduced slice (rank i gets the
    reduction of slice i across all ranks). Dual to all-gather. allreduce = RS + AG.

  edge_cases:
    - input: 'algorithm selection (ring vs hierarchical)'
      behaviors:
        nccl: 'Auto: ring for large messages, hierarchical for cross-node. Same selection logic as allreduce.'
        hccl: 'Same.'
      mitigation: 'Usually inherits the same NCCL_ALGO setting as allreduce. Don’t set them separately.'

    - input: 'split-allreduce (RS+AG with overlap)'
      behaviors:
        zero-bubble: 'RS issued; downstream compute overlaps; AG issued before result needed.'
        flash-comm-rs-gemm: 'Fuses GEMM epilogue with RS — output partial sums get reduced as they emit, no separate kernel.'
      mitigation: 'For TP > 1 LLM training/inference: explicit RS+AG decomposition with overlap is the dominant optimization. v2.0+ vLLM/SGLang both use FlashComm-style fused RS-GEMM.'

    - input: 'in-place reduce-scatter'
      behaviors:
        nccl-inplace: 'recv_buf is at offset rank * N inside send_buf; supported.'
      mitigation: 'In-place is the default for fused path. Not in-place for separate RS step.'

  numerical_rules:
    - aspect: 'reduction_dtype_for_fp16_inputs'
      per_library:
        all_libs: 'Same rule as allreduce: FP32 accumulator with FP16 inputs prevents precision loss for SUM at world_size > 8.'
      notes: 'Critical for grad sync at large TP. Match the allreduce setting — same precision class as AR since RS is "half" of an allreduce.'

    - aspect: 'fused_with_gemm_epilogue'
      per_library:
        flash-comm-rs-gemm: 'GEMM accumulator emits partial output tile-by-tile; each tile RS-reduced as it emits. Saves a full HBM round-trip vs separate RS.'
        cublas-rs-epilogue: 'Not in cuBLAS; FlashComm is custom CUDA.'
      notes: 'On Hopper+: fused-RS-GEMM is 1.3-1.8× faster than separate RS for TP=8 LLM workloads.'

  reference_impl:
    framework: pytorch
    snippet: |
      import torch.distributed as dist
      def reduce_scatter_sum_fp32_accum(full_buf, world_size):
          # full_buf: [world_size * N, D] — each rank contributes full version
          full_fp32 = full_buf.to(torch.float32)
          chunk = torch.empty(full_fp32.shape[0] // world_size, *full_fp32.shape[1:],
                              device=full_fp32.device, dtype=torch.float32)
          dist.reduce_scatter_tensor(chunk, full_fp32, op=dist.ReduceOp.SUM)
          return chunk.to(full_buf.dtype)
