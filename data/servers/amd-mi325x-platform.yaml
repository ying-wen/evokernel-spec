  vendor: amd
  architecture: x86-zen4
  cores_per_node: 192
  sockets_per_node: 2
  pcie_gen: 5
  pcie_lanes_per_node: 256
  host_ram_gb: 3072
  has_coherent_gpu_link: false
  notes: 'AMD MI325X Platform 几乎都配 EPYC Genoa (同厂软硬一体). 192 cores per node 让 vLLM/SGLang router + KV cache 处理 host-side 任务时不卡 — 跟 Sapphire Rapids 同代但 core 数更多. 没有 GPU-coherent 链路 — Infinity Fabric 在 GPU 之间, 不延伸到 host.'
network_topology:
  topology: full-mesh
  in_network_reduction: false
  diameter_hops: 1
  bisection_bandwidth_gbps_per_node: 7168
  latency_us_p99_intra_node: 0.5
  latency_us_p99_inter_node: 2.8
  switch_count: 0
  rdma_capable: true
  notes: |
    MI325X Platform 用 Infinity Fabric P2P **switchless full-mesh** — 8 OAM 之间
    每对直连 (无中央 switch chip), 任意 GPU 对 1 跳, 节省 switch 成本和故障域.
    跨节点出 8 × 400G RoCE-v2 NIC 走 rail-optimized fat-tree, 但 RDMA 没有 SHARP
    in-network reduction (开放标准 RoCE, 不像 NVIDIA 专有 SHARP). 全 P2P 拓扑是
    AMD 与 NVIDIA NVSwitch 路径的关键架构区别.
storage_architecture:
  local_nvme_per_node_tb: 16.0
  parallel_fs_pb: 4.0
  parallel_fs_family: weka
  gpu_direct_storage: false
  rdma_storage: true
  checkpoint_strategy: parallel-fs
  aggregate_read_bandwidth_gbps: 800
  notes: |
    MI325X Platform 暂无 NVIDIA GDS 等价物 — AMD ROCm 的"DirectGMA" 仍 experimental.
    生产部署 weights / dataset 通常走 Weka or Lustre over RoCE-400G RDMA, 但 GPU
    必须先 DMA 到 host RAM 再 to HBM. 多一跳 round-trip vs GDS 路径. 这是 AMD ROCm
    storage 软件成熟度上的真实 gap (vs NVIDIA CUDA + GDS).
cabinet_layout_md: |
  ## AMD MI325X 8-OAM Platform 布局 / Baseboard layout

  - **8× MI325X OAM** 在 UBB 2.0 (Open Compute Project Universal Baseboard) 上
  - **AMD 与 NVIDIA 拓扑差异**: NVL/HGX 用 NVSwitch 集中式拓扑 (8 GPU all-to-all 走 NVSwitch); MI325X Platform 用 Infinity Fabric **fully-connected mesh** (每 GPU 直连其他 7 张), 无中心 switch chip. 部署更简单, fabric 故障域更小, 但单卡-到-单卡 bandwidth (128 GB/s) 比 NVL5 (1800 GB/s/cards-pair) 低.
  - **vs MI300X Platform**: 同 8-OAM 设计, 单卡 HBM 升 192 → 256 GB. 总显存 2 TB.
  - **8× 400 GbE NIC**: scale-out 走 RoCE v2 (Open Fabric, 与 Gaudi 类似 — AMD 也避开 NVLink lock-in).
  - **风冷**: 11 kW 持续 / 13 kW 峰值. UBB 2.0 标准 4U 机箱.

