  notes: 'AMD MI325X Platform 几乎都配 EPYC Genoa (同厂软硬一体). 192 cores per node 让 vLLM/SGLang router + KV cache 处理 host-side 任务时不卡 — 跟 Sapphire Rapids 同代但 core 数更多. 没有 GPU-coherent 链路 — Infinity Fabric 在 GPU 之间, 不延伸到 host.'
cabinet_layout_md: |
  ## AMD MI325X 8-OAM Platform 布局 / Baseboard layout

  - **8× MI325X OAM** 在 UBB 2.0 (Open Compute Project Universal Baseboard) 上
  - **AMD 与 NVIDIA 拓扑差异**: NVL/HGX 用 NVSwitch 集中式拓扑 (8 GPU all-to-all 走 NVSwitch); MI325X Platform 用 Infinity Fabric **fully-connected mesh** (每 GPU 直连其他 7 张), 无中心 switch chip. 部署更简单, fabric 故障域更小, 但单卡-到-单卡 bandwidth (128 GB/s) 比 NVL5 (1800 GB/s/cards-pair) 低.
  - **vs MI300X Platform**: 同 8-OAM 设计, 单卡 HBM 升 192 → 256 GB. 总显存 2 TB.
  - **8× 400 GbE NIC**: scale-out 走 RoCE v2 (Open Fabric, 与 Gaudi 类似 — AMD 也避开 NVLink lock-in).
  - **风冷**: 11 kW 持续 / 13 kW 峰值. UBB 2.0 标准 4U 机箱.

