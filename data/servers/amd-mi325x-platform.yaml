# v1.8: cluster internals — AMD MI325X Platform 是 Universal Baseboard
# (UBB 2.0 OAM) 8-card reference design. Infinity Fabric 全连接 P2P 拓扑
# (无中心 switch chip — 每 GPU 直连其他 7 张). 与 NVL/HGX 集中 NVSwitch 拓扑相反.
