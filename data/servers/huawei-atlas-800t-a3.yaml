  parallel_fs_family: other
  gpu_direct_storage: true
  rdma_storage: true
  checkpoint_strategy: local-nvme
  aggregate_read_bandwidth_gbps: 200
  notes: |
    Atlas 800T A3 是单节点 server, 8 TB local NVMe/node 通常已经足够 (单节点训练
    + 推理). 跨节点 storage 配置由用户决定 — 常见配 OceanStor 但属于客户自购.
    NPU Direct Storage 与 CloudMatrix 384 / Atlas 900 共用 — 信创合规存储栈.
cabinet_layout_md: |
  ## Atlas 800T A3 机箱布局 / Chassis layout

  - **8× Ascend 910B** OAM 板, 单 4U 机箱
  - **HCCS-v1 switch**: 单芯片 radix 16, 端口 50 GB/s. 节点内 bisection 约 0.4 TB/s — 比 HGX H100 NVLink Gen-3 fabric (7.2 TB/s) 慢一个数量级.
  - **4× 200 GbE NIC**: scale-out 走 RoCE v2; cluster 部署时通过外接交换机扩展.
  - **风冷散热**: 4.5 kW 持续 / 5.5 kW 峰值; 标准 4U 机箱.
  - **vs CloudMatrix 384**: Atlas 800T A3 是 enterprise 单机方案; CloudMatrix 384 是 16 机柜 + 32 个 Lingqu 光交换的 hyperscale 部署. 两者对应不同 use case.

