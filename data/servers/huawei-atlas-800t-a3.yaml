  notes: |
    Atlas 800T A3 是单节点 8 Ascend 910C, intra-node 通过 1 个 HCCS-v2 switch
    全连接 (1 跳). 跨节点出 RoCE-v2 200G NIC, 但这是单节点 server, 跨节点拓扑由
    使用方决定 (典型 fat-tree). 信创部署最常见的训推一体平台.
storage_architecture:
