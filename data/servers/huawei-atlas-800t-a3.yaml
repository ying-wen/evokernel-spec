  notes: 'Atlas 800T A3 是 Atlas 800 系列的训推一体节点, host CPU 也是鲲鹏 920 (与 CloudMatrix 384 一致, 但 48-core 版本). PCIe Gen4 + HCCS 互联. 信创合规栈核心.'
