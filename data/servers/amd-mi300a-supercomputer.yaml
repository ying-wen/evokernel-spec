# v1.8: cluster internals — HPE Cray EX255a blade with 4× MI300A APUs.
# El Capitan 超算的 building block; 与传统 HGX/NVL 不同, MI300A 是
# CPU+GPU coherent APU, scale-up 通过 Slingshot 而非 NVLink.
switch_chips:
  - name: 'HPE Slingshot 11 Switch'
    count: 1
    radix: 64
    bandwidth_gbps_per_port: 25
    url: https://www.hpe.com/us/en/compute/hpc/slingshot-interconnect.html
oversubscription_ratio: 1.0
scale_out_nics_per_node: 4
scale_out_bandwidth_gbps_per_nic: 25
bisection_bandwidth_tbs:
  value: 1.6
  evidence_ref: ev-mi300a-srv-001
power_distribution:
  psu_count: 8
  redundancy: N+N
  sustained_kw: 24
  peak_kw: 30
  voltage: '480V 3-phase'
host_cpu:
  name: 'AMD EPYC 9004 (Zen 4) host — but MI300A APU has 24 Zen-4 cores in-package'
  vendor: amd
  architecture: x86-zen4
  cores_per_node: 96
  sockets_per_node: 4
  pcie_gen: 5
  pcie_lanes_per_node: 128
  host_ram_gb: 512
  has_coherent_gpu_link: true
  notes: 'HPE Cray EX255a (El Capitan blade) 是 4× MI300A APU per blade — 每个 APU 内部已含 24 Zen-4 cores + CDNA-3 GPU + 128 GB unified HBM3. 没有 separate x86 host CPU; 等价 host RAM = 4 × 128 GB unified = 512 GB. 这是唯一 GPU-CPU 同 die / unified-memory 的数据中心设计 (vs Grace+Hopper 是 NVLink-C2C 跨封装 coherent). El Capitan 用这个设计达到 > 2 ExaFLOPS.'
network_topology:
  topology: dragonfly-plus
  in_network_reduction: false
  diameter_hops: 5
  bisection_bandwidth_gbps_per_node: 800
  latency_us_p99_intra_node: 0.6
  latency_us_p99_inter_node: 5.0
  switch_count: 1024
  rdma_capable: true
  notes: |
    El Capitan 用 HPE Slingshot-11 dragonfly+ 拓扑 — 全机 11000+ blade,
    每 blade 4 MI300A APU. Dragonfly+ 在超大规模 (10K+ 节点) 时直径优于 fat-tree
    (5 跳 vs fat-tree 7+ 跳), 但跨 group 的 latency 比 fat-tree 高一些.
    Slingshot 协议本身是 RDMA capable, 但没有 SHARP-style in-network reduction.
    4 APU/blade 之间用 Infinity Fabric coherent 互联 (intra-blade).
cabinet_layout_md: |
  ## HPE Cray EX255a 节点布局 / Blade layout

  - **4× MI300A APU** (each: 24 Zen-4 CPU cores + 228 CDNA 3 CUs + unified 128 GB HBM3) per blade
  - **MI300A 的特殊之处**: APU 设计意味着 CPU 和 GPU 共享 HBM3, 没有 PCIe transfer 开销; 4 个 APU 通过 Infinity Fabric coherent 互联. 与 HGX H100 (8 GPU + 独立 host CPU) 是完全不同范式.
  - **Slingshot 11 互联**: 25 GB/s/port, radix 64. 单 blade bisection 约 1.6 TB/s. 用于 El Capitan 超算 (LLNL, > 2 ExaFLOPS).
  - **液冷**: 24 kW 持续 / 30 kW 峰值. 高 TDP (760 W/APU × 4 = 3 kW compute + Zen-4 CPUs).
  - **El Capitan 系统规模**: ~11000 个 EX255a blade, ~44000 个 MI300A — 当前世界最大 AMD scale-out 部署.

