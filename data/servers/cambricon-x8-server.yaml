cabinet_layout_md: |
  ## 思元 X8 Server 布局 / 8-card chassis layout

  - **8× MLU590** baseboard, 1× MLU-Link-v2 switch 全互联 (radix 8, 50 GB/s/port)
  - **vs 思元 590 pod (16 节点)**: 单节点 reference design, 训推一体. 用于中小规模训练 + 推理服务.
  - **vs HGX H100**: 同样 8 卡 + 单 switch 集中拓扑, MLU-Link-v2 单边 50 GB/s vs NVSwitch Gen-3 50 GB/s — 拓扑相似, 总带宽相当.
  - **可选跨节点扩展**: 4× 200 GbE NIC, RoCE v2 to ToR switch — 中型集群灵活扩展.
  - **风冷**: 3.5 kW 持续 / 4.0 kW 峰值. 4U 标准机箱, 不需要液冷, 部署门槛低.

