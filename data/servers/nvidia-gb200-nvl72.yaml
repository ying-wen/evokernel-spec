id: nvidia-gb200-nvl72
name: NVIDIA GB200 NVL72 Rack
vendor: nvidia
type: super-pod
card: gb200-nvl72
card_count: 72
scale_up_domain_size: 72
intra_node_interconnect: NVLink-5-via-NVSwitch-Gen4
inter_node_interconnect: InfiniBand-XDR
cooling: liquid
rack_power_kw: 120
total_memory_gb: 13824
total_compute_pflops_bf16: 162
release_year: 2024

# v1.3: deep cluster-internal detail
switch_chips:
  - name: 'NVSwitch Gen-4 (NVL5 backplane)'
    count: 18
    radix: 144
    bandwidth_gbps_per_port: 200
    url: https://www.nvidia.com/en-us/data-center/gb200-nvl72/
  - name: 'ConnectX-8 SuperNIC'
    count: 72
    radix: 8
    bandwidth_gbps_per_port: 100
    url: https://www.nvidia.com/en-us/networking/connectx-8/
oversubscription_ratio: 1.0
scale_out_nics_per_node: 1
scale_out_bandwidth_gbps_per_nic: 800
bisection_bandwidth_tbs:
  value: 64.8
  evidence_ref: ev-nvl72-001
power_distribution:
  psu_count: 8
  redundancy: N+N
  sustained_kw: 100
  peak_kw: 132
  voltage: '415V 3-phase'
host_cpu:
  name: 'NVIDIA Grace CPU Superchip (72-core Neoverse V2)'
  vendor: nvidia
  architecture: arm-neoverse-v2
  cores_per_node: 72
  sockets_per_node: 1
  pcie_gen: 5
  pcie_lanes_per_node: 128
  host_ram_gb: 480
  has_coherent_gpu_link: true
  notes: 'NVLink-C2C 让 Grace CPU 与 Blackwell GPU 在同一 cache-coherent 域 (900 GB/s 双向). 这是 NVL72 区别 Hopper HGX 的关键 — Grace + Blackwell 一起 packaged, host RAM 实际可被 GPU 当作 tier-2 HBM 用 (zero-copy hot-cold KV tiering 走这条).'
network_topology:
  topology: full-mesh
  in_network_reduction: true
  diameter_hops: 1
  bisection_bandwidth_gbps_per_node: 14400
  latency_us_p99_intra_node: 0.4
  latency_us_p99_inter_node: 0.6
  switch_count: 18
  rdma_capable: true
  notes: |
    NVL72 是单 NVLink-5 domain — 全 72 卡通过 NVSwitch full-mesh 互联,
    任意 GPU 对之间 1 跳, 18 个 NVSwitch chip 提供 1.8 TB/s/GPU bidirectional.
    跨 NVL72 出口走 IB XDR (800 Gb/s/NIC), 但 super-pod 内部不需要 IB.
    SHARP-3 in-network all-reduce 在 NVL72 fabric 内可用 — TP 通信带宽实际放大 1.5-2x.
storage_architecture:
  local_nvme_per_node_tb: 30.0
  parallel_fs_pb: 5.0
  parallel_fs_family: weka
  gpu_direct_storage: true
  rdma_storage: true
  checkpoint_strategy: hybrid
  aggregate_read_bandwidth_gbps: 1600
  notes: |
    NVL72 production 部署典型配 30 TB local NVMe per node + Weka 平台 5 PB shared
    parallel filesystem. GDS (GPU Direct Storage) 让 Blackwell GPU 直接 RDMA
    读 NVMe / Weka, 不经过 host RAM. Checkpoint 策略 hybrid: 热权重在 local NVMe (秒级
    weight reload), 冷权重 + dataset 在 Weka (大容量). Long context inference
    weight streaming 走这条路径.
cabinet_layout_md: |
  ## NVL72 机柜布局 / Cabinet layout

  - **18 个 compute trays**: 每 tray 2 个 GB200 superchip × 2 GPUs = 4 GPUs/tray, 72 GPUs/rack.
  - **9 个 NVSwitch trays**: 横亘 rack 中部, 18 颗 NVSwitch Gen-4 芯片提供完整 1.0×
    bisection (no oversubscription within scale-up domain).
  - **顶部 8 个 PSU**: 双冗余 N+N, 415V 三相输入. 持续 100 kW, 峰值 132 kW (turbo + 冷启动).
  - **液冷**: cold plate 直接覆盖每个 GPU 与 NVSwitch chip; 单 rack ~1 GPM (gallon/min) 冷却液
    流量, ΔT 约 8°C.
  - **scale-out**: 每 GPU 配 1 张 ConnectX-8 800 Gbps SuperNIC, 单 rack 总 scale-out
    带宽 72 × 100 GB/s = 7.2 TB/s 至 cluster fabric.

