# v1.8: cluster internals — 思元 590 production cluster blueprint.
# 16 节点 × 8 卡 = 128 MLU590; 节点内 MLU-Link-v2, 跨节点 RoCE v2 200G.
# 大部分参数从 product brief 估算 (Cambricon 较少公开 fabric 细节).
