# v1.8: cluster internals — 思元 590 production cluster blueprint.
# 16 节点 × 8 卡 = 128 MLU590; 节点内 MLU-Link-v2, 跨节点 RoCE v2 200G.
# 大部分参数从 product brief 估算 (Cambricon 较少公开 fabric 细节).
switch_chips:
  - name: 'MLU-Link-v2 Switch (intra-node)'
    count: 16
    radix: 8
    bandwidth_gbps_per_port: 50
    url: https://www.cambricon.com/
  - name: '200 GbE RoCE NIC (inter-node)'
    count: 64
    radix: 4
    bandwidth_gbps_per_port: 25
oversubscription_ratio: 2.0
scale_out_nics_per_node: 4
scale_out_bandwidth_gbps_per_nic: 25
power_distribution:
  psu_count: 12
  redundancy: N+1
  sustained_kw: 48
  peak_kw: 60
  voltage: '380V 3-phase'
host_cpu:
  name: '海光 C86 7390 (Hygon Dhyana, 64-core Zen-derived) 或鲲鹏 920'
  vendor: hygon
  architecture: x86-zen-licensed
  cores_per_node: 128
  sockets_per_node: 2
  pcie_gen: 4
  pcie_lanes_per_node: 128
  host_ram_gb: 1024
  has_coherent_gpu_link: false
  notes: '思元 590 集群 host CPU 选择多元: 部分国央企部署用海光 C86 (Zen 架构 license), 部分用鲲鹏 920 (ARM). 选海光走 x86 ABI 兼容, 选鲲鹏走全 ARM 国产化路径. PCIe Gen4 + MLU-Link-v2 互联. 与 Ascend 路径相比, 思元生态更小但 PyTorch / vLLM-MLU 兼容性更直接.'
network_topology:
  topology: hierarchical-mesh
  in_network_reduction: false
  diameter_hops: 4
  bisection_bandwidth_gbps_per_node: 1600
  latency_us_p99_intra_node: 0.7
  latency_us_p99_inter_node: 4.0
  switch_count: 16
  rdma_capable: true
  notes: |
    思元 590 集群 16 节点 × 8 卡 = 128 MLU. 单节点 MLU-Link-v2 全连接 (1 跳),
    跨节点走 RoCE-v2 200G fat-tree. 16-node 部署典型直径 3-4 跳.
    国产寒武纪生态 — 与 Atlas 900 类似 hierarchical mesh 但规模更小.
cabinet_layout_md: |
  ## 思元 590 集群布局 / 16-node pod layout

  - **16 节点 × 8 卡 = 128× MLU590**, 跨多机柜部署
  - **节点内 MLU-Link-v2**: 16× switch (radix 8, 50 GB/s/port). scale-up 域只到 8 卡 — 跨节点必须走 RoCE.
  - **节点间 RoCE v2 200G**: 64× 200 GbE NIC (4/节点). 2:1 oversubscribed (典型 enterprise 部署预算 trade-off).
  - **vs CloudMatrix 384**: 思元 590 集群是 enterprise multi-node 设计 (scale-up 域 8 卡, 跨节点 RoCE); CloudMatrix 384 是 hyperscale super-pod (scale-up 域 384 卡, 全光纤 fabric). 设计哲学不同.
  - **冷却**: 48 kW 持续 / 60 kW 峰值, 全部液冷.

