  in_network_reduction: false
  diameter_hops: 3
  bisection_bandwidth_gbps_per_node: 1600
  latency_us_p99_intra_node: 1.0
  latency_us_p99_inter_node: 4.0
  switch_count: 6
  rdma_capable: true
  notes: |
    DGX A100 单节点 6× NVSwitch Gen-2 (vs Gen-3 在 H100/H200) 全连接 8 GPU,
    跨节点出 8 × 200G HDR IB ConnectX-6. SHARP-1 (基础版) 可用. Ampere 时代典型
    rail-optimized fat-tree, 但单边 IB 200 Gb/s 是 H100 era 400G 的一半 — 跨节点
    all-reduce 时间 ~2x H100. 64-node SuperPOD 是经典参考部署.
cabinet_layout_md: |
  ## DGX A100 8-GPU 机箱布局 / Chassis layout

  - **8× A100 SXM4** baseboard, 6× NVSwitch Gen-2 互联
  - **NVSwitch Gen-2 vs Gen-3**: radix 36 (vs Gen-3 64), 端口 25 GB/s (vs 50). DGX A100 bisection 4.8 TB/s (vs HGX H100 7.2 TB/s — 50% slower fabric).
  - **8× ConnectX-6**: scale-out 走 IB-HDR (200 Gb/s, 25 GB/s/NIC); 总 200 GB/s 至 cluster fabric.
  - **风冷**: 5.5 kW 持续 / 6.5 kW 峰值. 典型 4U 机箱.
  - **历史地位**: Ampere 时代标杆系统, 配合 NGC software stack 大规模部署. 现已被 HGX H100/H200/B200/GB200 superseded.

