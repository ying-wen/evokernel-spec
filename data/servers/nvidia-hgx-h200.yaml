id: nvidia-hgx-h200
name: NVIDIA HGX H200 8-GPU
vendor: nvidia
type: integrated-server
card: h200-sxm
card_count: 8
scale_up_domain_size: 8
intra_node_interconnect: NVLink-4-via-NVSwitch-Gen3
inter_node_interconnect: InfiniBand-NDR
cooling: air
rack_power_kw: 10.2
total_memory_gb: 1128
total_compute_pflops_bf16: 7.9
release_year: 2024

# v1.7: cluster internals — same chassis as HGX H100 (NVSwitch Gen-3 fabric);
# H200 just swaps card with bigger HBM3e (141 GB vs 80 GB on H100). Total
# rack memory bumps to 1.13 TB.
switch_chips:
  - name: 'NVSwitch Gen-3'
    count: 4
    radix: 64
    bandwidth_gbps_per_port: 50
    url: https://www.nvidia.com/en-us/data-center/hgx/
  - name: 'ConnectX-7 NIC'
    count: 8
    radix: 1
    bandwidth_gbps_per_port: 50
    url: https://www.nvidia.com/en-us/networking/connectx-7/
oversubscription_ratio: 1.0
scale_out_nics_per_node: 8
scale_out_bandwidth_gbps_per_nic: 50
bisection_bandwidth_tbs:
  value: 7.2
  evidence_ref: ev-hgxh200-001
power_distribution:
  psu_count: 6
  redundancy: N+1
  sustained_kw: 8.5
  peak_kw: 10.2
  voltage: '240V'
host_cpu:
  name: 'Intel Xeon Platinum 8568Y+ (Emerald Rapids, 48-core) or AMD EPYC 9554'
  vendor: intel
  architecture: x86-emerald-rapids
  cores_per_node: 96
  sockets_per_node: 2
  pcie_gen: 5
  pcie_lanes_per_node: 160
  host_ram_gb: 2048
  has_coherent_gpu_link: false
  notes: 'H200 上的 host 选择与 H100 类似 (Sapphire / Emerald Rapids 或 EPYC Genoa). H200 的差异在 GPU 端 (HBM3e 141GB), host 一致. 部分 OEM 走 EPYC 9654 路径 (96 cores/socket → 192 cores/node) 适合长 context 大 batch 工作负载.'
network_topology:
  topology: fat-tree-rail-optimized
  in_network_reduction: true
  diameter_hops: 3
  bisection_bandwidth_gbps_per_node: 3200
  latency_us_p99_intra_node: 0.5
  latency_us_p99_inter_node: 2.5
  switch_count: 4
  rdma_capable: true
  notes: |
    HGX H200 与 H100 共用同一 NVSwitch Gen-3 fabric 设计 — 4 NVSwitch 单节点全连接,
    跨节点 8 × 400G IB ConnectX-7 走 rail-optimized fat-tree. SHARP-2 in-network reduction
    继承自 H100 部署规范. H200 的 HBM3e 提升让单卡 KV 容量增加, 但 inter-node
    fabric 没有变化 — 跨节点 all-reduce 性能与 H100 等价.
storage_architecture:
  local_nvme_per_node_tb: 16.0
  parallel_fs_pb: 4.0
  parallel_fs_family: lustre
  gpu_direct_storage: true
  rdma_storage: true
  checkpoint_strategy: parallel-fs
  aggregate_read_bandwidth_gbps: 800
  notes: |
    HGX H200 与 HGX H100 共用同一 storage 设计 — Lustre / GPFS / Weka 任选,
    GDS over ConnectX-7 RDMA. H200 的 HBM3e 让单节点装下更大模型, 减少 cross-node
    weight streaming 需求, 但 storage 层接近 H100. Inference 常用 vLLM/SGLang +
    KV cache offload 到 host RAM (PCIe Gen5 路径), checkpoint 仍 Lustre.
cabinet_layout_md: |
  ## HGX H200 8-GPU 机箱布局 / Chassis layout

  - **8× H200 SXM** 在同 HGX baseboard 上, 4 NVSwitch Gen-3 互联 (与 HGX H100 同形)
  - **关键差异 vs HGX H100**: H200 用 HBM3e 6 stacks × 24 GB = 141 GB (vs H100 80 GB), 总显存 1.13 TB. Compute peak 不变, 长 context decode 收益大.
  - **4× NVSwitch Gen-3**: radix 64, 端口 50 GB/s. Bisection 7.2 TB/s 不变.
  - **8× ConnectX-7**: scale-out 总带宽 400 GB/s 至 IB-NDR fabric.
  - **风冷**: 8.5 kW 持续 / 10.2 kW 峰值. TDP 与 HGX H100 一致 (H200 单卡 TDP 也是 700 W).

