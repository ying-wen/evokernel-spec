cabinet_layout_md: |
  ## HGX H200 8-GPU 机箱布局 / Chassis layout

  - **8× H200 SXM** 在同 HGX baseboard 上, 4 NVSwitch Gen-3 互联 (与 HGX H100 同形)
  - **关键差异 vs HGX H100**: H200 用 HBM3e 6 stacks × 24 GB = 141 GB (vs H100 80 GB), 总显存 1.13 TB. Compute peak 不变, 长 context decode 收益大.
  - **4× NVSwitch Gen-3**: radix 64, 端口 50 GB/s. Bisection 7.2 TB/s 不变.
  - **8× ConnectX-7**: scale-out 总带宽 400 GB/s 至 IB-NDR fabric.
  - **风冷**: 8.5 kW 持续 / 10.2 kW 峰值. TDP 与 HGX H100 一致 (H200 单卡 TDP 也是 700 W).

