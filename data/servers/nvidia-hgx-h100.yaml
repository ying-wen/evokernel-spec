  notes: |
    单节点 8 H100 通过 4× NVSwitch Gen-3 full-mesh; 跨节点出 8 × 400G IB ConnectX-7
    走 rail-optimized fat-tree (每张卡走自己的 rail switch, 同 rail 跨节点 1 跳,
    跨 rail 通过 spine 2 跳). NVIDIA SHARP-2 在 IB 网内做 all-reduce.
    跨 64 节点典型部署直径 = 3 跳, 1024+ 节点需要 dragonfly+ 替代.
cabinet_layout_md: |
  ## HGX H100 8-GPU 机箱布局 / Chassis layout

  - **8× H100 SXM5** 在单个 8-GPU baseboard 上, 4 NVSwitch Gen-3 互联
  - **4× NVSwitch Gen-3 芯片**: radix 64, 每端口 50 GB/s. 节点内提供 7.2 TB/s bisection (8 GPUs × 18 NVLink × 50 GB/s ÷ 2 dual-direction).
  - **8× ConnectX-7**: 每 GPU 配一张 NIC, scale-out 总带宽 8 × 50 = 400 GB/s 至 cluster fabric (IB-NDR).
  - **风冷散热**: 8.5 kW 持续 / 10.2 kW 峰值; 标准 4U 机箱.
  - **vs NVL72**: HGX H100 是 8 GPU/server, NVL72 是 72 GPU/rack — 后者用 NVSwitch backplane 把 scale-up 域扩到 9× 大.

