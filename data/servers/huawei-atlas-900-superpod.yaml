# v1.7: cluster internals — Atlas 900 SuperPoD A2 是 256-card scale-up 域,
# 介于 Atlas 800 (8 cards single chassis) 和 CloudMatrix 384 (384 cards
# multi-cabinet) 之间. 8 个机柜联合, HCCS-v2 + RoCE 400G 跨机柜.
