# v1.7: cluster internals — Atlas 900 SuperPoD A2 是 256-card scale-up 域,
# 介于 Atlas 800 (8 cards single chassis) 和 CloudMatrix 384 (384 cards
# multi-cabinet) 之间. 8 个机柜联合, HCCS-v2 + RoCE 400G 跨机柜.
switch_chips:
  - name: 'HCCS-v2 Switch'
    count: 16
    radix: 32
    bandwidth_gbps_per_port: 100
    url: https://e.huawei.com/en/products/computing/ascend
  - name: '400 GbE NIC (cluster fabric)'
    count: 32
    radix: 4
    bandwidth_gbps_per_port: 50
    url: https://e.huawei.com/en/products/computing/ascend
oversubscription_ratio: 1.0
scale_out_nics_per_node: 4
scale_out_bandwidth_gbps_per_nic: 50
bisection_bandwidth_tbs:
  value: 12.8
  evidence_ref: ev-atlas900-001
power_distribution:
  psu_count: 16
  redundancy: N+N
  sustained_kw: 160
  peak_kw: 200
  voltage: '380V 3-phase'
host_cpu:
  name: '华为鲲鹏 920 (Kunpeng 920, 64-core ARMv8.2)'
  vendor: huawei
  architecture: arm-kunpeng
  cores_per_node: 128
  sockets_per_node: 2
  pcie_gen: 4
  pcie_lanes_per_node: 80
  host_ram_gb: 1024
  has_coherent_gpu_link: false
  notes: 'Atlas 900 SuperPoD A2 与 CloudMatrix 384 走同款 host CPU (鲲鹏 920) — 信创合规栈. 区别在 GPU fabric: Atlas 900 是 8 cabinet × 32 卡 = 256 卡 HCCS-v2 + 跨柜 RoCE-400G; CloudMatrix 384 是 lingqu 全光纤 fabric.'
network_topology:
  topology: hierarchical-mesh
  in_network_reduction: false
  diameter_hops: 4
  bisection_bandwidth_gbps_per_node: 1600
  latency_us_p99_intra_node: 0.6
  latency_us_p99_inter_node: 3.5
  switch_count: 32
  rdma_capable: true
  notes: |
    Atlas 900 用层级化 mesh — 单柜 32 卡 HCCS-v2 全连接 (1 跳), 8 柜之间
    走 RoCE-v2 400G fat-tree-rail-optimized (3-4 跳). 这是国产 8-cabinet 经典
    部署形态, 在 CloudMatrix 384 (全光纤) 出现之前是华为最大规模超节点方案.
    没有 in-network reduction — RoCE 是开放标准, 不像 lingqu 那样支持 SHARP-like.
storage_architecture:
  local_nvme_per_node_tb: 16.0
  parallel_fs_pb: 4.0
  parallel_fs_family: other
  gpu_direct_storage: true
  rdma_storage: true
  checkpoint_strategy: parallel-fs
  aggregate_read_bandwidth_gbps: 800
  notes: |
    Atlas 900 SuperPoD 通常配 OceanStor 分布式 FS (信创合规). NPU Direct Storage
    通过 RoCE-400G RDMA 访问 OceanStor — 比 CloudMatrix 384 的 lingqu fabric 路径
    慢 ~20% (RoCE 标准 RDMA vs 全光纤 lingqu). 16 TB local NVMe/node 是中型节点
    标配, 4 PB shared FS 支撑 32-node training/inference 工作负载.
cabinet_layout_md: |
  ## Atlas 900 SuperPoD A2 机柜布局 / 8-cabinet layout

  - **8 个机柜联合**: 256× Ascend 910C, 32 卡/机柜, HCCS-v2 跨柜光纤
  - **16× HCCS-v2 switch**: radix 32, 端口 100 GB/s. 整 SuperPoD bisection ~12.8 TB/s.
  - **vs CloudMatrix 384**: Atlas 900 是 8 机柜 × 32 卡 (256 总), 用 copper HCCS + 部分光纤; CloudMatrix 384 是 16 机柜 × 24 卡 (384 总), 全光纤 Lingqu fabric. CM384 scale-up 大 50%, fabric 复杂度也高.
  - **vs NVL72**: Atlas 900 比 NVL72 (72 卡) scale-up 大 3.5×, 但 bisection 较低 (12.8 TB/s vs 64.8 TB/s) — fabric 拓扑设计 trade-off.
  - **冷却**: 160 kW 持续 / 200 kW 峰值; 全部液冷直触.

