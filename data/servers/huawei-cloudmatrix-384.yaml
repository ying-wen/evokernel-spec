  in_network_reduction: true
  diameter_hops: 2
  bisection_bandwidth_gbps_per_node: 6400
  latency_us_p99_intra_node: 0.5
  latency_us_p99_inter_node: 1.2
  switch_count: 384
  rdma_capable: true
  notes: |
    CloudMatrix 384 是华为旗舰超节点, 全 384 卡通过**全光纤 fabric** (lingqu / 灵衢) 互联,
    任意 GPU 对 ≤2 跳. HCCS-v2 over optical 让跨柜 latency 接近单柜 NVLink 水平.
    华为自研 in-network reduction (类似 SHARP) 在 lingqu fabric 中可用, all-reduce
    带宽放大 1.5x. 这是国央企部署对标 NVL72 的核心方案 — 单 super-pod 内不依赖 RoCE,
    跨 super-pod 才走 RoCE-400G 跳出去.
cabinet_layout_md: |
  ## CloudMatrix 384 多机柜布局 / Multi-cabinet layout

  - **16 个机柜联合**: 384 张 Ascend 910C 跨 16 个机柜 (24 张/机柜) 通过光纤 fabric 连接.
    与 NVL72 的"单机柜 72 GPU"思路相反, 华为以**机柜数量**换 scale-up 域大小.
  - **灵衢 (Lingqu) 光交换**: 32 颗光交换芯片, radix 128, 提供 384 × 384 全连接 scale-up,
    总 bisection ~6.6 TB/s. 不依赖 NVLink 私有协议.
  - **每机柜 24 张卡**: 每机柜 ~30 kW, 全部液冷; 16 机柜 ≈ 480 kW 持续, 600 kW 峰值.
  - **scale-out**: 每节点 8 张 200 GbE ConnectX-equiv NIC, RoCE v2 over Ethernet.
  - **关键差异 vs NVL72**:
    - NVL72: 72 GPU/cabinet, 单机柜物理紧凑, copper NVLink
    - CM384: 384 GPU/16 cabinets, 光纤连接, scale-up 域大 5×

