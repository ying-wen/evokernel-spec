  notes: '鲲鹏 920 是华为自研 ARM 服务器 CPU, 信创合规栈核心组件. PCIe Gen4 (vs NVL72 Gen5) 限制 host-GPU bandwidth, 但 Ascend 910C 单卡只用 16 lanes 不构成瓶颈. HCCS 互联是 GPU 间通信主路径, 不依赖 PCIe. 这是国央企部署唯一全国产化路径.'
network_topology:
