id: moore-threads-kuae
name: Moore Threads KUAE 集群方案
vendor: moore-threads
type: pod
card: mtt-s4000
card_count: 64
scale_up_domain_size: 8
intra_node_interconnect: MTLink
inter_node_interconnect: RoCEv2-200G
cooling: liquid
rack_power_kw: 60
total_memory_gb: 3072
total_compute_pflops_bf16: 6.4
release_year: 2024
chinese_names: ['夸娥智算集群', 'KUAE']

# v1.9: cluster internals — 摩尔线程夸娥智算集群 (KUAE).
# 8 节点 × 8 卡 = 64 MTT-S4000; 节点内 MTLink, 跨节点 RoCE v2 200G.
# 国产 GPU 集群参考方案 — 大部分参数从公开方案估算.
switch_chips:
  - name: 'MTLink Switch (intra-node)'
    count: 8
    radix: 8
    bandwidth_gbps_per_port: 50
    url: https://www.mthreads.com/
  - name: '200 GbE RoCE NIC (inter-node)'
    count: 32
    radix: 4
    bandwidth_gbps_per_port: 25
oversubscription_ratio: 2.0
scale_out_nics_per_node: 4
scale_out_bandwidth_gbps_per_nic: 25
power_distribution:
  psu_count: 12
  redundancy: N+1
  sustained_kw: 48
  peak_kw: 60
  voltage: '380V 3-phase'
host_cpu:
  name: '海光 C86 7490 (Hygon Dhyana, 64-core) 或 Intel Xeon Platinum (信创非强制场景)'
  vendor: hygon
  architecture: x86-zen-licensed
  cores_per_node: 128
  sockets_per_node: 2
  pcie_gen: 5
  pcie_lanes_per_node: 128
  host_ram_gb: 1024
  has_coherent_gpu_link: false
  notes: '摩尔线程 KUAE 集群 host 通常配海光 (信创预算友好) 或 Intel (兼容性优先). MTLink 是 GPU 间 fabric, 不依赖 host CPU. PCIe Gen5 路径在 KUAE 2024 release 后逐渐普及, 老配置仍是 Gen4.'
network_topology:
  topology: hierarchical-mesh
  in_network_reduction: false
  diameter_hops: 4
  bisection_bandwidth_gbps_per_node: 1600
  latency_us_p99_intra_node: 0.8
  latency_us_p99_inter_node: 4.5
  switch_count: 8
  rdma_capable: true
  notes: |
    KUAE 集群 8 节点 × 8 卡 = 64 卡. 单节点通过 MTLink 全连接 (1 跳),
    跨节点走 RoCE-v2 200G. 国产 GPU 集群中规模较小的部署形态, 适合中小型 LLM
    训推. MTLink 暂无 in-network reduction. 软件栈 (MUSA) 仍在追赶 CUDA 兼容.
storage_architecture:
  local_nvme_per_node_tb: 16.0
  parallel_fs_pb: 1.5
  parallel_fs_family: other
  gpu_direct_storage: false
  rdma_storage: true
  checkpoint_strategy: parallel-fs
  aggregate_read_bandwidth_gbps: 200
  notes: |
    KUAE 集群通常配国产分布式 FS (OceanStor / 海泰 / 自研), 1.5 PB 规模适配
    8 节点 64 卡部署. 摩尔线程 MUSA 暂无 GDS 等价物 — 数据通过 host Hygon /
    Intel 中转. 部署成本敏感的中型企业是主要用户.
cabinet_layout_md: |
  ## 摩尔线程 KUAE 集群布局 / 8-node KUAE pod layout

  - **8 节点 × 8 卡 = 64× MTT-S4000**, 跨多机柜部署
  - **节点内 MTLink**: 8× MTLink switch (radix 8, 50 GB/s/port). scale-up 域 8 卡, 跨节点必须走 RoCE
  - **节点间 RoCE v2 200G**: 32× 200 GbE NIC (4/节点), 2:1 oversubscribed (国产 enterprise 部署典型预算)
  - **vs 思元 590 集群**: 同 8-card scale-up 域 + RoCE 跨节点设计, 国产生态典型 8-卡-节点拓扑
  - **冷却**: 48 kW 持续 / 60 kW 峰值, 全部液冷 (1U 节点高密度部署)

