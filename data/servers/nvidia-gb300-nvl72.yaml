cabinet_layout_md: |
  ## GB300 NVL72 机柜布局 / Cabinet layout

  - **18 个 compute trays**: 每 tray 2 个 GB300 superchip × 2 GPUs = 4 GPUs/tray; 72 GPUs/rack 与 GB200 NVL72 一致.
  - **9 个 NVSwitch trays**: 18 颗 NVSwitch Gen-4 芯片, 与 GB200 NVL72 同 backplane.
  - **B300 vs B200 升级要点**: HBM3e stack 从 24 GB 升到 36 GB, 单卡 180 → 288 GB, 整 rack 显存从 13.8 TB 增到 20.7 TB. TDP 从 1000 W 增到 1400 W (rack 持续 100 → 110 kW).
  - **8 个 PSU**: N+N 冗余, 415V 3-phase. Peak 152 kW (turbo + 冷启动).
  - **液冷**: cold plate 直接覆盖每个 GPU 与 NVSwitch chip; 单 rack ~1.5 GPM (gallon/min) 冷却液流量.

