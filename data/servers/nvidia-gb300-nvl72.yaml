# v1.6: cluster internals — same chassis shape as GB200 NVL72 with B300
# refresh; bigger HBM (288 GB via 36 GB stacks vs B200's 24 GB) bumps memory
# total to 20.7 TB. Bisection bandwidth same as NVL72 (NVLink-5 retained).
