id: fused-allgather-gemm
name: Fused All-Gather + GEMM (column-wise TP, async-tp dual)
category: communication
fuses_operators: [matmul, all-gather]
summary: |
  把 all-gather 与 GEMM 融合到 stream-level 异步 pipeline, 让 NCCL/HCCL 通信
  与 GEMM 计算在 GPU 上重叠. 这是 column-wise tensor parallelism 的 hot path,
  与 row-wise TP 的 fused-tp-allreduce-residual (RS+AG) 互为对偶. 没有这条
  fusion, all-gather 会与 GEMM 串行, TP=8 dense decode latency 增加 25-40%.

description_md: |
  ## 为什么这个 fusion 关键

  Column-wise tensor parallelism: 把 weight 沿 output dim 切到 N 个 GPU,
  每个 GPU 算自己的 partial output, 然后 **all-gather** 拼出完整 output.
  典型出现在 attention output projection (W_O) 和 MLP 第二层 (down_proj):

  ```
  partial = x @ W_partial          # 每 GPU 算自己 1/N
  output = all_gather(partial)     # 拼出完整 [batch, seq, hidden]
  next = output @ W_next           # 下一层 GEMM
  ```

  不 fuse 时:
  - GEMM 写 partial 到 HBM
  - All-gather kernel 读 partial, 通信, 写 gathered output 到 HBM (大 N 倍)
  - Next GEMM 读 gathered output

  Fused 版本 (async-tp): GEMM 输出 partial 立即触发 NCCL all-gather, 同时
  下一个 micro-tile 的 GEMM 已经开始. 通信与计算 overlap, 整体延迟接近 max(GEMM, AG)
  而非 GEMM + AG.

  与 row-wise TP 的 fused-tp-allreduce-residual (reduce-scatter + all-gather) 是
  对偶设计 — 同一个 transformer block 内两条 fusion 都会出现:
  - **column-wise TP** (W_O, MLP down_proj) → fused-allgather-gemm
  - **row-wise TP** (W_QKV, MLP up_proj) → fused-tp-allreduce-residual

  ## 实现层次

  - **Megatron-LM async-tp** (mainline): `--tp-comm-overlap` flag; CUDA stream-level overlap
  - **vLLM async-tp**: vLLM 0.7+ 内置 fused all-gather GEMM 路径 (TP=4+ decode 默认启用)
  - **PyTorch tensor-parallel async**: torch.distributed.tensor 提供 fused AG+GEMM API
  - **NVIDIA TRT-LLM 0.13+**: AG+GEMM plugin (Hopper/Blackwell)
  - **MindIE 2.0**: HCCL fused all-gather GEMM (910C+, INT8 + FP8 path 都支持)

  ## 与 fused-tp-allreduce-residual 的对偶关系

  | 阶段 | Row-wise TP | Column-wise TP |
  |---|---|---|
  | 切分维度 | input dim | output dim |
  | 通信 | reduce-scatter (RS) | all-gather (AG) |
  | 后续 | RS+AR (allreduce-residual) | AG+GEMM (this) |
  | 典型 op | W_QKV, MLP up_proj | W_O, MLP down_proj |

  完整 transformer block 通常两条都用 — TP=8 dense LLM 推理在两条 fusion 都启用时
  可以拿 1.6-2x decode throughput vs 都不 fuse.

  ## 应用场景

  - **TP ≥ 4 dense LLM 推理**: TP=2 通信占比小, 这条 fusion ROI 不高; TP ≥ 4 显著
  - **NVL72 / CloudMatrix 384 内 super-pod TP**: NVLink-5 / lingqu 跨整个 super-pod
  - **跨节点 TP (RoCE / IB)**: 通信延迟更高, fusion 收益更大 (但绝对值还是不如同节点 NVLink)
  - **Long context decode**: per-layer GEMM 大, AG 时间能藏更多

why_fuse: |
  All-gather 的 partial output (N-1)/N × 完整 output 物化到 HBM, 然后下一个 GEMM 再读 —
  浪费. Stream-level overlap 让 AG kernel 在 NCCL 后台跑, GPU 同时算下一个 GEMM tile.
  TP=8 dense decode 路径上 25-40% latency 节省.

speedup:
  - baseline: PyTorch eager (sequential GEMM + AG + GEMM)
    multiplier_min: 1.3
    multiplier_max: 1.8
    notes: 'TP=8 dense decode column-wise path; TP=2 收益小 (1.05-1.15x)'
  - baseline: GEMM + separate AG + GEMM (no overlap)
    multiplier_min: 1.2
    multiplier_max: 1.6
    notes: 'Vs synchronous all-gather between two GEMMs'

implementations:
  - name: Megatron-LM async-tp
    hardware_arch: [hopper, ampere, ada, blackwell]
    url: https://github.com/NVIDIA/Megatron-LM
    notes: '--tp-comm-overlap flag; mainline reference'
  - name: vLLM async-tp (0.7+)
    engine_id: vllm
    hardware_arch: [hopper, ada, blackwell, cdna3]
    url: https://docs.vllm.ai/en/latest/serving/distributed_serving.html
    notes: 'TP=4+ decode 默认启用; ROCm 路径在 0.7.5+ 有'
  - name: TRT-LLM AG+GEMM plugin
    engine_id: tensorrt-llm
    hardware_arch: [hopper, blackwell]
    url: https://nvidia.github.io/TensorRT-LLM/
  - name: MindIE 2.0 HCCL fused AG+GEMM
    engine_id: mindie
    hardware_arch: [ascend-910c, ascend-910d]
    url: https://www.hiascend.com/document/detail/zh/mindie
  - name: PyTorch DTensor async
    hardware_arch: [hopper, ada, blackwell, cdna3]
    url: https://pytorch.org/docs/stable/distributed.tensor.html

hardware_requires:
  - 'High-bandwidth interconnect (NVLink / HCCS / Infinity Fabric / RoCE-400G+)'
  - 'CUDA streams / equivalent stream-level async'

enables_patterns: [tp-allreduce-overlap]

applies_at_stage: compile

trade_offs:
  - 'TP=2 通信比例小, fusion ROI 低 — 简单代码反而更可维护'
  - '调度复杂度上升; 偶尔需要 manual tune NCCL channels / HCCL 通道数'
  - '小 GEMM (decode batch=1) 没法完全藏住通信 — 这条 fusion 主要在 prefill / 大 batch decode 收益'
  - '老 NCCL 版本 (< 2.18) 不支持 stream-level async, fall back to sync'

references:
  - title: 'Reducing Activation Recomputation in Large Transformer Models (TP overlap origin)'
    url: https://arxiv.org/abs/2205.05198
    source_type: paper
  - title: 'Megatron-LM async-tp implementation'
    url: https://github.com/NVIDIA/Megatron-LM/blob/main/megatron/core/tensor_parallel/layers.py
    source_type: implementation
  - title: 'vLLM TP serving'
    url: https://docs.vllm.ai/en/latest/serving/distributed_serving.html
    source_type: docs
