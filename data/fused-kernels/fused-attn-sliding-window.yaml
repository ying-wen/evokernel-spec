id: fused-attn-sliding-window
name: Fused Sliding Window Attention (Mistral / Gemma)
category: attention
summary: |
  把 Sliding Window Attention 的 mask 生成 + streaming KV evict + FlashAttn 计算融合到
  单 kernel. 长 context 上 KV 内存只占 W (窗口大小, 典型 4096), 远小于 full attention 的
  O(L). Mistral / Gemma 2 / Gemma 3 默认启用.

description_md: |
  ## Sliding window attention 的 fusion 关键

  Naive 实现把 SWA 拆成三步: 1) 生成 banded mask, 2) FlashAttn with mask, 3) evict 旧 KV.
  问题:
  - **Mask 物化**: L=32K, W=4096 时 mask 矩阵占 4 GB BF16 — HBM trip 大头
  - **Evict 同步**: 旧 KV 要从 paged-block 中物理删除, 引入 GPU↔CPU 同步

  Fused 版本:
  - **Implicit mask**: FlashAttn-3 `window_size` 参数让 kernel 内按位置生成 mask, 不物化
  - **Streaming KV**: 在 paged-attention 框架内, 旧 page 直接标记 free, 不真删 — 复用空间
  - **Block-sparse early exit**: KV 索引 block 之间没有 overlap 时 attention 直接跳过, 进一步加速

  典型规模收益: 32K context 比 full attention 快 4-6×, 200K context 快 30-40×.

  ## Hybrid 模型支持 (Gemma 2/3)

  Gemma 2 用 5:1 比例混合 SWA + global attention. Fused kernel 需要:
  1. 同一 forward 内识别 layer 类型 (SWA layer 走 windowed path, global layer 走标准 FlashAttn)
  2. KV cache 不同 layer 不同生命周期 — global layer 的 KV 全留, SWA layer 的只留 W 窗口

  这要求 engine 在 model loading 阶段把每层 attention type metadata 编进 kernel config.

  ## 部署现状

  - **vLLM 0.5+**: Mistral 7B / Mixtral 默认; Gemma 2 hybrid 需 0.6+
  - **SGLang 0.4+**: 同上 + RadixAttention 集成 (前缀缓存与 SWA window 协同)
  - **llama.cpp**: SWA 支持 + sliding-window-recompute 端侧 fallback
  - **TRT-LLM**: Mistral/Gemma plugin 内置

fuses_operators: [attention, softmax]
why_fuse: |
  Naive SWA 三步分裂 (mask gen + masked-attn + KV evict) 在长 context 上 mask 物化占 HBM
  且 evict 引入同步. Fused kernel 把 implicit mask 生成 + streaming KV slot 复用 + block-sparse
  early exit 写在一个 FlashAttn 路径内, 长 context 收益 4-40× (随 L/W 比例).

speedup:
  - baseline: 'Full attention (no windowing) — 假设能放下 KV cache'
    multiplier_min: 4.0
    multiplier_max: 40.0
    notes: '32K context: 4-6×; 200K context: 30-40×. KV 装不下时 baseline 不可用, 此时 SWA 是唯一路径'
  - baseline: 'Naive SWA (separate mask + masked-attn + evict)'
    multiplier_min: 1.3
    multiplier_max: 2.0
    notes: 'kernel fusion 独立收益 — 主要省 mask 物化和 evict 同步'

implementations:
  - name: FlashAttention-3 sliding_window param
    hardware_arch: [hopper, blackwell]
    url: https://github.com/Dao-AILab/flash-attention
    notes: 'window_size=(left, right) 参数; Hopper async TMA path'
  - name: vLLM Mistral / Gemma backend
    engine_id: vllm
    hardware_arch: [hopper, ampere, blackwell]
    url: https://docs.vllm.ai/en/latest/models/supported_models.html
  - name: SGLang Mistral / Gemma path
    engine_id: sglang
    hardware_arch: [hopper, ampere, blackwell]
  - name: TensorRT-LLM Mistral plugin
    engine_id: tensorrt-llm
    hardware_arch: [hopper, ada, blackwell]
  - name: llama.cpp SWA
    url: https://github.com/ggerganov/llama.cpp
    hardware_arch: [hopper, ampere, ada, cdna3]

hardware_requires:
  - 'Tensor cores BF16 or FP16'
  - 'PagedAttention-style KV cache (for streaming evict)'

enables_patterns: [sliding-window-attention]

applies_at_stage: compile

trade_offs:
  - '模型必须训练时即用 SWA mask — post-hoc 改 mask 质量崩'
  - '长程依赖任务质量下降 1-5% (代码全局符号、长 reasoning chain)'
  - 'Hybrid 模型 (Gemma 2/3) 增加 engine config 复杂度'
  - 'Full attention KV 能放下时 SWA 的质量损失白付'

references:
  - title: 'Mistral 7B (introduces SWA)'
    url: https://arxiv.org/abs/2310.06825
    source_type: paper
  - title: 'Gemma 2: hybrid sliding-window architecture'
    url: https://arxiv.org/abs/2408.00118
    source_type: paper
  - title: 'FlashAttention window_size param'
    url: https://github.com/Dao-AILab/flash-attention
    source_type: implementation

formal_semantics:
  signature: |
    fused_attn_sliding_window(q: [B, H, S, D], K: [B, H_kv, S, D], V: [B, H_kv, S, D],
                              window: int, sink_tokens: int = 0) -> out: [B, H, S, D]
    Each query position i attends to keys in range [max(0, i - window), i].
    Optional "attention sinks" pin the first `sink_tokens` keys to always be visible
    (StreamingLLM trick) — prevents quality collapse at very long generation.

  fusion_lifecycle: compile-time-template

  unfused_penalty: |
    Unfused = (a) materialize full mask [S, S] in HBM (S² space — quadratic), (b) standard
    attention with full mask. At S=128K this is 16 GB just for the mask. Fused version
    computes the mask on-the-fly in registers via index comparison; cost = O(1) per element.
    Speedup at S=32K: 3-5×, mostly from skipping out-of-window K-tile loads entirely
    (sparse attention pattern lets you not even fetch those tiles).

  edge_cases:
    - input: 'window > seq_len (effectively dense attention)'
      behaviors:
        flash-attn-window: 'Falls through to dense path — checks window > seq_len at kernel launch and dispatches accordingly.'
        flashinfer-window: 'Same — branches to dense kernel when window covers full sequence.'
      mitigation: 'No correctness issue, but verify the engine takes the dense fast path (not the masked-window-with-no-skipping path which is slower).'

    - input: 'attention sinks (sink_tokens > 0, StreamingLLM)'
      behaviors:
        flash-attn-streaming-llm: 'window=W but always-visible first K tokens. Mask becomes: visible if (i-W ≤ j ≤ i) OR (j < sink_tokens).'
        sglang-streaming: 'Same — passes sink_tokens through to flash-attn kernel.'
        gemma-2-hybrid: 'Different: alternates SWA and global layers per layer index, not per-token. Engine config specifies layer pattern.'
      mitigation: 'For Mistral/Gemma 1, no sinks needed (architectural). For pure StreamingLLM (long-running chat without context reset), sink_tokens=4 prevents attention-score collapse after ~10K generations.'

    - input: 'KV cache eviction in streaming mode'
      behaviors:
        streaming-llm-evict: 'Drops K/V slots outside the sliding window AS THEY EXIT — KV cache stays bounded at (window + sink) tokens.'
        vllm-sliding-window: 'Currently does NOT evict (all KV kept in cache, mask just hides them). Memory grows unbounded.'
        sglang-sliding-window: 'Same as vLLM as of 0.4.5 — eviction is on roadmap.'
        trtllm-sliding-window: 'Optional KV-eviction enabled by --use_streaming_llm flag.'
      mitigation: 'For long-running deployments (chat sessions ≥ 1 hour), prefer engines with KV eviction. Without it, OOM is inevitable at ~128K cumulative tokens.'

  numerical_rules:
    - aspect: 'mask_application_dtype'
      per_library:
        all_libs: 'Mask applied as additive: scores += (-inf) for masked positions. Done in FP32 inside online-softmax for safety.'
      notes: 'Standard. Same as flash-attention dense — no SWA-specific surprise.'

    - aspect: 'partial_softmax_with_sparse_mask'
      per_library:
        flash-attn-sparse-skip: 'Skips entire K-tiles when ALL positions in that tile are masked — major perf win, but partial_max init must check "did any column survive?". If all-masked, partial_sum = 0 and the merge step skips the contribution.'
      notes: |
        Subtle bug class: naive flash-attn variants initialize partial_max = -inf and forget
        to handle "no survivors in this tile". Final softmax then gets divide-by-zero.
        Robust impls (flash-attn ≥ 2.5, flashinfer ≥ 0.1) handle this; older custom kernels may not.

  reference_impl:
    framework: pytorch
    snippet: |
      def fused_attn_sliding_window(q, K, V, window, sink_tokens=0):
          B, H, S, D = q.shape
          scores = (q @ K.transpose(-1, -2)) * (D ** -0.5)
          # Build mask: visible if within window OR within sink prefix
          i = torch.arange(S, device=q.device).view(-1, 1)
          j = torch.arange(S, device=q.device).view(1, -1)
          visible = (j <= i) & ((i - j) < window | (j < sink_tokens))
          scores = scores.masked_fill(~visible, float('-inf'))
          return scores.softmax(-1) @ V
