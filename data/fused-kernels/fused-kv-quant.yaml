id: fused-kv-quant
name: Fused KV Cache Quantization
category: kv-cache-management
summary: |
  在 attention output 写入 KV cache 时直接做 FP8 / INT8 量化, 不经过 BF16 中转. 比
  事后 quantization 节省 50% KV cache HBM 占用 + 50% KV read bandwidth, 长 context
  decode 收益巨大. 与 PagedAttention 兼容.

description_md: |
  ## 为什么 KV cache 是长 context 的瓶颈

  Decode 阶段每个 step 都要读完整 KV cache 计算 attention. 32K context, 70B 模型,
  GQA group=8, BF16: KV cache ≈ 32768 × 80 layers × (128 KV heads × 128 head_dim)
  × 2 bytes × 2 (K+V) ÷ 8 (GQA share) = 26.8 GB. **比模型权重还大.**

  显存压力直接转化为:
  - 单卡能容纳的并发请求数下降 (KV pool 吃满显存)
  - decode tok/s/card 受 HBM 带宽限制 — 26.8 GB / 3.35 TB/s = 8 ms 单步 KV 读

  ## Naive 量化的问题

  事后 KV quantization (写完 BF16 KV → 单独 kernel re-quant 到 FP8 → 再写回) 浪费
  bandwidth: KV cache 经过 HBM 三次 (write BF16, read for quant, write FP8). 反而
  比不量化更慢, 直到第一次 attention read 时才回本.

  ## Fused 写入

  Fused KV-quant kernel 在 K/V projection 输出阶段直接走 FP8/INT8 path:
  - **Per-token scale**: 每个 token 的 K/V 单独算 max(|.|), 据此 scale FP8 quant
  - **In-flight quantization**: K projection 输出 → in-register scale → FP8 store →
    HBM. 一次写, 不经 BF16.
  - **Read-side dequant in attention**: PagedAttention kernel 在读 KV block 时 inline
    dequant 到 FP16 (register file 完成), 不需要 staging buffer

  ## 兼容性

  - **PagedAttention**: 兼容 — 改的是 KV cell 内部存储格式, page-table 不变
  - **Prefix caching**: 兼容 — quant 是 per-token 的, prefix tokens 仍可 share
  - **Speculative decoding**: 部分兼容 — draft model 通常不需要 KV quant 的精度损失
  - **Disaggregated (Mooncake)**: 兼容 — RDMA 直接传 FP8 KV, 比 BF16 KV 减半带宽

  ## 实测精度

  - Llama-3 70B + FP8 KV: PPL 涨 0.05, MMLU 持平, GSM8K -0.2pp
  - DeepSeek-V4 Pro + FP8 KV: 推理质量基本无影响, code pass@1 持平
  - INT4 KV: 长 context 后期 token 准确度明显下降, 通常不推荐

  ## 引擎落地

  - **vLLM**: `--kv-cache-dtype fp8_e4m3` 自 0.5+ 默认可用
  - **SGLang**: FP8 KV 通过 RadixAttention 集成
  - **TensorRT-LLM**: FP8 KV 是 Blackwell 默认
  - **MindIE**: INT8 KV 支持, FP8 在 CANN 8.x 路线图

fuses_operators: [matmul, kv-write]
why_fuse: |
  Standalone KV-quant kernel 在 BF16 KV 写完后再做 quant — 让 BF16 KV 经过 HBM 一次
  无意义中转. Fused 版本让 K/V projection GEMM 的 epilogue 直接做 quant, FP8 数据
  唯一一次写 HBM. 节省 1× KV-cache-sized HBM round-trip per layer per token.

speedup:
  - baseline: 'BF16 KV cache (no quantization)'
    multiplier_min: 1.4
    multiplier_max: 2.0
    notes: '32K+ context decode 阶段; 收益主要来自 KV read bandwidth 减半'
  - baseline: 'Post-hoc INT8 KV quantization (separate kernel)'
    multiplier_min: 1.2
    multiplier_max: 1.5
    notes: 'fusion 部分独立带来的额外收益, 不算 quant algorithm 本身的内存收益'

implementations:
  - name: vLLM fused KV quant (--kv-cache-dtype fp8_e4m3)
    engine_id: vllm
    hardware_arch: [hopper, ada, blackwell]
    url: https://docs.vllm.ai/en/latest/quantization/fp8.html
  - name: SGLang FP8 KV cache
    engine_id: sglang
    hardware_arch: [hopper, blackwell]
    url: https://docs.sglang.ai/backend/quantization.html
  - name: TensorRT-LLM FP8 KV cache plugin
    engine_id: tensorrt-llm
    hardware_arch: [hopper, ada, blackwell]
    url: https://nvidia.github.io/TensorRT-LLM/quantization
  - name: MindIE INT8 KV cache
    engine_id: mindie
    hardware_arch: [ascend-910b, ascend-910c]
    notes: 'INT8 only; FP8 KV 等 CANN 8.x'
  - name: LMDeploy KV INT8
    engine_id: lmdeploy
    hardware_arch: [hopper, ampere]
    url: https://github.com/InternLM/lmdeploy

hardware_requires:
  - 'Hopper or newer for FP8 KV path (need FP8 native tensor cores)'
  - 'Ampere可走INT8 KV fallback (cuBLAS GEMM with INT8)'
  - '昇腾 / DCU / 国产硬件: INT8 KV 普遍支持, FP8 路径正在补'

enables_patterns: [kv-cache-int8, paged-attention, prefix-caching]

applies_at_stage: serve

trade_offs:
  - '量化精度: FP8 e4m3 在 attention score outlier 上有累积误差, 长 context 推理任务上偶发'
  - '与某些 attention 变种不兼容 (MLA decompresses K differently); DeepSeek-V3 用专门的 FP8 KV path'
  - 'Calibration: per-token dynamic scale 不需要 calibration 数据集, 但 per-tensor static scale 需要'

references:
  - title: 'KV Cache Quantization for LLM Inference'
    url: https://arxiv.org/abs/2403.04643
    source_type: paper
  - title: 'vLLM FP8 KV cache documentation'
    url: https://docs.vllm.ai/en/latest/quantization/fp8.html
    source_type: docs
  - title: 'KIVI: A Tuning-Free Asymmetric 2bit Quantization for KV Cache'
    url: https://arxiv.org/abs/2402.02750
    source_type: paper

formal_semantics:
  signature: |
    fused_kv_quant(k_bf16: [B, H_kv, S, D], v_bf16: [B, H_kv, S, D],
                   page_table) -> k_int8: [...], v_int8: [...], scales_per_token, zeros_per_token
    Fuses {compute K/V → per-token quantize → write to paged KV cache} into the
    attention kernel"s KV-write epilogue. Quantization happens INSIDE the attention
    kernel; never materializes BF16 KV cache to HBM.

  fusion_lifecycle: manual-kernel

  unfused_penalty: |
    Unfused = (1) attention writes BF16 K/V to HBM; (2) quantize kernel reads BF16,
    writes INT8 + scales/zeros. Doubles KV-write bandwidth. Fused saves the round-trip;
    KV cache memory cut 4× (BF16 → INT8) so batch-size doubles at long context.

  edge_cases:
    - input: 'INT8 vs INT4 vs FP8-E4M3 KV cache dtype'
      behaviors:
        vllm-int8-kv: 'Per-token scale/zero (asymmetric INT8); ~0.1pp MMLU loss; default for long-ctx serving.'
        kivi-int4: 'Per-channel + per-token; 2bit experimental; ~1pp MMLU loss but 4× memory savings on top of INT8.'
        vllm-fp8-kv: 'FP8-E4M3 with per-tensor scale; native FP8 attention path. Slightly lower quality than INT8 but faster on Blackwell.'
      mitigation: 'For 32K+ ctx production: INT8 first. FP8 only when Blackwell + native FP8 attention. INT4 only with quality eval pass.'

    - input: 'group_size for quantization (per-token vs per-page vs per-tensor)'
      behaviors:
        per-token: 'Most accurate; storage overhead = 1 scale + 1 zero per token (small relative to D).'
        per-page: 'PagedAttention page-aligned (e.g., 16 tokens per scale). Less storage; minor accuracy loss.'
        per-tensor: 'Single global scale; loses precision; only acceptable for short-ctx prototyping.'
      mitigation: 'Per-token is the production default. Per-page only if scale-storage budget is tight.'

  numerical_rules:
    - aspect: 'quantization_dtype_for_scale'
      per_library:
        vllm: 'scale stored as BF16 (sufficient precision for INT8 dequant range).'
        flashinfer: 'Same; or FP16 if model is FP16-trained.'
        sglang: 'Same.'
      notes: 'FP32 scale is overkill for INT8 KV; BF16 sufficient. Confirmed via 0.05pp accuracy delta.'

    - aspect: 'quantize_then_dequantize_for_attention_compute'
      per_library:
        all_libs: 'KV stored INT8 in cache; dequant to BF16 inside attention kernel during Q@K^T computation. The dequant happens in registers, no SMEM round-trip.'
      notes: 'The fusion is two-sided: quantize on KV-write, dequantize on KV-read. Both inside attention kernel boundaries.'

  reference_impl:
    framework: pytorch
    snippet: |
      def fused_kv_quant(k_bf16, v_bf16):
          # Per-token asymmetric INT8 quantization
          k_min = k_bf16.amin(dim=-1, keepdim=True)
          k_max = k_bf16.amax(dim=-1, keepdim=True)
          k_scale = (k_max - k_min) / 255.0
          k_zero = k_min
          k_int8 = ((k_bf16 - k_zero) / k_scale).round().clamp(0, 255).to(torch.uint8)
          return k_int8, k_scale.to(torch.bfloat16), k_zero.to(torch.bfloat16)
