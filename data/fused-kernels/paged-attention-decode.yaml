id: paged-attention-decode
name: PagedAttention Decode Kernel
category: kv-cache-management
summary: |
  vLLM 提出的块状 KV cache attention kernel: KV 不再连续存放, 而是分成固定大小的 block,
  每个 sequence 维护一个 page table (类似虚拟内存). decode kernel 通过 page table 间接寻
  址读取 KV, 解决长 context 时 KV 内存碎片化问题.

description_md: |
  ## 问题: KV cache 内存碎片化

  传统 attention 假设 KV 连续存储, 每条 sequence 预留 max_seq_len 显存. 高并发 LLM 服务
  里这意味着 90% 显存空闲(请求多数没用到 max_seq_len), 同时新请求来了又分配不出来.

  ## PagedAttention 的虚拟内存类比

  - **物理 page**: 显存里 16 或 32 token 一个 KV block (固定大小)
  - **page table**: 每个 sequence 一张 logical → physical block 映射表
  - **decode kernel**: 拿 page table, 间接寻址读 K/V, 写当前 token 的 K/V 到末尾的 page

  这把 KV 显存利用率从 ~30% 提到 95%+. 同样硬件能跑 3-5x 并发.

  ## kernel 实现细节

  - **block_size 固定** (16/32) — kernel 内部是规则 GEMV, 间接寻址只在 outer loop
  - **prefix sharing** — 多个 sequence 共享 system prompt 的 KV block (无需复制)
  - **swap to host** — 显存压力时 page 可以 swap 到 host RAM (slower 但不掉服务)

fuses_operators: [attention, kv-read]
why_fuse: |
  传统 contiguous KV attention kernel 在分页场景下会跨 block 边界做不连续 read,
  CUDA 协程 stall. PagedAttention kernel 把"按页读 + softmax + V@" 折叠到一起,
  并用 block_size=16 这种 cache-friendly 粒度避免 random access.

speedup:
  - baseline: 'Naive contiguous-KV attention with max_seq_len reservation'
    multiplier_min: 3
    multiplier_max: 5
    notes: '不是 kernel 本身快了, 而是同样显存能跑 3-5x 并发 → 整体 throughput 收益'

implementations:
  - name: vLLM paged_attention_v2
    engine_id: vllm
    hardware_arch: [hopper, ampere, ada, blackwell]
    url: https://github.com/vllm-project/vllm/tree/main/csrc/attention
    notes: 'reference impl, vLLM 论文同名'
  - name: SGLang RadixAttention (extension)
    engine_id: sglang
    hardware_arch: [hopper, ampere, blackwell]
    url: https://github.com/sgl-project/sglang
    notes: '在 PagedAttention 基础上加 prefix radix tree, 自动 cache 公共 prefix'
  - name: TRT-LLM Paged KV Cache
    engine_id: tensorrt-llm
    hardware_arch: [hopper, ada, blackwell]
  - name: LMDeploy PagedAttn
    engine_id: lmdeploy
    hardware_arch: [hopper, ampere]
  - name: MindIE PagedKVCache
    engine_id: mindie
    hardware_arch: [ascend-910b, ascend-910c]
    notes: '昇腾 native page-table 实现, HBM3 + L2 协同'

hardware_requires:
  - 'GPU with sufficient SMEM for indirect addressing (almost all modern AI accel)'
  - 'page_size 通常 16, 需要硬件 cache line 友好 (128B+)'

enables_patterns: [paged-attention, prefix-caching]

applies_at_stage: serve

trade_offs:
  - 'Long-tail page-table 间接寻址比连续 KV 慢 ~5-10% (单 sequence)'
  - '需要 KV manager 进程, 调度复杂度上升'
  - 'paged 写入需要 block-aligned, 每个 step 要 round up'

references:
  - title: 'Efficient Memory Management for Large Language Model Serving with PagedAttention'
    url: https://arxiv.org/abs/2309.06180
    source_type: paper
  - title: 'vLLM PagedAttention CUDA kernel'
    url: https://github.com/vllm-project/vllm/tree/main/csrc/attention
    source_type: implementation

formal_semantics:
  signature: |
    paged_attention_decode(Q: [B,1,H,D_h], K_pages: [#pages, page_size, H_kv, D_h],
                           V_pages: [#pages, page_size, H_kv, D_h],
                           block_table: [B, max_blocks_per_seq], context_lens: [B])
    -> [B, 1, H, D_h]
    Decode-only attention reading from PagedAttention's block-paged KV cache.
    O(ctx_len) per token, memory-bound. Fuses [block_table indirection, K/V gather, QK matmul, softmax, P@V] in one kernel.
  fusion_lifecycle: compile-time-template
  unfused_penalty: |
    Unfused: 4 separate kernels + 3 intermediate writes. At ctx=32K: ~180GB extra HBM
    traffic per request decode step. Fusion is REQUIRED, not optional, for any
    serving system at >2K ctx.
  edge_cases:
    - input: 'KV-quant FP8 cache (per-page or per-token scaling)'
      behaviors:
        vllm-paged-attn-fp8: 'Per-page scale factor stored alongside; dequant on read'
        flash-paged-attn-fp8: 'Same approach (Tri Dao convention)'
        mindie-fp8-kv: '910C limited; 910D full support with per-token scale'
      mitigation: 'Per-token scale is more accurate but more metadata. Production: per-page (16/32 token block) scale is the sweet spot.'

    - input: 'GQA H_q / H_kv ratio with broadcast'
      behaviors:
        vllm-paged-attn: 'Properly broadcasts K/V to H_q heads'
        flash-paged-attn: 'Same'
        mindie-paged-attn: 'Same on 910C+'
      mitigation: 'Tested in v2.10/2.14 validation matrix — Llama 3.3 (H=64, H_kv=8) works correctly across all major libs.'

    - input: 'block_table contains -1 sentinel (sequence shorter than max blocks)'
      behaviors:
        vllm-paged-attn: 'Skips -1 blocks via masked attention'
        sglang-radix-attn: 'No block table; uses radix tree — N/A'
        mindie-paged-attn: 'Custom Ascend-C handles via context_lens parameter'
      mitigation: 'Always pass context_lens; do not rely solely on -1 sentinel.'

  numerical_rules:
    - aspect: 'softmax_partial_sum_combine'
      per_library:
        vllm-paged-attn: 'FlashAttention-style 2-pass partial-sum + final combine — FP32 internal'
        flash-paged-attn: 'Same'
        mindie-paged-attn: 'FP32 internal accumulator on 910C+'
      notes: 'FP16 partial-sum loses precision on long context. Always FP32.'

    - aspect: 'page_size_alignment'
      per_library:
        vllm: 'Default 16; configurable (8/16/32/64)'
        sglang: 'Radix tree, no fixed page_size'
        mindie: 'Default 128 (Ascend-aligned)'
      notes: 'Larger page = less metadata overhead; smaller page = less waste at sequence end. Production: tune per workload.'
