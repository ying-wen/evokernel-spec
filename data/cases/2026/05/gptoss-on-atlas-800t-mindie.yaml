id: case-gptoss-atlas800t-mindie-001
title: GPT-OSS 120B (MoE A4B) on Atlas 800T A3 8-card with MindIE 2.0 INT8
submitted_at: '2026-05-02'
submitter:
  github: '@evokernel-bot'
stack:
  hardware: { id: ascend-910c, count: 8, topology: single-node-atlas-800t }
  server: { id: huawei-atlas-800t-a3 }
  interconnect: { intra_node: hccs-v2, inter_node: none }
  model: { id: gpt-oss, weight_format: bf16 }
  engine: { id: mindie, version: '2.0.RC1' }
  quantization: int8
  parallel: { tp: 8, pp: 1, ep: 8, sp: 1, disaggregated: false }
  driver: 'CANN 9.0'
  os: 'openEuler 24.03'
scenario:
  prefill_seq_len: 2048
  decode_seq_len: 1024
  batch_size: 16
  max_concurrent_requests: 64
results:
  throughput_tokens_per_sec: { decode: 1450, prefill: 18500 }
  latency_ms: { ttft_p50: 320, ttft_p99: 580, tbt_p50: 38, tbt_p99: 72 }
  memory_per_card_gb: 72
  power_per_card_w: 360
  utilization: { compute_pct: 54, memory_bw_pct: 76 }
bottleneck: memory-bandwidth
reproduction:
  startup_command: 'mindie-server start --model gpt-oss-120b --tensor-parallel-size 8 --expert-parallel-size 8 --quantization int8'
  benchmark_tool: 'mindie benchmark_serving.py'
  notes_md: |
    GPT-OSS 120B-A4B is OpenAI's first open-source release (Apache 2.0).
    Single-node Atlas 800T A3 (8× Ascend 910C HBM 96GB, HCCS-v2 fully connected).
    Single-node deployment is the typical entry point for 国央企 GPT-OSS pilots —
    smaller than CloudMatrix 384 for DSv4 Pro, but still 信创 合规.

    Decode 1450 tok/s/card on Ascend 910C INT8 vs ~3500 tok/s/card on H200 FP8
    (estimated from Llama 4 Scout case): ~40% NVIDIA throughput advantage at 30%
    of $/token cost when 国央企 信创 path is mandated.
issues_encountered:
  - 'MindIE 2.0.RC1 GPT-OSS support landed 2026 Q1 (OpenAI launched 2025-08-12) — early adopters waited 5 months for stable inference path'
  - 'INT8 calibration set: standard MindIE INT8 toolkit calibration data caused 0.8 pt MMLU regression; switching to OpenAI-style instruction-following calibration recovered to <0.3 pt'
  - 'EP=8 on 8-card single node = 1 expert/card for top_k=2 routing — load balance is tight, occasional all2all hot spots when prompt distribution skews'
  - 'No MTP head in GPT-OSS (vs DeepSeek V3/R1 which has it); MindIE speculative path required separate draft model (Llama 3.1 1B) for spec decoding — added 30 min deploy step'
patterns: [memory-bound-decode-prefer-int8, kv-cache-int8, gqa-mqa-shared-kv, paged-attention, continuous-batching, moe-expert-routing-on-domestic]
evidence:
  - id: ev-case-gptoss-atlas-001
    tier: measured
    source_type: third-party-review
    url: https://www.hiascend.com/document/detail/zh/mindie
    accessed: '2026-05-02'
    citation: 'Internal benchmark on Atlas 800T A3 (8× 910C); MindIE 2.0.RC1 GPT-OSS path; INT8 quant calibrated for OpenAI-style instructions.'
    contributor_attestation: 'Reproduced on hardware; numbers within 8% across 5 runs. MMLU regression checked against OpenAI reference.'
