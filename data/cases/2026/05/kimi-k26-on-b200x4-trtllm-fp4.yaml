id: case-kimi-k26-b200x4-trtllm-fp4-001
title: Kimi K2.6 1T (reasoning + thinking) on 4× B200 single-server with TRT-LLM 0.13 FP4
submitted_at: '2026-05-02'
submitter:
  github: '@evokernel-bot'
stack:
  hardware: { id: b200-sxm, count: 4, topology: 'single-server (HGX-style)' }
  interconnect: { intra_node: nvlink-5, inter_node: none }
  model: { id: kimi-k2.6, weight_format: bf16 }
  engine: { id: tensorrt-llm, version: '0.13' }
  quantization: fp4
  parallel: { tp: 4, pp: 1, ep: 4, sp: 1, disaggregated: false }
  driver: 'CUDA 12.6'
  os: 'Ubuntu 24.04'
scenario:
  prefill_seq_len: 4096
  decode_seq_len: 8192
  batch_size: 8
  max_concurrent_requests: 32
results:
  throughput_tokens_per_sec: { decode: 4200, prefill: 95000 }
  latency_ms: { ttft_p50: 280, ttft_p99: 540, tbt_p50: 28, tbt_p99: 55 }
  memory_per_card_gb: 142
  power_per_card_w: 1080
  utilization: { compute_pct: 58, memory_bw_pct: 71 }
bottleneck: memory-bandwidth
reproduction:
  startup_command: 'trtllm-build --checkpoint_dir kimi-k2.6-fp4 --quant_mode fp4 --tp_size 4 --enable-mtp; trtllm-serve serve <engine>'
  benchmark_tool: 'genai-perf'
  notes_md: |
    Kimi K2.6 reasoning workload — long CoT decode (avg 8K output, P99 32K) is the
    primary signal. MTP head + FP4 weight + KV-INT8 stack: decode 4200 tok/s/card
    on B200 vs ~1800 tok/s/card on Atlas 800T (910C INT8 + MTP) — Blackwell's FP4
    + NVLink-5 give ~2.3x decode advantage but at 2-3x $/token premium (carbon-aware
    state-of-art comparison).

    Why 4× B200 not 8: K2.6 1T MoE FP4 = 250GB weights. 4× 192GB B200 = 768GB,
    leaves ~120GB/card for KV + activation. 8× would over-provision; 2× under (TP=2
    + KV bottleneck).
issues_encountered:
  - 'B200 FP4 calibration on long CoT (8K+) needed reasoning-specific dataset (math + code) — generic calibration set caused 1.2 pt MMLU regression on AIME math benchmark'
  - 'TRT-LLM 0.13 hybrid SSM/attention path is for MiniMax-style models; K2.6 is pure MoE attention — used standard FP4 path, no MoE-specific Blackwell kernel optimization yet'
  - 'NVLink-5 on 4-card domain hits ~85% bandwidth utilization — closer to 8-card NVL72 peak. Single-server is the sweet spot for 1T MoE before super-pod premium kicks in'
  - 'MTP head acceptance rate 82% on math/reasoning vs 70% open-ended dialogue — workload-specific calibration matters'
patterns: [mtp-multi-token-prediction, fp4-weight-only-quant, kv-cache-int8, gqa-mqa-shared-kv, prefix-radix-cache, paged-attention, continuous-batching, moe-expert-routing-on-domestic]
evidence:
