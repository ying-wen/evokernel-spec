id: case-kimi-k26-h100x8-sglang-fp8-001
title: Kimi K2.6 (Moonshot agent MoE) on 8×H100 with SGLang 0.4 FP8 + RadixAttention
submitted_at: '2026-05-01'
submitter:
  github: '@evokernel-bot'
stack:
  hardware: { id: h100-sxm5, count: 8, topology: single-node-hgx }
  server: { id: nvidia-hgx-h100 }
  interconnect: { intra_node: nvlink-4, inter_node: none }
  model: { id: kimi-k2.6, weight_format: bf16 }
  engine: { id: sglang, version: '0.4.6' }
  quantization: fp8-e4m3
  parallel: { tp: 8, pp: 1, ep: 8, sp: 1, disaggregated: false }
  driver: 'CUDA 12.5'
  os: 'Ubuntu 22.04'
scenario:
  prefill_seq_len: 2048
  decode_seq_len: 1024
  batch_size: 64
  max_concurrent_requests: 256
results:
  throughput_tokens_per_sec: { decode: 4800, prefill: 48000 }
  latency_ms: { ttft_p50: 105, ttft_p99: 240, tbt_p50: 13, tbt_p99: 26 }
  memory_per_card_gb: 64
  power_per_card_w: 670
  utilization: { compute_pct: 52, memory_bw_pct: 76 }
bottleneck: memory-bandwidth
reproduction:
  startup_command: 'sglang launch_server --model moonshotai/Kimi-K2.6 --tp 8 --ep 8 --quantization fp8 --enable-radix-attn --schedule-conservativeness 0.6'
  benchmark_tool: 'sglang bench_serving.py --dataset-name sharegpt-multi-turn'
issues_encountered:
  - 'Kimi K2.6 是 MoE agent-tuned model — agent 多轮 chat 场景下, RadixAttention 前缀复用率达 73% (system prompt + tool descriptions 不变); 关闭后 TTFT 升 6-9x'
  - 'EP=8 expert routing 在前 200 step 不平衡; 启用 SGLang router_warmup_steps=300 缓解'
  - 'FP8 calibration on agent dataset (含 tool call 格式) 比 wikitext 校准 HumanEval 高 1.2 pt — calibration set 必须包含目标领域'
  - 'SGLang 0.4.6 早期 release RadixAttention + FP8 组合在 prefill 阶段偶发 NaN; 升级到 0.4.6.post3 修复'
patterns: [flashattention-v3, gqa-mqa-shared-kv, prefix-radix-cache, paged-attention, continuous-batching, chunked-prefill, moe-expert-routing-on-domestic]
