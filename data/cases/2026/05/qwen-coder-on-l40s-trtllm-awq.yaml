issues_encountered:
  - 'L40s 是 PCIe Gen4 卡 (无 NVLink), TP=4 走 PCIe 跨卡 all-reduce — bandwidth 25 GB/s/方向, 比 H100 NVLink-4 慢 ~36x. 大 batch decode TBT 抖动明显'
  - 'AWQ-INT4 calibration 用 generic dataset (wikitext) 时 HumanEval 跌 1.8 pt; 改用 code-specific calibration set 后跌幅 0.6 pt'
  - 'TRT-LLM engine build 12 分钟 (4 卡 × INT4 calibration); 单卡 build 后用 multi_gpu_inference 路径'
  - 'L40s 48 GB HBM 让 Qwen 2.5-Coder 32B AWQ 单卡装下 (~16 GB weights), TP=4 主要为提升 throughput 而非容量'
