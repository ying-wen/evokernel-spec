issues_encountered:
  - 'MiniMax M2.7 hybrid (SSM + attention) — JAX path 比 PyTorch 简单 (TPU 原生 JAX), 但 SSM block 需要 Mamba2-style flax kernel, 老 SGLang 版本走 fallback 慢 50%'
  - 'TPU v6e ICI fabric 低 latency 让 EP=8 cross-chip all2all 比 H100 NVLink-4 快 ~15%; 但 TPU compute 峰值低 (vs H100), 整体 throughput 较慢'
  - 'JAX TPU 编译 (XLA HLO) 首次启动 12-18 分钟; engine cache 到 GCS 后续 cold start ~2 min'
  - 'TPU 没有 standalone CLI 看 utilization — 必须用 GCP Console / Cloud Monitoring; 缺乏 nvidia-smi 等价物是运维痛点'
