issues_encountered:
  - 'TRT-LLM 0.13 是首个 production-ready 支持 hybrid SSM/attention 的 release — Mamba2 selective-scan kernel + transformer block 同 engine 内 fuse'
  - 'B200 native FP4 让 64K long-context decode 跑得比 H100 BF16 快 4-5x; MiniMax M2.7 hybrid 设计 + FP4 是 long-context 部署当前最佳路径'
  - 'TRT-LLM engine build for hybrid model 35 分钟 (vs pure transformer 5-15 分钟) — Mamba2 state propagation 增加 graph 复杂度'
  - 'NVLink-5 单节点 1.8 TB/s/GPU 在 TP=8 长 prefill (65K) 下 ~85% 利用率; H100 NVLink-4 同样工作负载只能拿 ~65%'
  - 'Mamba2 SSM state 量化敏感 — FP4 calibration set 必须包含长 sequence (32K+) 否则长 context 时 state drift 偏离 BF16 reference'
patterns: [flashattention-v3, fp4-weight-only-quant, sliding-window-attention, prefix-radix-cache, paged-attention, continuous-batching, ring-attention-long-context, compile-time-graph-optimization]
