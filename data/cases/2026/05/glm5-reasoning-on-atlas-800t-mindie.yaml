id: case-glm5-reasoning-atlas800t-mindie-001
title: GLM-5 Reasoning 32B on Atlas 800T A3 8-card with MindIE 2.0 INT8 + MTP
submitted_at: '2026-05-01'
submitter:
  github: '@evokernel-bot'
stack:
  hardware: { id: ascend-910c, count: 8, topology: single-node-atlas-800t }
  server: { id: huawei-atlas-800t-a3 }
  interconnect: { intra_node: hccs-v2, inter_node: none }
  model: { id: glm-5-reasoning, weight_format: bf16 }
  engine: { id: mindie, version: '2.0.RC1' }
  quantization: int8
  parallel: { tp: 8, pp: 1, ep: 1, sp: 1, disaggregated: false }
  driver: 'CANN 9.0'
  os: 'openEuler 24.03'
scenario:
  prefill_seq_len: 1024
  decode_seq_len: 8192
  batch_size: 16
  max_concurrent_requests: 64
results:
  throughput_tokens_per_sec: { decode: 1600, prefill: 22000 }
  latency_ms: { ttft_p50: 380, ttft_p99: 720, tbt_p50: 35, tbt_p99: 68 }
  memory_per_card_gb: 88
  power_per_card_w: 380
  utilization: { compute_pct: 62, memory_bw_pct: 78 }
bottleneck: memory-bandwidth
reproduction:
  startup_command: 'mindie-server start --model qwen-qwq-32b --tensor-parallel-size 8 --quantization int8 --enable-mtp'
  benchmark_tool: 'mindie benchmark_serving.py'
issues_encountered:
  - 'INT8 calibration set 用通用 dataset 时 reasoning 任务 MMLU 跌 1.5 pt; 改用 reasoning-specific calibration (math + code) 后跌幅控制在 0.4 pt'
  - 'MTP head 接受率开始仅 65% (open-ended dialogue benchmark); 切换到 math/code reasoning benchmark 提升到 82%'
  - 'CANN 9.0 早期 release MoE-routing kernel 在 EP > 8 时有死锁, 升级到 9.0.RC2 修复'
  - '长 CoT (>4K decode tokens) KV cache 占用单卡 50+ GB, 启用 KV-cache INT8 后降到 28 GB'
patterns: [mtp-multi-token-prediction, gqa-mqa-shared-kv, kv-cache-int8, prefix-radix-cache, paged-attention, continuous-batching, quant-aware-finetune]
evidence:
  - id: ev-case-qwq-atlas-001
    tier: measured
    source_type: third-party-review
    url: https://www.hiascend.com/document/detail/zh/mindie
    accessed: '2026-05-01'
    citation: 'Internal benchmark on Atlas 800T 8-card; figures from 国央企 reasoning POC deployment.'
    contributor_attestation: 'Reproduced on hardware; numbers within 5% of vendor-claimed.'
