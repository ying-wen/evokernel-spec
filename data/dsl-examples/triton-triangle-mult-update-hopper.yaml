notes: |
  Triangle multiplicative update is the **most-impactful missing kernel** in the corpus
  for non-LLM workloads (v3.11 added the op entry; v3.12 added the fused-pairformer-block;
  v3.13 ships this DSL example as the structural reference).

  This is the canonical "non-LLM op" reference for the agent — when an LLM-orchestrator
  is generating code for Boltz-1 / ESMFold / AF3 deployment, this Triton example shows:
  - The unusual 4-tensor contraction shape (vs standard matmul)
  - The chunked K-reduction trick for variable N
  - The FP32-accumulator-then-cast pattern
  - The autotune integration for variable-length inputs

  **Production deployments of this kernel**:
  - **OpenFold** (community AF2 reimpl + Boltz-1 backend): has hand-tuned version
  - **Boltz-1 PyTorch eager**: lacks Triton path (3-5× slower vs OpenFold)
  - **AlphaFold 3 (DeepMind)**: closed-weights + JAX/XLA auto-fusion (quality not validated)
  - **RFAA / RoseTTAFold**: similar pattern, separate impls

  **What the agent should recommend** (for v3.x productized agent):
  - Boltz-1 deployment optimization → add this Triton kernel + integrate into Boltz-1
    PyTorch model (community PR opportunity)
  - ESMFold deployment optimization → already uses similar OpenFold kernels;
    no additional fusion needed
  - AF3 deployment → use as-is (DeepMind reference path)
  - Custom pairformer model → start from this Triton skeleton

  This DSL example partially fulfills the user's "不同硬件 CUDA/CANN 级别实现参考和文档"
