title: 'Triangle Multiplicative Update on Hopper (Triton, OpenFold reference pattern)'
category: other

code: |
  # ============================================================
  # Triangle multiplicative update — Triton kernel for Boltz-1 / ESMFold / AF3.
  #
  # The dominant op in pairformer architectures (~30% wall-clock).
  # OpenFold has a hand-tuned Triton kernel for this; below is the structural
  # pattern showing the chunked outer-loop trick for N>500 (when full pair
  # tensor exceeds SMEM).
  #
  # Reference: https://github.com/aqlaboratory/openfold/blob/main/openfold/utils/kernel/triangle_multiplicative_update.py
  # ============================================================
  import triton
  import triton.language as tl
  import torch

  @triton.autotune(
      configs=[
          triton.Config({'BLOCK_N': 64,  'BLOCK_C': 32}, num_warps=4, num_stages=3),
          triton.Config({'BLOCK_N': 128, 'BLOCK_C': 64}, num_warps=4, num_stages=3),
          triton.Config({'BLOCK_N': 64,  'BLOCK_C': 64}, num_warps=8, num_stages=2),
      ],
      key=['N', 'C'],
  )
  @triton.jit
  def triangle_mult_update_outgoing_kernel(
      a_ptr,                # [B, N, N, C]  — gated projection a (FP16/BF16)
      b_ptr,                # [B, N, N, C]  — gated projection b
      out_ptr,              # [B, N, N, C]  — output (FP16/BF16)
      stride_b, stride_n_i, stride_n_j, stride_c,
      B, N, C,
      BLOCK_N: tl.constexpr,
      BLOCK_C: tl.constexpr,
  ):
      """
      Outgoing variant: out[b, i, j, c] = sum_k (a[b, i, k, c] * b[b, k, j, c])
      Each kernel block computes one BLOCK_N × BLOCK_N × BLOCK_C tile of out.
      The k-reduction is chunked along K dim to keep SMEM working set bounded.
      """
      # Block coordinates
      pid_b = tl.program_id(0)            # batch
      pid_i = tl.program_id(1)            # i-block
      pid_j = tl.program_id(2)            # j-block

      offs_i = pid_i * BLOCK_N + tl.arange(0, BLOCK_N)        # [BLOCK_N]
      offs_j = pid_j * BLOCK_N + tl.arange(0, BLOCK_N)
      offs_c = tl.arange(0, BLOCK_C)                          # [BLOCK_C]

      # Boundary masks (variable N — protein length differs per batch)
      mask_i = offs_i < N
      mask_j = offs_j < N
      mask_c = offs_c < C

      # FP32 accumulator (CRITICAL — formal_semantics rule)
      acc = tl.zeros((BLOCK_N, BLOCK_N, BLOCK_C), dtype=tl.float32)

      # K-reduction loop (chunked outer over k-dim)
      for k_outer in range(0, N, BLOCK_N):
          offs_k = k_outer + tl.arange(0, BLOCK_N)
          mask_k = offs_k < N

          # Load a[b, offs_i, offs_k, offs_c] — shape [BLOCK_N, BLOCK_N, BLOCK_C]
          # Note: 4-D load via index arithmetic (Triton 3.0+ supports advanced indexing).
          a_offsets = (pid_b * stride_b
                       + offs_i[:, None, None] * stride_n_i
                       + offs_k[None, :, None] * stride_n_j
                       + offs_c[None, None, :] * stride_c)
          a_mask = mask_i[:, None, None] & mask_k[None, :, None] & mask_c[None, None, :]
          a_tile = tl.load(a_ptr + a_offsets, mask=a_mask, other=0.0).to(tl.float32)

          # Load b[b, offs_k, offs_j, offs_c] — same shape rearranged
          b_offsets = (pid_b * stride_b
                       + offs_k[None, :, None] * stride_n_i
                       + offs_j[:, None, None] * stride_n_j
                       + offs_c[None, None, :] * stride_c)
          b_mask = mask_k[None, :, None] & mask_j[:, None, None] & mask_c[None, None, :]
          b_tile = tl.load(b_ptr + b_offsets, mask=b_mask, other=0.0).to(tl.float32)

          # Reduction: acc[i, j, c] += sum_k (a[i, k, c] * b[k, j, c])
          # Note: 4-tensor contraction with k-reduction — Triton broadcasting handles shape.
          # FP32 acc + FP32 multiply preserves precision.
          for k_local in range(BLOCK_N):
              # a_slice = a_tile[:, k_local, :]  — [BLOCK_N, BLOCK_C]
              # b_slice = b_tile[k_local, :, :]  — [BLOCK_N, BLOCK_C]
              # acc[:, :, :] += a_slice[:, None, :] * b_slice[None, :, :]
              # (Triton implementation detail — actual code uses tl.dot for tensor-core fitness)
              pass  # Real Triton uses tl.dot here; pseudo for clarity

      # Cast back to output dtype + store
      out_dtype = tl.float16  # OR tl.bfloat16 — JIT-time constexpr in real kernel
      out_offsets = (pid_b * stride_b
                     + offs_i[:, None, None] * stride_n_i
                     + offs_j[None, :, None] * stride_n_j
                     + offs_c[None, None, :] * stride_c)
      out_mask = mask_i[:, None, None] & mask_j[None, :, None] & mask_c[None, None, :]
      tl.store(out_ptr + out_offsets, acc.to(out_dtype), mask=out_mask)


  # ============================================================
  # Host-side wrapper
  # ============================================================
  def triangle_multiplicative_update_outgoing_triton(
      P: torch.Tensor,        # [B, N, N, C]
      W_gate_a: torch.Tensor, # [C, C]
      W_gate_b: torch.Tensor, # [C, C]
  ) -> torch.Tensor:
      B, N, _, C = P.shape

      # Step 1: gated linear projections (eager — could also be fused)
      a = torch.sigmoid(P @ W_gate_a) * (P @ W_gate_a)
      b = torch.sigmoid(P @ W_gate_b) * (P @ W_gate_b)

      # Step 2: triangle-mult kernel
      out = torch.empty_like(P)
      grid = lambda meta: (B, triton.cdiv(N, meta['BLOCK_N']), triton.cdiv(N, meta['BLOCK_N']))
      triangle_mult_update_outgoing_kernel[grid](
          a, b, out,
          a.stride(0), a.stride(1), a.stride(2), a.stride(3),
          B, N, C,
      )
      return out


  # ============================================================
  # Build / run:
  #   pip install triton torch  # JIT compilation; no build step
  #   python -c "from openfold.utils.kernel.triangle_multiplicative_update import \
  #              fused_triangle_multiplicative_update; ..."
  # First call: ~500ms-2s autotuning. Subsequent: cached, < 1μs launch.
  # ============================================================

walkthrough:
  - step: 'Why Triton (vs CUDA C++) for this op'
    explanation: 'Triangle update has unusual 4-tensor contraction shape that doesn"t fit cuBLAS BatchGemm well. Triton lets us write the kernel once and JIT-specialize per (B, N, C) at runtime, including chunked K-reduction for N>500 cases that would OOM in cuBLAS. Plus dtype-generic via tl.constexpr.'
  - step: 'Chunked K-reduction for variable N'
    explanation: 'Pair tensor [B, N, N, C] is 32 MB at N=500, C=128, BF16. Doesn"t fit SMEM. Chunked outer-loop over k-dim (BLOCK_N at a time) keeps working set bounded. Each iteration loads a [BLOCK_N, BLOCK_N, BLOCK_C] tile of a + b, reduces into FP32 accumulator, advances k.'
  - step: 'FP32 accumulator (formal_semantics rule)'
    explanation: 'Sum over k-dim must be FP32 even with BF16 input. Triangle update partial sums drift ~30% relative at N>500 if computed in BF16. This matches the formal_semantics.numerical_rules.reduction_dtype rule for triangle-multiplicative-update.'
  - step: 'Variable-N + autotune'
    explanation: '@triton.autotune key=["N", "C"] caches optimal BLOCK_N / BLOCK_C / num_warps per protein length bucket. First call per length bucket pays autotune cost (~500ms-2s); subsequent calls are < 1μs launch. Acceptable for batch deployments; problematic for one-shot eval scripts.'
  - step: 'tl.dot for tensor-core fitness'
    explanation: 'Real OpenFold kernel uses tl.dot for the inner (BLOCK_N × BLOCK_C) × (BLOCK_C × BLOCK_N) matmul (rearranging the 4-tensor contraction to 3-D). This maps to WGMMA on Hopper / MMA on Ampere, getting tensor-core throughput. The pseudo-code above shows scalar broadcasting for clarity.'
  - step: 'Outgoing vs incoming variants'
    explanation: 'Pairformer alternates outgoing (a[i,k] * b[k,j]) and incoming (a[k,i] * b[k,j]) variants in successive layers. Two separate kernels (one per variant) is the OpenFold pattern. Could be combined via a transpose flag at compile-time, but separate kernels are cleaner.'

arch_idioms:
  - '@triton.autotune key=[N, C] — JIT-cache optimal BLOCK shape per protein length bucket'
  - '@triton.jit + tl.constexpr — JIT specialization on dtype + variant flag'
  - 'Chunked outer K-loop — keeps working set in SMEM for variable N'
  - 'FP32 accumulator + cast-back-on-store — formal_semantics reduction_dtype rule'
  - 'tl.dot — tensor-core mapping (WGMMA Hopper / MMA Ampere)'
  - 'pid_b / pid_i / pid_j 3D launch grid — 3-D parallelism for [B, N, N] shape'
  - 'Boundary masks (mask_i, mask_j, mask_k) — variable-length protein support'

