notes: |
  Triton occupies a unique niche: more portable than hand-tuned CUDA C++,
  more performant than naive PyTorch ops, with shorter dev cycle than CUTLASS.

  Production engines that ship Triton kernels:
    - vLLM: fused-MoE, paged-attention prefill, fused-RoPE-QKV
    - SGLang: similar via FlashInfer integration
    - PyTorch torch.compile: emits Triton kernels by default for many ops

  When to use Triton vs CUDA C++:
    - Triton: portable across Hopper/Ampere, dev-cycle critical, dtype-generic
    - CUDA C++: peak Hopper TMA performance, FP8 specialization, hand-tuned register layout

  When to use Triton vs Ascend-C / BANG-C:
    - Triton: NVIDIA / AMD only — no Ascend or Cambricon support yet
    - Ascend-C / BANG-C: required for non-NVIDIA NPU paths
    (Triton-CPU and Triton-Ascend are early/experimental as of 2026)

  This example is the structural reference for triton-language portable
  kernel agents (e.g., when kernel-codegen target_arch is "ada" or "ampere"
  and the agent picks Triton over CUDA C++ for portability).
