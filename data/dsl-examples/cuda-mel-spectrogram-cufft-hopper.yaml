notes: |
  Mel-spec preprocessing 适合 ASR / TTS / 语音对话 agent 部署. 三个 corpus 模型
  共享这条 hot path:

  | 模型 | 用法 | 量级 |
  |---|---|---|
  | Whisper-large-v3-turbo | 输入侧 (audio → mel) | 30s chunk, batch≥10 |
  | Parakeet-CTC-1.1B | 输入侧 (streaming) | chunked, batch≥100 |
  | F5-TTS | 输出侧 (text → mel → audio) | streaming, batch=1 |

  Production deployment 路径:
  - **NVIDIA NeMo**: 此 example 的 reference 来源, 服务器侧 ASR / TTS 主流
  - **TensorRT-LLM**: Whisper preprocessing 已 fused 进 TRT 引擎; 不需要单独调用
  - **Faster-whisper**: CTranslate2 backend, 用 cuFFT 路径 (~80% NeMo 性能)
  - **Whisper.cpp**: 边缘 / 移动 — AVX/Metal/Neon SIMD CPU mel-spec, 不用 cuFFT

  对 Apple Silicon: Metal Performance Shaders 提供 mel-spec MPS path (类似但不同
  API). v3.14+ 候选: metal-mel-spectrogram-mlx-m3 DSL example.

  对 Ascend: aclnn 提供 aclnnSTFT + aclnnMel 算子, CANN 8.0+ 支持. v3.14+
  候选: ascend-c-mel-spectrogram DSL example (novel — 没有现成 reference).

  对边缘 NPU (RK3588 / Jetson Thor / BM1684X): 通常用 CPU mel-spec (经 Cortex-A55
  NEON 加速), 不用 NPU. 因为 mel-spec 不是 tensor-core friendly, NPU 收益有限.

  **v3.14 加入这个 entry 的核心动机**: 三个语音模型 (Whisper / Parakeet / F5-TTS)
  都在 corpus, 但缺乏 NVIDIA reference DSL. 现在 agent 可以为 ASR / TTS deployment
  推荐这条具体 hot path + cufftPlan + Mel filterbank 预计算 pattern, 并 cite
  NeMo 作为 production reference.
