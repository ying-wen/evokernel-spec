notes: |
  Compare to cuda-tiled-gemm-hopper (also Hopper, also TMA+WGMMA): same
  primitives, fundamentally different inner-loop pattern. GEMM has a
  monotonic accumulator over K-tiles; attention has the rescale trick that
  lets the running (m, s, acc) state stay in registers indefinitely.

  This is the canonical structural reference for the agent's `attention`
  op-class kernel template (v2.18 added the dispatch). When kernel-codegen
  emits an attention skeleton, this is the shape it targets.

  What this skeleton does NOT cover (intentionally — keep ≤ 200 LOC):
    - causal masking (1 line: skip K[col >= row + tile_m] in softmax)
    - GQA broadcast (k_smem stride per-head broadcasts)
    - sliding-window (mask K[col < tile_m + row - window])
    - paged KV-cache (replace direct K, V indexing with page-table lookup)
    - MLA's c_kv decompression (extra GEMM before WGMMA)
