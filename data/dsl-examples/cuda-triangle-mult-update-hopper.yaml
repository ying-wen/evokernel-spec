notes: |
  CUDA C++ vs Triton trade-off summary:

  | Aspect | Triton (v3.13) | CUDA C++ (this) |
  |---|---|---|
  | Peak perf | 85-95% of CUDA | 100% (reference) |
  | Portability | Hopper/Ampere/Ada/RDNA | NVIDIA-only |
  | Dev cycle | Fast (JIT, autotune) | Slow (compile + manual tune) |
  | First-call latency | 500ms-2s autotune | <1μs (AOT compile) |
  | Dtype generic | tl.constexpr | template specialization |
  | Maintainability | Easier (Python-like) | Harder (CUDA + intrinsics) |

  **When to pick which**:
  - **Triton (v3.13)**: research, prototyping, multi-arch portability,
    fast iteration on kernel design.
  - **CUDA C++ (this)**: commercial production where 5-15% perf matters,
    custom dtype combos (FP8, INT8 etc.), TMA / WGMMA peak-hopper paths.

  **What this example does NOT cover** (v3.15+ candidates):
  - Full TMA descriptor build at host side
  - cp.async.bulk.tensor.2d for true Hopper peak
  - WGMMA m64n128k16 path for the inner sum (currently scalar FP32 mul)
  - Double-buffer + overlap (k_outer load while k_local computes)
  - Vectorized float4 cast + store

  Production OpenFold / AF3 kernel includes all of these. The example here
  shows the structural pattern (3D grid, BF16+FP32 acc, tile + chunked
  K-reduction); a real production kernel is ~500 LOC of additional CUDA
  intrinsics.

  v3.14 加入这个 entry 的核心动机: 当前 corpus 已有 Triton 版本 (v3.13),
  但用户在 commercial deployment 路径需要 CUDA C++. 这两版同时存在让 agent
  可以根据 deployment 需求 (research vs production) 推荐对应版本.

  与 fused-pairformer-block (v3.12) 的关系:
  - fused-pairformer-block 是 fused-kernel 数据 entry (描述完整融合块 +
    多 step 融合优势)
  - 这个 DSL example 是 single-op 实现参考 (单独 triangle-mult 算子的
    具体代码模式)
  - 一个 Layer R bundle 应该把两者都包进去, LLM-orchestrator 可以参考
    DSL 写代码, 然后参考 fused-kernel 决定是否再融合.
