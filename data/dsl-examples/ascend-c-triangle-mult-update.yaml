notes: |
  Triangle-mult on Ascend 实施挑战 (vs NVIDIA):

  1. **没有 tensor-core 适配的 shape**: Cube 单元 [16, 16, 16] MMA tile 与 4-tensor
     contraction 不匹配. 必须用 Vector 单元 (类似 NVIDIA CUDA cores 的 elementwise 路径).
     **结果**: 比 CUDA Tensor Core path 慢 ~3-5× (类似 RMSNorm 在 Ascend 上的劣势).

  2. **UB 容量限制**: 192 KB 单核 UB 容量. 配双缓冲 + a/b/output 多 tensor, 每 tile
     最大 ~16 KB. 这意味着 BLOCK_C 必须 ≤ 32 (vs CUDA SMEM 228 KB 上限). 大 c-dim
     模型 (e.g., AF3 c=128) 必须进一步沿 c 切分.

  3. **多 AI 核分发**: Ascend 910C 32 个 AI 核. 用 GetBlockIdx() 把 (b, i, j) tile
     分到不同核. 与 NVIDIA SM-launch 的概念类似但单元粒度更粗 (32 cores vs 132 SMs).

  4. **CANN aclnnSTFT / aclnnXxx 算子库**: 没有 triangle-mult 现成算子. 必须用
     Ascend-C 自己写 (vs cuBLAS/cuDNN 在 CUDA 提供 building blocks).

  **预计性能** (vs v3.14 CUDA C++ on H100 1024 batch, N=500, C=128):
  - H100 (CUDA C++): ~5 ms (基线)
  - Ascend 910C (本 Ascend-C 实现, 估算): ~15-25 ms (3-5× slower)
  - 主要劣势: Vector 单元 vs Tensor Core throughput (~5× gap)
  - 主要优势: 国产 supply chain, 可商用部署

  **生态意义**:
  - 为 Boltz-1 / ESMFold 在国产硬件 (Ascend 910C) 上部署提供起点
  - MindIE 框架 (CANN 9.0+) 可以集成此 kernel 作为 Pairformer 加速 path
  - 比纯 PyTorch eager 在 Ascend 上跑预估 5-10× 加速
  - 但仍比 NVIDIA H100 慢 3-5× — 这是当前 Ascend vs NVIDIA 在非 LLM workload
    上的真实 gap (LLM workload 通常更接近 — Ascend 的 Cube 单元能 fully leverage)

  **生产就绪状态**:
  - 本 example 是 reference design, 不是 fully-tuned 生产代码
  - 缺失项: 真正的 Vector 单元内 inner-loop 实现, async DMA optimization, c-dim 切分
  - 完整生产实现估算 ~600-800 LOC Ascend-C, 由社区或华为团队完成

  **v3.15 加入这个 entry 的核心动机**: 用户多次明确要求 "**不同硬件 CANN 级别实现
  参考和文档**". v3.13 给了 Triton (portable), v3.14 给了 CUDA C++ (peak NVIDIA 性能),
  这 v3.15 给了 Ascend-C (国产硬件路径). 三个版本对照让 agent 可以根据 deployment
  target (NVIDIA / portable / Ascend) 推荐对应 reference + 大致预期性能.

  v3.16+ 候选:
  - HIP (CDNA3+) 版本 — AMD GPU 路径
  - MLX (Apple Silicon) 版本 — M3 Ultra 大蛋白部署
  - BANG-C (Cambricon) 版本 — 国产 datacenter MLU590 / MLU290
