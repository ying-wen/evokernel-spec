name: 新增硬件 / New hardware
description: 提议新增一张加速卡或服务器/超节点 / Propose a new accelerator card, server, or super-pod
labels: [hardware, contribution]
body:
  - type: markdown
    attributes:
      value: |
        感谢贡献! 提交前请阅读 [docs/contributing.md](https://github.com/evokernel/evokernel-spec/blob/main/docs/contributing.md)。
  - type: input
    id: name
    attributes: { label: 卡名 / 服务器名, placeholder: 'CloudMatrix 384' }
    validations: { required: true }
  - type: input
    id: vendor
    attributes: { label: 厂商 (vendor slug), placeholder: huawei }
    validations: { required: true }
  - type: input
    id: source
    attributes: { label: 主要数据源 URL, description: 'whitepaper / press release / product page' }
    validations: { required: true }
  - type: textarea
    id: notes
    attributes: { label: 备注, description: '特殊情况, 如数据稀缺 / 仅特供版 / 等' }
