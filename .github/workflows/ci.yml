name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-data:
    runs-on: ubuntu-latest
    name: Validate data (schema + cross-references)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate

  type-check:
    runs-on: ubuntu-latest
    name: TypeScript + Astro type check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec astro check

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit tests (schema + web)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @evokernel/schemas test
      - run: pnpm --filter web test

  agent-regression:
    runs-on: ubuntu-latest
    name: Agent layer regression (codegen dispatch + learning schema)
    # v2.24: closes the spec → plan → dev → test → feedback → spec loop.
    # Catches regressions in:
    #   - kernel-codegen op-class dispatch (gemm/attention/norm/scatter-permute)
    #   - agent-learning schema (data/agent-learnings/*.yaml shape)
    #   - generateAgentLearningStub() output parses against the schema
    #
    # Full agent-deploy E2E smoke is deferred to a separate workflow that
    # spins up the dev server first (queryAPI requires the running site).
    # That comes in v2.25+ as a nightly job.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # ── Test 1: kernel-codegen op-class dispatch (11 assertions) ──
      # Catches: classifyOp() regressions, emit*ByOpClass body drift, review_notes
      # surfacing of op-class.
      - name: Kernel-codegen op-class dispatch tests
        run: pnpm --filter @evokernel/scripts test

      # ── Test 2: synthetic agent-learning stub passes schema validation ──
      # Generates a stub via generateAgentLearningStub-shaped input (matching the
      # output of scripts/agent-deploy/index.ts) and validates the YAML directly.
      - name: Synthetic agent-learning stub validates against schema
        run: |
          set -euo pipefail
          mkdir -p /tmp/agent-learning-ci
          cat > /tmp/agent-learning-ci/synth.yaml <<'EOF'
          id: ci-synth-deepseek-v4-pro-on-h100-sxm5-2026-01-01
          agent_run_at: '2026-01-01T00:00:00.000Z'
          model_id: deepseek-ai/DeepSeek-V4-Pro
          hardware_id: h100-sxm5
          engine_id: vllm
          outcome: shipped
          observations:
            - kind: success-pattern
              description: 'CI synthetic stub for v2.24 agent-regression job'
          perf_delta:
            decode_tok_per_s_predicted: 285.0
            cost_per_m_tokens_predicted: 12.30
          triage_status: open
          notes: 'CI synthetic; not a real agent run.'
          EOF
          # Move into a temp data dir + validate (uses data/ default but CI
          # checks the synth file is well-formed against AgentLearningSchema)
          cp /tmp/agent-learning-ci/synth.yaml data/agent-learnings/ci-synth.yaml
          pnpm exec tsx scripts/validate-data.ts || \
            { echo "✗ synth agent-learning stub failed validation"; rm data/agent-learnings/ci-synth.yaml; exit 1; }
          rm data/agent-learnings/ci-synth.yaml
          echo "✓ synthetic agent-learning stub validates"

  build:
    runs-on: ubuntu-latest
    name: Build static site
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: apps/web/dist
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    name: E2E (Playwright + a11y + perf budgets)
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec playwright install --with-deps chromium
      - run: pnpm --filter web build
      - name: Run preview + e2e
        run: |
          pnpm --filter web exec astro preview --port 4321 --host 127.0.0.1 > /tmp/preview.log 2>&1 &
          sleep 5
          E2E_NO_SERVER=1 pnpm --filter web exec playwright test
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  deployment-smoke:
    runs-on: ubuntu-latest
    name: Deployment smoke (launch.sh + 12 critical routes + offline tarball)
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: apps/web/dist
      # launch.sh polls /api/health.json then smoke-checks 12 critical
      # routes against the actually-built artifact. --no-build reuses
      # dist from upstream build job; --no-validate skips revalidation
      # (already covered by validate-data job).
      - name: Run launch.sh (skip rebuild + revalidate)
        run: ./launch.sh --no-build --no-validate
        timeout-minutes: 2
      - name: Verify health endpoints
        run: |
          echo '=== /api/healthz ==='
          curl -sf http://127.0.0.1:4321/api/healthz
          echo '=== /api/health.json ==='
          curl -sf http://127.0.0.1:4321/api/health.json | tee /tmp/health.json
          jq -e '.status == "ok"' /tmp/health.json
          jq -e '.data_loaded.hardware >= 28' /tmp/health.json
          jq -e '.data_loaded.models >= 14' /tmp/health.json
      - name: Pack offline distribution (tar.gz + sha256)
        run: pnpm pack:dist
      - uses: actions/upload-artifact@v4
        with:
          name: offline-tarball
          path: |
            .runtime/*.tar.gz
            .runtime/*.sha256
          retention-days: 14
      - if: always()
        run: ./launch.sh --stop || true
      - if: failure()
        run: |
          echo '=== preview log ==='
          cat .runtime/preview.log || echo 'no preview log'
