name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-data:
    runs-on: ubuntu-latest
    name: Validate data (schema + cross-references)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate

  type-check:
    runs-on: ubuntu-latest
    name: TypeScript + Astro type check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec astro check

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit tests (schema + web)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @evokernel/schemas test
      - run: pnpm --filter web test

  build:
    runs-on: ubuntu-latest
    name: Build static site
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: apps/web/dist
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    name: E2E (Playwright + a11y + perf budgets)
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec playwright install --with-deps chromium
      - run: pnpm --filter web build
      - name: Run preview + e2e
        run: |
          pnpm --filter web exec astro preview --port 4321 --host 127.0.0.1 > /tmp/preview.log 2>&1 &
          sleep 5
          E2E_NO_SERVER=1 pnpm --filter web exec playwright test
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
