name: check-evidence-links
# Weekly link health check on all evidence URLs.
# Runs separately from PR ci because some upstreams are flaky / rate-limit.
on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check-links
        timeout-minutes: 20
        continue-on-error: true
      - if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Broken evidence link(s) detected — ${new Date().toISOString().slice(0, 10)}`,
              body: 'Weekly link check found broken evidence URLs. See workflow run for details.',
              labels: ['data', 'maintenance']
            });
